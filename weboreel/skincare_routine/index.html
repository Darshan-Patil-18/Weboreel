<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Skincare Routine Journey</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html {
      width: 100%; height: 100%; overflow: hidden;
      background: #e0f7fa; color: #111; font-family: 'DM Sans', sans-serif;
      overscroll-behavior: none; transition: background 1.5s;
    }

    #scroll-container {
      position: absolute; top: 0; left: 0; width: 100%; height: 4000px;
      opacity: 0; pointer-events: none;
    }

    /* Environment */
    .window {
      position: absolute; top: 10%; right: 10%; width: 150px; height: 150px;
      border: 5px solid #fff; border-radius: 100px 100px 10px 10px; overflow: hidden;
      background: linear-gradient(to bottom, #87ceeb, #fdfbf7); transition: background 1.5s;
    }
    
    .sun-moon {
      position: absolute; bottom: 20%; left: 50%; transform: translateX(-50%);
      width: 60px; height: 60px; background: #ffd700; border-radius: 50%;
      box-shadow: 0 0 20px #ffd700; transition: all 1.5s;
    }

    /* Character Mirror View */
    .mirror {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 280px; height: 350px; border: 10px solid #fff; border-radius: 150px 150px 20px 20px;
      background: rgba(255,255,255,0.5); box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      overflow: hidden; display: flex; justify-content: center; align-items: flex-end;
    }

    .face {
      position: relative; width: 140px; height: 180px; background: #f5d0b5;
      border-radius: 70px 70px 40px 40px; margin-bottom: 20px; transition: all 1s;
    }

    .eyes { position: absolute; top: 70px; width: 100%; display: flex; justify-content: space-evenly; }
    .eye { width: 15px; height: 8px; background: #333; border-radius: 10px 10px 0 0; transition: all 0.5s; }
    
    .mouth { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); width: 30px; height: 10px; background: #c07c7c; border-radius: 0 0 15px 15px; transition: all 0.5s; }

    /* Effects Overlays */
    .water-splash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(255,255,255,0.8) 10%, transparent 50%); opacity: 0; transition: opacity 0.5s; mix-blend-mode: overlay; }
    
    .foam { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 120px; height: 100px; background: #fff; border-radius: 50%; filter: blur(5px); opacity: 0; transition: opacity 0.5s; }
    
    .glow { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, rgba(255,255,255,0.8) 0%, transparent 50%); border-radius: inherit; opacity: 0; transition: opacity 0.5s; }
    
    .eye-mask { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); width: 120px; height: 40px; background: #b0c4de; border-radius: 20px; opacity: 0; transition: opacity 0.5s; display: flex; justify-content: center; align-items: center; color: #fff; font-size: 0.8rem; }

    /* UI Overlay */
    .title { position: fixed; top: 10%; left: 10%; font-size: 3rem; font-weight: bold; z-index: 100; transition: color 1s; }
    .hud { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); font-family: monospace; letter-spacing: 2px; z-index: 100; transition: color 1s; }

    .mute-btn { position: fixed; bottom: 20px; right: 20px; font-size: 1.5rem; z-index: 100; cursor: pointer; opacity: 0.5; transition: color 1s; }
    .start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #e0f7fa; color: #111; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; cursor: pointer; font-size: 2rem; letter-spacing: 3px; font-weight: bold; }
  </style>
</head>
<body>
  <div class="start-screen" id="start-btn">SKINCARE ROUTINE</div>
  <div class="mute-btn" id="mute-btn">🧴</div>

  <div class="window" id="window">
    <div class="sun-moon" id="sun-moon"></div>
  </div>

  <div class="title" id="title">MORNING</div>
  <div class="hud" id="hud">SCROLL TO CLEANSE</div>

  <div class="mirror" id="mirror">
    <div class="face" id="face">
      <div class="eyes">
        <div class="eye" id="el"></div><div class="eye" id="er"></div>
      </div>
      <div class="mouth" id="mouth"></div>
      
      <div class="water-splash" id="water"></div>
      <div class="foam" id="foam"></div>
      <div class="glow" id="glow"></div>
      <div class="eye-mask" id="mask">ZzZz</div>
    </div>
  </div>

  <div id="scroll-container"></div>

  <script>
    let currentY = 0; let targetY = 0; let maxScroll = 4000; let isStarted = false; const ease = 0.05;
    
    window.addEventListener('wheel', e => { if(!isStarted) return; e.preventDefault(); targetY += e.deltaY; targetY = Math.max(0, Math.min(targetY, maxScroll)); }, {passive: false});
    let touchY = 0;
    window.addEventListener('touchstart', e => touchY = e.touches[0].clientY);
    window.addEventListener('touchmove', e => { if(!isStarted) return; e.preventDefault(); targetY += (touchY - e.touches[0].clientY) * 1.5; targetY = Math.max(0, Math.min(targetY, maxScroll)); touchY = e.touches[0].clientY; }, {passive: false});

    // Audio
    let audioCtx, masterGain;
    let bMorning, bCleanse, bSerum, bNight;
    
    function initAudio() {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      audioCtx = new AudioContext(); masterGain = audioCtx.createGain(); masterGain.gain.value = 0.5; masterGain.connect(audioCtx.destination);
      
      // Morning (Birds - High frequency sine FM)
      bMorning = audioCtx.createGain(); bMorning.gain.value = 1;
      setInterval(() => {
        if(isStarted && audioCtx && bMorning.gain.value > 0.1) {
          const o = audioCtx.createOscillator(); o.type = 'sine'; o.frequency.setValueAtTime(3000, audioCtx.currentTime); o.frequency.exponentialRampToValueAtTime(4000, audioCtx.currentTime+0.1);
          const g = audioCtx.createGain(); g.gain.setValueAtTime(0, audioCtx.currentTime); g.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime+0.05); g.gain.linearRampToValueAtTime(0, audioCtx.currentTime+0.2);
          o.connect(g).connect(bMorning).connect(masterGain); o.start(); o.stop(audioCtx.currentTime+0.2);
        }
      }, 2000);

      // Cleanse (Water Splashes / Bubbles - Noise with lowpass sweeps)
      bCleanse = audioCtx.createGain(); bCleanse.gain.value = 0;
      setInterval(() => {
        if(isStarted && audioCtx && bCleanse.gain.value > 0.1) {
          const bSize = audioCtx.sampleRate * 0.5; const nBuf = audioCtx.createBuffer(1, bSize, audioCtx.sampleRate);
          for(let i=0; i<bSize; i++) nBuf.getChannelData(0)[i] = Math.random()*2-1;
          const nSrc = audioCtx.createBufferSource(); nSrc.buffer = nBuf;
          const f = audioCtx.createBiquadFilter(); f.type = 'bandpass'; f.frequency.setValueAtTime(500, audioCtx.currentTime); f.frequency.exponentialRampToValueAtTime(2000, audioCtx.currentTime+0.3);
          const g = audioCtx.createGain(); g.gain.setValueAtTime(0.3, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime+0.3);
          nSrc.connect(f).connect(g).connect(bCleanse).connect(masterGain); nSrc.start();
        }
      }, 800);

      // Serum (Glassy chime - Triangle)
      bSerum = audioCtx.createGain(); bSerum.gain.value = 0;
      setInterval(() => {
        if(isStarted && audioCtx && bSerum.gain.value > 0.1) {
          const o = audioCtx.createOscillator(); o.type = 'triangle'; o.frequency.value = [1046.50, 1318.51, 1567.98][Math.floor(Math.random()*3)];
          const g = audioCtx.createGain(); g.gain.setValueAtTime(0.3, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime+1);
          o.connect(g).connect(bSerum).connect(masterGain); o.start(); o.stop(audioCtx.currentTime+1);
        }
      }, 1500);

      // Night (Crickets - fast noise pulses + Deep sine breath)
      bNight = audioCtx.createGain(); bNight.gain.value = 0;
      setInterval(() => {
        if(isStarted && audioCtx && bNight.gain.value > 0.1) {
          const o = audioCtx.createOscillator(); o.type = 'square'; o.frequency.value = 6000;
          const g = audioCtx.createGain(); g.gain.setValueAtTime(0.05, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime+0.1);
          o.connect(g).connect(bNight).connect(masterGain); o.start(); o.stop(audioCtx.currentTime+0.1);
        }
      }, 100);

      const breath = audioCtx.createOscillator(); breath.type = 'sine'; breath.frequency.value = 80;
      const breathG = audioCtx.createGain(); breathG.gain.value = 0.5;
      const breathLfo = audioCtx.createOscillator(); breathLfo.type = 'sine'; breathLfo.frequency.value = 0.2; // 5s breath cycle
      breathLfo.connect(breathG.gain); breath.connect(breathG).connect(bNight).connect(masterGain); breath.start(); breathLfo.start();
    }

    let lastStage = -1;

    function loop() {
      if(isStarted) {
        currentY += (targetY - currentY) * ease;
        const progress = currentY / maxScroll; // 0 to 1

        let stage = 0;
        if(progress > 0.25 && progress < 0.5) stage = 1;
        else if(progress >= 0.5 && progress < 0.75) stage = 2;
        else if(progress >= 0.75) stage = 3;

        if(stage !== lastStage) {
          lastStage = stage;
          
          const title = document.getElementById('title');
          const win = document.getElementById('window');
          const sm = document.getElementById('sun-moon');
          
          const water = document.getElementById('water');
          const foam = document.getElementById('foam');
          const glow = document.getElementById('glow');
          const mask = document.getElementById('mask');

          const el = document.getElementById('el'); const er = document.getElementById('er');
          const mouth = document.getElementById('mouth');

          if(stage === 0) { // Morning
            document.body.style.background = '#e0f7fa'; document.body.style.color = '#111'; document.getElementById('hud').style.color = '#111'; document.getElementById('mute-btn').style.color = '#111';
            title.innerText = "SPLASH";
            win.style.background = 'linear-gradient(to bottom, #87ceeb, #fdfbf7)';
            sm.style.background = '#ffd700'; sm.style.boxShadow = '0 0 20px #ffd700'; sm.style.bottom = '50%';
            
            water.style.opacity = 1; foam.style.opacity = 0; glow.style.opacity = 0; mask.style.opacity = 0;
            
            el.style.height = '15px'; el.style.borderRadius = '50%'; er.style.height = '15px'; er.style.borderRadius = '50%'; // Eyes open wide
            mouth.style.height = '15px'; mouth.style.borderRadius = '50%'; // 'O' face

            if(audioCtx) { bMorning.gain.setTargetAtTime(1, audioCtx.currentTime, 0.5); bCleanse.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); bSerum.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); bNight.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); }
          } else if(stage === 1) { // Cleanse
            title.innerText = "CLEANSE";
            win.style.background = 'linear-gradient(to bottom, #b0e0e6, #fff)';
            sm.style.bottom = '80%';
            
            water.style.opacity = 0; foam.style.opacity = 1; glow.style.opacity = 0; mask.style.opacity = 0;
            
            el.style.height = '5px'; el.style.borderRadius = '10px 10px 0 0'; er.style.height = '5px'; er.style.borderRadius = '10px 10px 0 0'; // Eyes squinting
            mouth.style.height = '5px'; mouth.style.borderRadius = '10px'; // Straight mouth

            if(audioCtx) { bMorning.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); bCleanse.gain.setTargetAtTime(1, audioCtx.currentTime, 0.5); bSerum.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); bNight.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); }
          } else if(stage === 2) { // Serum
            document.body.style.background = '#fef0e6'; // Warm sunset
            title.innerText = "SERUM";
            win.style.background = 'linear-gradient(to bottom, #ff7e5f, #feb47b)'; // Sunset
            sm.style.background = '#ff4500'; sm.style.boxShadow = '0 0 20px #ff4500'; sm.style.bottom = '10%';
            
            water.style.opacity = 0; foam.style.opacity = 0; glow.style.opacity = 1; mask.style.opacity = 0;
            
            el.style.height = '15px'; el.style.borderRadius = '50%'; er.style.height = '15px'; er.style.borderRadius = '50%'; // Eyes open
            mouth.style.height = '10px'; mouth.style.borderRadius = '0 0 15px 15px'; // Smile

            if(audioCtx) { bMorning.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); bCleanse.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); bSerum.gain.setTargetAtTime(1, audioCtx.currentTime, 0.5); bNight.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); }
          } else { // Night
            document.body.style.background = '#0f172a'; document.body.style.color = '#fff'; document.getElementById('hud').style.color = '#fff'; document.getElementById('mute-btn').style.color = '#fff';
            title.innerText = "REST";
            win.style.background = 'linear-gradient(to bottom, #000, #111)';
            sm.style.background = '#fff'; sm.style.boxShadow = '0 0 20px #fff'; sm.style.bottom = '80%'; // Moon
            
            water.style.opacity = 0; foam.style.opacity = 0; glow.style.opacity = 0.5; mask.style.opacity = 1;
            
            el.style.height = '2px'; el.style.borderRadius = '0'; er.style.height = '2px'; er.style.borderRadius = '0'; // Eyes closed tight
            mouth.style.height = '5px'; mouth.style.borderRadius = '50%'; // Relaxed

            if(audioCtx) { bMorning.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); bCleanse.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); bSerum.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); bNight.gain.setTargetAtTime(1, audioCtx.currentTime, 0.5); }
          }
        }
        
        // Rubbing animation for foam
        if(stage === 1) {
          document.getElementById('foam').style.transform = `translate(-50%, -50%) scale(${1 + Math.sin(currentY*0.05)*0.2})`;
        }
      }
      requestAnimationFrame(loop);
    }

    document.getElementById('start-btn').addEventListener('click', function() {
      initAudio(); this.style.display = 'none'; isStarted = true; loop();
    });

    let isMuted = false;
    document.getElementById('mute-btn').addEventListener('click', function() {
      if(!audioCtx) return; isMuted = !isMuted;
      masterGain.gain.linearRampToValueAtTime(isMuted ? 0 : 0.5, audioCtx.currentTime + 0.3);
    });
  </script>
</body>
</html>
