<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>From Thread to Outfit</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html {
      width: 100%; height: 100%; overflow: hidden;
      background: #faf8f5; color: #333; font-family: 'Playfair Display', serif;
      overscroll-behavior: none; transition: background 1s;
    }

    #scroll-container {
      position: absolute; top: 0; left: 0; width: 100%; height: 4000px;
      opacity: 0; pointer-events: none;
    }

    /* Central Canvas for Drawing */
    canvas {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 100%; height: 100%; z-index: 5;
    }

    /* Final Dress (CSS overlaid at the end) */
    .final-dress {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8);
      width: 200px; height: 350px; opacity: 0; transition: opacity 1s, transform 1s; z-index: 10;
    }
    
    .d-top { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 100px; height: 120px; background: #800020; border-radius: 10px 10px 0 0; clip-path: polygon(20% 0, 80% 0, 100% 100%, 0 100%); }
    .d-skirt { position: absolute; top: 120px; left: 50%; transform: translateX(-50%); width: 200px; height: 230px; background: #800020; border-radius: 5px 5px 50% 50%; box-shadow: inset 0 -20px 40px rgba(0,0,0,0.5); }
    .d-belt { position: absolute; top: 110px; left: 50%; transform: translateX(-50%); width: 110px; height: 20px; background: #d4af37; border-radius: 10px; }

    /* UI Overlay */
    .title { position: fixed; top: 10%; left: 50%; transform: translateX(-50%); font-size: 3rem; z-index: 100; opacity: 1; transition: opacity 0.5s; text-align: center; }
    
    .hud { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); font-family: monospace; letter-spacing: 2px; color: #888; z-index: 100; }

    .mute-btn { position: fixed; bottom: 20px; right: 20px; font-size: 1.5rem; z-index: 100; cursor: pointer; opacity: 0.5; }
    .start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #faf8f5; color: #333; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; cursor: pointer; font-size: 2rem; letter-spacing: 3px; }
  </style>
</head>
<body>
  <div class="start-screen" id="start-btn">THE CRAFT</div>
  <div class="mute-btn" id="mute-btn">🧵</div>

  <div class="title" id="title">1. THE THREAD</div>
  <div class="hud">SCROLL TO WEAVE</div>

  <canvas id="canvas"></canvas>

  <div class="final-dress" id="final-dress">
    <div class="d-top"></div><div class="d-skirt"></div><div class="d-belt"></div>
  </div>

  <div id="scroll-container"></div>

  <script>
    let currentY = 0; let targetY = 0; let maxScroll = 4000; let isStarted = false; const ease = 0.05;
    
    window.addEventListener('wheel', e => { if(!isStarted) return; e.preventDefault(); targetY += e.deltaY; targetY = Math.max(0, Math.min(targetY, maxScroll)); }, {passive: false});
    let touchY = 0;
    window.addEventListener('touchstart', e => touchY = e.touches[0].clientY);
    window.addEventListener('touchmove', e => { if(!isStarted) return; e.preventDefault(); targetY += (touchY - e.touches[0].clientY) * 1.5; targetY = Math.max(0, Math.min(targetY, maxScroll)); touchY = e.touches[0].clientY; }, {passive: false});

    const canvas = document.getElementById('canvas'); const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;

    // Audio
    let audioCtx, masterGain;
    let bSewing, bScissor;
    
    function initAudio() {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      audioCtx = new AudioContext(); masterGain = audioCtx.createGain(); masterGain.gain.value = 0.5; masterGain.connect(audioCtx.destination);
      
      // Sewing Machine Rhythm (Fast clicks)
      bSewing = audioCtx.createGain(); bSewing.gain.value = 0;
      const oS = audioCtx.createOscillator(); oS.type = 'square';
      const lfoS = audioCtx.createOscillator(); lfoS.type = 'square'; lfoS.frequency.value = 8; // 8 stitches a sec
      const lfoG = audioCtx.createGain(); lfoS.connect(lfoG.gain);
      oS.connect(lfoG).connect(bSewing).connect(masterGain); oS.start(); lfoS.start();

      // Scissor (Highpass noise burst)
      bScissor = function() {
        const bSize = audioCtx.sampleRate * 0.2; const nBuf = audioCtx.createBuffer(1, bSize, audioCtx.sampleRate);
        for(let i=0; i<bSize; i++) nBuf.getChannelData(0)[i] = Math.random()*2-1;
        const nSrc = audioCtx.createBufferSource(); nSrc.buffer = nBuf;
        const nFilt = audioCtx.createBiquadFilter(); nFilt.type = 'highpass'; nFilt.frequency.value = 5000;
        const g = audioCtx.createGain(); g.gain.setValueAtTime(1, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        nSrc.connect(nFilt).connect(g).connect(masterGain); nSrc.start();
      };
    }

    let lastStage = -1;

    function drawScene(progress) {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      const cx = canvas.width/2; const cy = canvas.height/2;

      ctx.lineWidth = 2;
      ctx.strokeStyle = '#800020';

      if(progress < 0.33) {
        // Stage 1: Single Thread waving
        const localProg = progress / 0.33; // 0 to 1
        ctx.beginPath();
        for(let x=0; x<canvas.width; x+=10) {
          const y = cy + Math.sin((x * 0.02) + (currentY*0.05)) * 100 * (1-localProg);
          if(x===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
        }
        ctx.stroke();
      } else if (progress >= 0.33 && progress < 0.66) {
        // Stage 2: Fabric Weaving
        const localProg = (progress - 0.33) / 0.33; // 0 to 1
        const numLines = Math.floor(localProg * 50) + 1; // 1 to 50 lines
        
        // Horizontals
        for(let i=-numLines; i<=numLines; i++) {
          ctx.beginPath();
          ctx.moveTo(cx - 150, cy + i*5); ctx.lineTo(cx + 150, cy + i*5);
          ctx.stroke();
        }
        // Verticals
        for(let i=-numLines; i<=numLines; i++) {
          ctx.beginPath();
          ctx.moveTo(cx + i*5, cy - 150); ctx.lineTo(cx + i*5, cy + 150);
          ctx.stroke();
        }
      } else if (progress >= 0.66 && progress < 0.9) {
        // Stage 3: Stitching Shape
        const localProg = (progress - 0.66) / 0.24; // 0 to 1
        
        // Draw dashed dress outline
        ctx.setLineDash([5, 10]);
        ctx.lineDashOffset = -currentY * 0.5; // Animate stitches
        ctx.beginPath();
        // Top left
        ctx.moveTo(cx - 30, cy - 150);
        // Top right
        ctx.lineTo(cx + 30, cy - 150);
        // Waist right
        ctx.lineTo(cx + 50, cy - 30);
        // Skirt right
        ctx.lineTo(cx + 100, cy + 150);
        // Skirt left
        ctx.lineTo(cx - 100, cy + 150);
        // Waist left
        ctx.lineTo(cx - 50, cy - 30);
        ctx.closePath();
        
        ctx.fillStyle = `rgba(128, 0, 32, ${localProg * 0.5})`; // Fill slowly with red
        ctx.fill();
        ctx.stroke();
        ctx.setLineDash([]); // Reset
      } else {
        // Stage 4: Empty canvas, CSS takes over
      }
    }

    function loop() {
      if(isStarted) {
        currentY += (targetY - currentY) * ease;
        const progress = currentY / maxScroll; // 0 to 1

        let stage = 0;
        if(progress > 0.33 && progress < 0.66) stage = 1;
        else if(progress >= 0.66 && progress < 0.9) stage = 2;
        else if(progress >= 0.9) stage = 3;

        if(stage !== lastStage) {
          lastStage = stage;
          const title = document.getElementById('title');
          
          if(stage === 0) {
            title.innerText = "1. THE THREAD";
            document.getElementById('final-dress').style.opacity = 0;
            document.getElementById('final-dress').style.transform = 'translate(-50%, -50%) scale(0.8)';
            if(audioCtx) bSewing.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5);
          } else if(stage === 1) {
            title.innerText = "2. THE FABRIC";
            if(audioCtx) { bScissor(); bSewing.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); }
          } else if(stage === 2) {
            title.innerText = "3. THE STITCH";
            if(audioCtx) { bScissor(); bSewing.gain.setTargetAtTime(1, audioCtx.currentTime, 0.5); }
          } else {
            title.innerText = "4. THE MASTERPIECE";
            document.getElementById('final-dress').style.opacity = 1;
            document.getElementById('final-dress').style.transform = 'translate(-50%, -50%) scale(1)';
            if(audioCtx) {
              bScissor(); bSewing.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
              // Triumphant chord
              [261.63, 329.63, 392.00].forEach(f => {
                const o = audioCtx.createOscillator(); o.type = 'triangle'; o.frequency.value = f;
                const g = audioCtx.createGain(); g.gain.setValueAtTime(0.5, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 2);
                o.connect(g).connect(masterGain); o.start(); o.stop(audioCtx.currentTime + 2);
              });
            }
          }
        }

        drawScene(progress);
      }
      requestAnimationFrame(loop);
    }

    document.getElementById('start-btn').addEventListener('click', function() {
      initAudio(); this.style.display = 'none'; isStarted = true; loop();
    });

    let isMuted = false;
    document.getElementById('mute-btn').addEventListener('click', function() {
      if(!audioCtx) return; isMuted = !isMuted;
      masterGain.gain.linearRampToValueAtTime(isMuted ? 0 : 0.5, audioCtx.currentTime + 0.3);
    });
  </script>
</body>
</html>
