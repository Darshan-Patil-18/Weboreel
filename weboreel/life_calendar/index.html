<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>life_calendar</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap');

  body, html {
    margin: 0; padding: 0; min-height: 100vh; background: #fafafa; color: #333;
    font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center;
  }

  header { width: 100%; padding: 40px 20px; text-align: center; box-sizing: border-box; }
  h1 { font-weight: 700; margin: 0 0 10px 0; letter-spacing: -1px; }
  p { margin: 0; color: #666; font-size: 0.9rem; }

  .controls { margin-top: 20px; display: flex; gap: 10px; justify-content: center; align-items: center; }
  input[type="date"] { padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-family: inherit; }
  button { padding: 10px 20px; background: #000; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
  button:hover { background: #333; }

  #stats { margin-top: 20px; font-weight: 700; display: none; }

  .calendar-wrapper { padding: 20px; overflow-x: auto; max-width: 100vw; display: none; }
  
  .grid { display: grid; grid-template-columns: repeat(52, 1fr); gap: 2px; }
  
  .week {
    width: 10px; height: 10px; border: 1px solid #ddd; background: #fff;
    border-radius: 2px; cursor: crosshair; transition: transform 0.1s;
  }
  .week:hover { transform: scale(1.5); z-index: 10; border-color: #000; }
  
  .week.lived { background: #333; border-color: #333; }
  .week.current { background: #e74c3c; border-color: #e74c3c; animation: pulse 2s infinite; }
  .week.future { background: #fff; }

  @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

  .tooltip {
    position: fixed; background: #000; color: #fff; padding: 5px 10px; font-size: 12px;
    border-radius: 4px; pointer-events: none; opacity: 0; transition: opacity 0.2s; z-index: 100;
  }

</style>
</head>
<body>

<header>
  <h1>90-YEAR LIFE CALENDAR</h1>
  <p>Your life in weeks. Each box represents one week. 4,680 weeks in total.</p>
  <div class="controls">
    <input type="date" id="bday">
    <button onclick="generate()">GENERATE</button>
  </div>
  <div id="stats"></div>
</header>

<div class="calendar-wrapper" id="cal-wrap">
  <div class="grid" id="grid"></div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
  // Audio
  let actx;
  function initAudio() { if(!actx) actx = new (window.AudioContext || window.webkitAudioContext)(); }
  function playTick(isLived) {
    if(!actx) return;
    const osc = actx.createOscillator(); osc.type = 'sine';
    const g = actx.createGain();
    osc.frequency.setValueAtTime(isLived ? 800 : 1200, actx.currentTime);
    g.gain.setValueAtTime(0.05, actx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime+0.05);
    osc.connect(g); g.connect(actx.destination); osc.start(); osc.stop(actx.currentTime+0.05);
  }

  const grid = document.getElementById('grid');
  const tooltip = document.getElementById('tooltip');
  
  // Total weeks in 90 years = 90 * 52 = 4680
  const TOTAL_WEEKS = 4680;

  function generate() {
    initAudio();
    const bdayInput = document.getElementById('bday').value;
    if(!bdayInput) return;

    const bday = new Date(bdayInput);
    const today = new Date();
    
    // Calculate weeks lived
    const msPerWeek = 1000 * 60 * 60 * 24 * 7;
    const livedWeeks = Math.floor((today - bday) / msPerWeek);
    
    document.getElementById('cal-wrap').style.display = 'block';
    
    const stats = document.getElementById('stats');
    stats.style.display = 'block';
    stats.innerHTML = `LIVED: ${livedWeeks} WEEKS (${Math.floor(livedWeeks/TOTAL_WEEKS*100)}%) <br> REMAINING: ${TOTAL_WEEKS - livedWeeks} WEEKS`;

    grid.innerHTML = '';

    for(let i=0; i<TOTAL_WEEKS; i++) {
      let w = document.createElement('div');
      
      let year = Math.floor(i / 52);
      let weekNum = (i % 52) + 1;
      
      w.className = 'week';
      if(i < livedWeeks) w.classList.add('lived');
      else if(i === livedWeeks) w.classList.add('current');
      else w.classList.add('future');

      w.addEventListener('mouseenter', (e) => {
        playTick(i <= livedWeeks);
        tooltip.style.opacity = 1;
        tooltip.innerText = `Year ${year}, Week ${weekNum}`;
        tooltip.style.left = e.clientX + 10 + 'px';
        tooltip.style.top = e.clientY + 10 + 'px';
      });
      w.addEventListener('mouseleave', () => { tooltip.style.opacity = 0; });
      
      grid.appendChild(w);
    }
  }

</script>
</body>
</html>
