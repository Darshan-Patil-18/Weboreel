<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Fashion Around the World</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html {
      width: 100%; height: 100%; overflow: hidden;
      background: #1e293b; color: #fff; font-family: 'Space Grotesk', sans-serif;
      overscroll-behavior: none;
    }

    #scroll-container {
      position: absolute; top: 0; left: 0; width: 100%; height: 5000px;
      opacity: 0; pointer-events: none;
    }

    /* The Globe Background */
    .globe {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 800px; height: 800px; border-radius: 50%;
      background: #0f172a; box-shadow: inset -50px -50px 100px rgba(0,0,0,0.8), 0 0 50px rgba(255,255,255,0.1);
      overflow: hidden; transition: background 1s; display: flex; justify-content: center; align-items: center;
    }
    
    .pattern {
      width: 200%; height: 200%; background-size: 100px 100px; transition: opacity 1s, background 1s; opacity: 0; position: absolute;
    }
    #pat-jp { background-image: radial-gradient(circle, #fbcfe8 10%, transparent 20%); } /* Sakura */
    #pat-in { background-image: repeating-linear-gradient(45deg, #f59e0b, #f59e0b 10px, transparent 10px, transparent 20px); } /* Saree patterns */
    #pat-sc { background-image: repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255,255,255,0.2) 40px, rgba(255,255,255,0.2) 50px), repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,255,255,0.2) 40px, rgba(255,255,255,0.2) 50px); } /* Tartan */
    #pat-ng { background-image: repeating-conic-gradient(from 0deg, #10b981 0deg 45deg, #059669 45deg 90deg); } /* Geometric */

    /* The Model */
    .model {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 200px; height: 500px; z-index: 10;
    }
    .head { position: absolute; top: 50px; left: 50%; transform: translateX(-50%); width: 60px; height: 80px; background: #d4a373; border-radius: 30px; transition: background 1s; }
    
    .outfit-layer { position: absolute; top: 130px; left: 50%; transform: translateX(-50%); width: 100%; height: 370px; transition: opacity 0.5s; opacity: 0; }
    
    /* Japan - Kimono */
    #o-jp { opacity: 1; }
    .jp-body { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 140px; height: 350px; background: #be185d; border-radius: 10px; }
    .jp-belt { position: absolute; top: 80px; left: 50%; transform: translateX(-50%); width: 150px; height: 40px; background: #fcd34d; }
    .jp-sleeveL { position: absolute; top: 0; left: -20px; width: 60px; height: 200px; background: #9d174d; border-radius: 10px 0 0 10px; }
    .jp-sleeveR { position: absolute; top: 0; right: -20px; width: 60px; height: 200px; background: #9d174d; border-radius: 0 10px 10px 0; }

    /* India - Saree */
    .in-top { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 100px; height: 60px; background: #b4151c; border-radius: 10px; }
    .in-skirt { position: absolute; top: 70px; left: 50%; transform: translateX(-50%); width: 120px; height: 280px; background: #f59e0b; border-radius: 10px 10px 0 0; }
    .in-drape { position: absolute; top: -10px; left: 20px; width: 100px; height: 300px; background: rgba(245, 158, 11, 0.8); border-radius: 50% 10% 10% 50%; transform: rotate(-20deg); }

    /* Scotland - Kilt */
    .sc-shirt { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 120px; height: 150px; background: #fff; border-radius: 10px; }
    .sc-kilt { position: absolute; top: 150px; left: 50%; transform: translateX(-50%); width: 130px; height: 100px; background: #b91c1c; background-image: repeating-linear-gradient(90deg, transparent, transparent 10px, rgba(0,0,0,0.5) 10px, rgba(0,0,0,0.5) 20px); border-radius: 5px; }
    .sc-sash { position: absolute; top: 0; left: 10px; width: 40px; height: 180px; background: #b91c1c; transform: rotate(-30deg); }
    .sc-legL { position: absolute; top: 250px; left: 60px; width: 30px; height: 100px; background: #d4a373; }
    .sc-legR { position: absolute; top: 250px; right: 60px; width: 30px; height: 100px; background: #d4a373; }
    .sc-sockL { position: absolute; top: 310px; left: 60px; width: 30px; height: 60px; background: #fff; }
    .sc-sockR { position: absolute; top: 310px; right: 60px; width: 30px; height: 60px; background: #fff; }

    /* Nigeria - Agbada */
    .ng-robe { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 200px; height: 300px; background: #10b981; border-radius: 20px; box-shadow: inset 0 0 20px rgba(0,0,0,0.3); }
    .ng-inner { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 100px; height: 350px; background: #059669; }
    .ng-embroidery { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); width: 60px; height: 80px; border: 2px dashed #fcd34d; border-radius: 10px; }
    .ng-hat { position: absolute; top: -180px; left: 50%; transform: translateX(-50%); width: 80px; height: 40px; background: #10b981; border-radius: 10px 10px 0 0; }

    /* UI Overlay */
    .title { position: fixed; top: 5%; left: 50%; transform: translateX(-50%); font-size: 3rem; font-weight: bold; text-transform: uppercase; letter-spacing: 5px; z-index: 100; mix-blend-mode: overlay; opacity: 0.8; }
    .country { position: fixed; bottom: 10%; left: 50%; transform: translateX(-50%); font-size: 4rem; font-weight: bold; text-transform: uppercase; z-index: 100; color: #fff; text-shadow: 0 0 20px rgba(0,0,0,0.5); }

    .mute-btn { position: fixed; bottom: 20px; right: 20px; font-size: 1.5rem; z-index: 100; cursor: pointer; opacity: 0.5; color: white; mix-blend-mode: difference; }
    .start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1e293b; color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; cursor: pointer; font-size: 2rem; letter-spacing: 5px; }
  </style>
</head>
<body>
  <div class="start-screen" id="start-btn">GLOBAL RUNWAY</div>
  <div class="mute-btn" id="mute-btn">🌍</div>

  <div class="title">CULTURE</div>
  <div class="country" id="country">JAPAN</div>

  <div class="globe" id="globe">
    <div class="pattern" id="pat-jp"></div>
    <div class="pattern" id="pat-in"></div>
    <div class="pattern" id="pat-sc"></div>
    <div class="pattern" id="pat-ng"></div>
  </div>

  <div class="model">
    <div class="head" id="head"></div>
    
    <div class="outfit-layer" id="o-jp">
      <div class="jp-sleeveL"></div><div class="jp-sleeveR"></div>
      <div class="jp-body"></div><div class="jp-belt"></div>
    </div>
    
    <div class="outfit-layer" id="o-in">
      <div class="in-skirt"></div><div class="in-top"></div><div class="in-drape"></div>
    </div>
    
    <div class="outfit-layer" id="o-sc">
      <div class="sc-legL"></div><div class="sc-legR"></div>
      <div class="sc-sockL"></div><div class="sc-sockR"></div>
      <div class="sc-shirt"></div><div class="sc-kilt"></div><div class="sc-sash"></div>
    </div>

    <div class="outfit-layer" id="o-ng">
      <div class="ng-hat"></div>
      <div class="ng-inner"></div><div class="ng-robe"></div><div class="ng-embroidery"></div>
    </div>
  </div>

  <div id="scroll-container"></div>

  <script>
    let currentY = 0; let targetY = 0; let maxScroll = 4000; let isStarted = false; const ease = 0.05;
    
    window.addEventListener('wheel', e => { if(!isStarted) return; e.preventDefault(); targetY += e.deltaY; targetY = Math.max(0, Math.min(targetY, maxScroll)); }, {passive: false});
    let touchY = 0;
    window.addEventListener('touchstart', e => touchY = e.touches[0].clientY);
    window.addEventListener('touchmove', e => { if(!isStarted) return; e.preventDefault(); targetY += (touchY - e.touches[0].clientY) * 1.5; targetY = Math.max(0, Math.min(targetY, maxScroll)); touchY = e.touches[0].clientY; }, {passive: false});

    // Audio
    let audioCtx, masterGain;
    let bJp, bIn, bSc, bNg;
    
    function initAudio() {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      audioCtx = new AudioContext(); masterGain = audioCtx.createGain(); masterGain.gain.value = 0.5; masterGain.connect(audioCtx.destination);
      
      // Japan (Koto-like Plucks)
      bJp = audioCtx.createGain(); bJp.gain.value = 1;
      setInterval(() => {
        if(isStarted && audioCtx && bJp.gain.value > 0.1) {
          const o = audioCtx.createOscillator(); o.type = 'triangle'; o.frequency.value = [329.6, 392, 440, 523.2][Math.floor(Math.random()*4)];
          const g = audioCtx.createGain(); g.gain.setValueAtTime(0.5, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime+0.5);
          o.connect(g).connect(bJp).connect(masterGain); o.start(); o.stop(audioCtx.currentTime+0.5);
        }
      }, 300);

      // India (Sitar-like drone with LFO)
      bIn = audioCtx.createGain(); bIn.gain.value = 0;
      const oI = audioCtx.createOscillator(); oI.type = 'sawtooth'; oI.frequency.value = 138.59; // C#3
      const lfoI = audioCtx.createOscillator(); lfoI.frequency.value = 6; const lfoIg = audioCtx.createGain(); lfoIg.gain.value = 5;
      lfoI.connect(lfoIg).connect(oI.frequency);
      const fI = audioCtx.createBiquadFilter(); fI.type = 'bandpass'; fI.frequency.value = 800;
      oI.connect(fI).connect(bIn).connect(masterGain); oI.start(); lfoI.start();

      // Scotland (Bagpipe drone)
      bSc = audioCtx.createGain(); bSc.gain.value = 0;
      const oS1 = audioCtx.createOscillator(); oS1.type = 'square'; oS1.frequency.value = 233.08; // Bb3
      const oS2 = audioCtx.createOscillator(); oS2.type = 'square'; oS2.frequency.value = 116.54; // Bb2
      oS1.connect(bSc); oS2.connect(bSc); bSc.connect(masterGain); oS1.start(); oS2.start();

      // Nigeria (Talking drum pitch bends)
      bNg = audioCtx.createGain(); bNg.gain.value = 0;
      setInterval(() => {
        if(isStarted && audioCtx && bNg.gain.value > 0.1) {
          const o = audioCtx.createOscillator(); o.type = 'sine'; o.frequency.setValueAtTime(100, audioCtx.currentTime); o.frequency.exponentialRampToValueAtTime(200 + Math.random()*100, audioCtx.currentTime+0.2);
          const g = audioCtx.createGain(); g.gain.setValueAtTime(1, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime+0.3);
          o.connect(g).connect(bNg).connect(masterGain); o.start(); o.stop(audioCtx.currentTime+0.3);
        }
      }, 400);
    }

    let lastStage = 0;

    function loop() {
      if(isStarted) {
        currentY += (targetY - currentY) * ease;
        const progress = currentY / maxScroll; // 0 to 1

        let stage = 0;
        if(progress > 0.25 && progress < 0.5) stage = 1;
        else if(progress >= 0.5 && progress < 0.75) stage = 2;
        else if(progress >= 0.75) stage = 3;

        // Rotate globe based on scroll
        const patterns = ['pat-jp', 'pat-in', 'pat-sc', 'pat-ng'];
        patterns.forEach(id => document.getElementById(id).style.transform = `rotate(${currentY * 0.05}deg) scale(1.5) translateY(${Math.sin(currentY*0.01)*50}px)`);

        if(stage !== lastStage) {
          lastStage = stage;
          
          patterns.forEach((id, i) => {
            document.getElementById(id).style.opacity = i === stage ? 1 : 0;
          });

          const country = document.getElementById('country');
          const head = document.getElementById('head');
          
          ['o-jp', 'o-in', 'o-sc', 'o-ng'].forEach((id, i) => {
            document.getElementById(id).style.opacity = i === stage ? 1 : 0;
          });

          if(stage === 0) {
            country.innerText = "JAPAN"; document.getElementById('globe').style.background = '#831843'; head.style.background = '#ffedd5';
            if(audioCtx) { bJp.gain.setTargetAtTime(1, audioCtx.currentTime, 0.5); bIn.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); bSc.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); bNg.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); }
          } else if(stage === 1) {
            country.innerText = "INDIA"; document.getElementById('globe').style.background = '#7c2d12'; head.style.background = '#b45309';
            if(audioCtx) { bJp.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); bIn.gain.setTargetAtTime(1, audioCtx.currentTime, 0.5); bSc.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); bNg.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); }
          } else if(stage === 2) {
            country.innerText = "SCOTLAND"; document.getElementById('globe').style.background = '#064e3b'; head.style.background = '#fecaca';
            if(audioCtx) { bJp.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); bIn.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); bSc.gain.setTargetAtTime(1, audioCtx.currentTime, 0.5); bNg.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); }
          } else {
            country.innerText = "NIGERIA"; document.getElementById('globe').style.background = '#022c22'; head.style.background = '#451a03';
            if(audioCtx) { bJp.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); bIn.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); bSc.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); bNg.gain.setTargetAtTime(1, audioCtx.currentTime, 0.5); }
          }
        }
      }
      requestAnimationFrame(loop);
    }

    document.getElementById('start-btn').addEventListener('click', function() {
      initAudio(); document.getElementById('pat-jp').style.opacity = 1; this.style.display = 'none'; isStarted = true; loop();
    });

    let isMuted = false;
    document.getElementById('mute-btn').addEventListener('click', function() {
      if(!audioCtx) return; isMuted = !isMuted;
      masterGain.gain.linearRampToValueAtTime(isMuted ? 0 : 0.5, audioCtx.currentTime + 0.3);
    });
  </script>
</body>
</html>
