<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Color Psychology in Fashion</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,600&family=Montserrat:wght@800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html {
      width: 100%; height: 100%; overflow: hidden;
      background: #fafafa; color: #111; font-family: 'Cormorant Garamond', serif;
      overscroll-behavior: none; transition: background 1s, color 1s;
    }

    #scroll-container {
      position: absolute; top: 0; left: 0; width: 100%; height: 5000px;
      opacity: 0; pointer-events: none;
    }

    /* Abstract Figure */
    .figure {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 300px; height: 600px; z-index: 10; display: flex; flex-direction: column; align-items: center;
    }
    
    .head { width: 80px; height: 100px; background: #333; border-radius: 40px; margin-bottom: 20px; transition: background 1s; }
    
    .outfit { width: 100%; height: 300px; background: #fff; border-radius: 40px 40px 10px 10px; transition: all 1s; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
    
    .legs { width: 100px; height: 150px; display: flex; justify-content: space-between; margin-top: 10px; }
    .leg { width: 40px; height: 100%; background: #333; border-radius: 20px; transition: background 1s; }

    /* Floating Abstract Elements to enhance mood */
    .shape { position: absolute; background: #fff; opacity: 0; transition: all 1s; }
    .s1 { top: 20%; left: 20%; width: 100px; height: 100px; border-radius: 50%; }
    .s2 { bottom: 20%; right: 20%; width: 150px; height: 150px; transform: rotate(45deg); }
    .s3 { top: 70%; left: 30%; width: 80px; height: 80px; border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; }

    /* UI */
    .color-name { position: fixed; top: 10%; left: -5%; font-family: 'Montserrat', sans-serif; font-size: 15vw; text-transform: uppercase; z-index: 1; opacity: 0.1; letter-spacing: -5px; transition: all 1s; pointer-events: none; }
    
    .mood-text { position: fixed; top: 50%; right: 10%; transform: translateY(-50%); font-size: 3rem; font-style: italic; max-width: 300px; z-index: 20; text-align: right; transition: opacity 0.5s; opacity: 0; }

    .hud { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); font-family: 'Montserrat', sans-serif; font-size: 0.8rem; letter-spacing: 4px; z-index: 100; mix-blend-mode: difference; color: #fff; }

    .mute-btn { position: fixed; bottom: 20px; right: 20px; font-size: 1.5rem; z-index: 100; cursor: pointer; opacity: 0.5; mix-blend-mode: difference; color: #fff; }
    .start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fafafa; color: #111; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; cursor: pointer; font-size: 2rem; letter-spacing: 3px; font-family: 'Montserrat', sans-serif; }
  </style>
</head>
<body>
  <div class="start-screen" id="start-btn">COLOR PSYCHOLOGY</div>
  <div class="mute-btn" id="mute-btn">🌈</div>

  <div class="color-name" id="c-name">WHITE</div>
  <div class="mood-text" id="m-text">Pure, Clean, Blank Canvas.</div>
  <div class="hud">SCROLL TO FEEL</div>

  <div class="shape s1" id="s1"></div>
  <div class="shape s2" id="s2"></div>
  <div class="shape s3" id="s3"></div>

  <div class="figure">
    <div class="head" id="head"></div>
    <div class="outfit" id="outfit"></div>
    <div class="legs"><div class="leg" id="leg1"></div><div class="leg" id="leg2"></div></div>
  </div>

  <div id="scroll-container"></div>

  <script>
    let currentY = 0; let targetY = 0; let maxScroll = 5000; let isStarted = false; const ease = 0.05;
    
    window.addEventListener('wheel', e => { if(!isStarted) return; e.preventDefault(); targetY += e.deltaY; targetY = Math.max(0, Math.min(targetY, maxScroll)); }, {passive: false});
    let touchY = 0;
    window.addEventListener('touchstart', e => touchY = e.touches[0].clientY);
    window.addEventListener('touchmove', e => { if(!isStarted) return; e.preventDefault(); targetY += (touchY - e.touches[0].clientY) * 1.5; targetY = Math.max(0, Math.min(targetY, maxScroll)); touchY = e.touches[0].clientY; }, {passive: false});

    // Audio
    let audioCtx, masterGain;
    let bWhite, bRed, bBlue, bYellow, bBlack;
    
    function initAudio() {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      audioCtx = new AudioContext(); masterGain = audioCtx.createGain(); masterGain.gain.value = 0.5; masterGain.connect(audioCtx.destination);
      
      // White (Airy noise)
      bWhite = audioCtx.createGain(); bWhite.gain.value = 1;
      const nSrc = audioCtx.createBufferSource(); const nBuf = audioCtx.createBuffer(1, audioCtx.sampleRate, audioCtx.sampleRate);
      for(let i=0; i<audioCtx.sampleRate; i++) nBuf.getChannelData(0)[i] = Math.random()*2-1;
      nSrc.buffer = nBuf; nSrc.loop = true;
      const nFilt = audioCtx.createBiquadFilter(); nFilt.type = 'bandpass'; nFilt.frequency.value = 8000;
      nSrc.connect(nFilt).connect(bWhite).connect(masterGain); nSrc.start();

      // Red (Power - Heavy distorted bass)
      bRed = audioCtx.createGain(); bRed.gain.value = 0;
      const oR = audioCtx.createOscillator(); oR.type = 'sawtooth'; oR.frequency.value = 65.41; // C2
      const fR = audioCtx.createBiquadFilter(); fR.type = 'lowpass'; fR.frequency.value = 200;
      oR.connect(fR).connect(bRed).connect(masterGain); oR.start();

      // Blue (Trust - Smooth calm pad)
      bBlue = audioCtx.createGain(); bBlue.gain.value = 0;
      [261.63, 329.63, 392.00].forEach(f => {
        const oB = audioCtx.createOscillator(); oB.type = 'sine'; oB.frequency.value = f;
        oB.connect(bBlue).connect(masterGain); oB.start();
      });

      // Yellow (Energy - High Arp)
      bYellow = audioCtx.createGain(); bYellow.gain.value = 0;
      setInterval(() => {
        if(isStarted && audioCtx && bYellow.gain.value > 0.1) {
          const oY = audioCtx.createOscillator(); oY.type = 'square'; oY.frequency.value = [523.25, 659.25, 783.99, 1046.50][Math.floor(Math.random()*4)];
          const g = audioCtx.createGain(); g.gain.setValueAtTime(0.2, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime+0.1);
          oY.connect(g).connect(bYellow).connect(masterGain); oY.start(); oY.stop(audioCtx.currentTime+0.1);
        }
      }, 100);

      // Black (Elegance/Mystery - Deep Drone)
      bBlack = audioCtx.createGain(); bBlack.gain.value = 0;
      const oBk = audioCtx.createOscillator(); oBk.type = 'sine'; oBk.frequency.value = 40;
      oBk.connect(bBlack).connect(masterGain); oBk.start();
    }

    let lastStage = -1;

    function loop() {
      if(isStarted) {
        currentY += (targetY - currentY) * ease;
        const progress = currentY / maxScroll; // 0 to 1

        let stage = 0;
        if(progress > 0.2 && progress < 0.4) stage = 1;
        else if(progress >= 0.4 && progress < 0.6) stage = 2;
        else if(progress >= 0.6 && progress < 0.8) stage = 3;
        else if(progress >= 0.8) stage = 4;

        if(stage !== lastStage) {
          lastStage = stage;
          
          const outfit = document.getElementById('outfit');
          const head = document.getElementById('head');
          const leg1 = document.getElementById('leg1'); const leg2 = document.getElementById('leg2');
          const cName = document.getElementById('c-name'); const mText = document.getElementById('m-text');
          const s1 = document.getElementById('s1'); const s2 = document.getElementById('s2'); const s3 = document.getElementById('s3');

          // Trigger text animation
          mText.style.opacity = 0;
          setTimeout(() => { mText.style.opacity = 1; }, 500);

          if(stage === 0) { // White
            document.body.style.background = '#fafafa'; document.body.style.color = '#111';
            cName.innerText = "WHITE"; cName.style.color = '#000';
            mText.innerText = "Pure, Clean, Blank Canvas.";
            outfit.style.background = '#fff'; outfit.style.borderRadius = '40px 40px 10px 10px'; outfit.style.width = '100%';
            head.style.background = '#333'; leg1.style.background = '#333'; leg2.style.background = '#333';
            s1.style.opacity = 0; s2.style.opacity = 0; s3.style.opacity = 0;
            if(audioCtx) { bWhite.gain.setTargetAtTime(1, audioCtx.currentTime, 0.5); bRed.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); bBlue.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); bYellow.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); bBlack.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); }
          } else if(stage === 1) { // Red
            document.body.style.background = '#ffe4e1'; document.body.style.color = '#8b0000';
            cName.innerText = "RED"; cName.style.color = '#ff0000';
            mText.innerText = "Power, Passion, Attention.";
            outfit.style.background = '#e60000'; outfit.style.borderRadius = '10px 10px 100px 100px'; outfit.style.width = '120%'; // Big bold dress
            head.style.background = '#8b0000'; leg1.style.background = '#8b0000'; leg2.style.background = '#8b0000';
            s1.style.opacity = 1; s1.style.background = '#ff4d4d'; s2.style.opacity = 0; s3.style.opacity = 0;
            if(audioCtx) { bWhite.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); bRed.gain.setTargetAtTime(1, audioCtx.currentTime, 0.5); bBlue.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); bYellow.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); bBlack.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); }
          } else if(stage === 2) { // Blue
            document.body.style.background = '#e0f7fa'; document.body.style.color = '#006064';
            cName.innerText = "BLUE"; cName.style.color = '#0000ff';
            mText.innerText = "Trust, Calm, Stability.";
            outfit.style.background = '#0277bd'; outfit.style.borderRadius = '20px'; outfit.style.width = '80%'; // Tailored suit look
            head.style.background = '#01579b'; leg1.style.background = '#01579b'; leg2.style.background = '#01579b';
            s1.style.opacity = 0; s2.style.opacity = 1; s2.style.background = '#4fc3f7'; s3.style.opacity = 0;
            if(audioCtx) { bWhite.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); bRed.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); bBlue.gain.setTargetAtTime(1, audioCtx.currentTime, 0.5); bYellow.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); bBlack.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); }
          } else if(stage === 3) { // Yellow
            document.body.style.background = '#fffde7'; document.body.style.color = '#f57f17';
            cName.innerText = "YELLOW"; cName.style.color = '#ffeb3b';
            mText.innerText = "Energy, Joy, Optimism.";
            outfit.style.background = '#fbc02d'; outfit.style.borderRadius = '50px 10px 50px 10px'; outfit.style.width = '140%'; // Dynamic asymmetrical
            head.style.background = '#f57f17'; leg1.style.background = '#f57f17'; leg2.style.background = '#f57f17';
            s1.style.opacity = 0; s2.style.opacity = 0; s3.style.opacity = 1; s3.style.background = '#ffee58';
            if(audioCtx) { bWhite.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); bRed.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); bBlue.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); bYellow.gain.setTargetAtTime(1, audioCtx.currentTime, 0.5); bBlack.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); }
          } else { // Black
            document.body.style.background = '#111'; document.body.style.color = '#fff';
            cName.innerText = "BLACK"; cName.style.color = '#333';
            mText.innerText = "Elegance, Mystery, Formality.";
            outfit.style.background = '#000'; outfit.style.borderRadius = '0'; outfit.style.width = '60%'; // Sharp, sleek, minimal
            outfit.style.border = '1px solid #333'; outfit.style.boxShadow = '0 0 50px rgba(255,255,255,0.1)';
            head.style.background = '#000'; head.style.border = '1px solid #333';
            leg1.style.background = '#000'; leg1.style.border = '1px solid #333';
            leg2.style.background = '#000'; leg2.style.border = '1px solid #333';
            s1.style.opacity = 0; s2.style.opacity = 0; s3.style.opacity = 0;
            if(audioCtx) { bWhite.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); bRed.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); bBlue.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); bYellow.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); bBlack.gain.setTargetAtTime(1, audioCtx.currentTime, 0.5); }
          }
        }
      }
      requestAnimationFrame(loop);
    }

    document.getElementById('start-btn').addEventListener('click', function() {
      initAudio(); this.style.display = 'none'; isStarted = true; loop();
    });

    let isMuted = false;
    document.getElementById('mute-btn').addEventListener('click', function() {
      if(!audioCtx) return; isMuted = !isMuted;
      masterGain.gain.linearRampToValueAtTime(isMuted ? 0 : 0.5, audioCtx.currentTime + 0.3);
    });
  </script>
</body>
</html>
