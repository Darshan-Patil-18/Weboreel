<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Startup Failure Story</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@300;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html {
      width: 100%; height: 100%; overflow: hidden;
      background: #000; color: #fff; font-family: 'Share Tech Mono', monospace;
      overscroll-behavior: none; transition: background 1s;
    }

    #scroll-container {
      position: absolute; top: 0; left: 0; width: 100%; height: 5000px;
      opacity: 0; pointer-events: none; z-index: 1000;
    }

    canvas {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10;
    }

    /* UI Overlay */
    .ticker {
      position: fixed; top: 5%; right: 5%; font-size: 2rem; color: #0f0; text-align: right; z-index: 20;
    }
    
    .narrative {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-family: 'Inter', sans-serif; font-size: 3rem; font-weight: 700; text-align: center;
      z-index: 30; opacity: 0; transition: opacity 0.5s; pointer-events: none; text-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    .lessons {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-family: 'Inter', sans-serif; font-size: 1.5rem; font-weight: 300; text-align: center;
      z-index: 40; opacity: 0; transition: opacity 2s; color: #aaa; line-height: 2;
    }

    .hud { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); letter-spacing: 2px; z-index: 20; color: #555; }
    
    /* Glitch Effect applied via JS class */
    .glitch { animation: glitch-anim 0.2s infinite; color: #f00 !important; }
    @keyframes glitch-anim {
      0% { transform: translate(0) }
      20% { transform: translate(-2px, 2px) }
      40% { transform: translate(-2px, -2px) }
      60% { transform: translate(2px, 2px) }
      80% { transform: translate(2px, -2px) }
      100% { transform: translate(0) }
    }
  </style>
</head>
<body>
  <div class="ticker" id="ticker">VAL: $1.0M<br><span id="pct">+0.00%</span></div>
  <div class="narrative" id="narrative">THE LAUNCH</div>
  <div class="lessons" id="lessons">Founders split.<br>Burn rate ignored.<br>No market need.<br><br><span style="color:#fff; font-weight:700;">Start again.</span></div>
  <div class="hud" id="hud">SCROLL TO EXPERIENCE</div>

  <canvas id="cvs"></canvas>
  <div id="scroll-container"></div>

  <script>
    const cvs = document.getElementById('cvs');
    const ctx = cvs.getContext('2d');
    let width, height;
    function resize() { width = cvs.width = window.innerWidth; height = cvs.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();

    let currentY = 0; let targetY = 0; let maxScroll = 4000; const ease = 0.05;
    
    let audioInit = false; let audioCtx, masterGain;
    let bUp, bCrash, oAlarm;

    function initAudio() {
      if(audioInit) return; audioInit = true;
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      audioCtx = new AudioContext(); masterGain = audioCtx.createGain(); masterGain.gain.value = 0.5; masterGain.connect(audioCtx.destination);
      
      // Upward ticking
      bUp = audioCtx.createGain(); bUp.gain.value = 1; bUp.connect(masterGain);
      setInterval(() => {
         if(currentY/maxScroll > 0.05 && currentY/maxScroll < 0.6 && Math.abs(targetY-currentY) > 1) {
           const o = audioCtx.createOscillator(); o.type = 'sine'; o.frequency.value = 800 + Math.random()*200;
           const g = audioCtx.createGain(); g.gain.setValueAtTime(0.1, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime+0.05);
           o.connect(g).connect(bUp); o.start(); o.stop(audioCtx.currentTime+0.05);
         }
      }, 50);

      // Crash noise
      bCrash = audioCtx.createGain(); bCrash.gain.value = 0; bCrash.connect(masterGain);
      const nSrc = audioCtx.createBufferSource(); const nBuf = audioCtx.createBuffer(1, audioCtx.sampleRate, audioCtx.sampleRate);
      for(let i=0; i<audioCtx.sampleRate; i++) nBuf.getChannelData(0)[i] = Math.random()*2-1;
      nSrc.buffer = nBuf; nSrc.loop = true;
      const f = audioCtx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 5000;
      nSrc.connect(f).connect(bCrash); nSrc.start();

      // Alarm
      oAlarm = audioCtx.createOscillator(); oAlarm.type = 'square'; oAlarm.frequency.value = 400;
      const gAlarm = audioCtx.createGain(); gAlarm.gain.value = 0;
      oAlarm.connect(gAlarm).connect(masterGain); oAlarm.start();
      
      // Alarm modulation
      setInterval(() => {
        if(currentY/maxScroll >= 0.6 && currentY/maxScroll < 0.9) {
           oAlarm.frequency.setValueAtTime(400, audioCtx.currentTime);
           oAlarm.frequency.setValueAtTime(600, audioCtx.currentTime + 0.25);
           gAlarm.gain.setValueAtTime(0.2, audioCtx.currentTime);
        } else {
           gAlarm.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
        }
      }, 500);
    }

    // Interaction triggers audio unlock
    window.addEventListener('wheel', e => { initAudio(); e.preventDefault(); targetY += e.deltaY; targetY = Math.max(0, Math.min(targetY, maxScroll)); }, {passive: false});
    window.addEventListener('mousedown', initAudio);
    let touchY = 0;
    window.addEventListener('touchstart', e => { initAudio(); touchY = e.touches[0].clientY; });
    window.addEventListener('touchmove', e => { e.preventDefault(); targetY += (touchY - e.touches[0].clientY) * 1.5; targetY = Math.max(0, Math.min(targetY, maxScroll)); touchY = e.touches[0].clientY; }, {passive: false});

    const story = [
      { p: 0, t: "" },
      { p: 0.1, t: "HYPE BUILDS" },
      { p: 0.3, t: "RAPID EXPANSION" },
      { p: 0.5, t: "OVERSCALING" },
      { p: 0.6, t: "SERIES B FAILS" },
      { p: 0.7, t: "LAYOFFS" },
      { p: 0.8, t: "BANKRUPTCY" },
      { p: 0.95, t: "" }
    ];

    // Pre-calculate highly volatile path
    const pData = []; const numP = 200;
    let baseVal = 1;
    for(let i=0; i<=numP; i++) {
      const p = i/numP;
      if(p < 0.6) {
        // Rise with volatility
        baseVal += Math.random() * 2 - 0.5; // Upward bias
        if(baseVal < 1) baseVal = 1;
      } else if (p < 0.9) {
        // Absolute crash
        baseVal -= Math.random() * 10 + 2; // Sharp drop
        if(baseVal < 0.1) baseVal = 0.1;
      } else {
        // Flatline
        baseVal = 0;
      }
      pData.push(baseVal);
    }
    // Normalize data to fit screen height
    const maxVal = Math.max(...pData);
    const points = pData.map((val, i) => {
      return {
        x: (i/numP) * width,
        y: height - 100 - (val/maxVal) * (height - 200)
      };
    });

    let lastNarrative = "";

    function loop() {
      currentY += (targetY - currentY) * ease;
      const progress = currentY / maxScroll; // 0 to 1

      ctx.clearRect(0, 0, width, height);

      // Grid
      ctx.strokeStyle = '#222'; ctx.lineWidth = 1;
      for(let i=0; i<10; i++) { ctx.beginPath(); ctx.moveTo(0, i*(height/10)); ctx.lineTo(width, i*(height/10)); ctx.stroke(); }

      const currentPointIdx = Math.floor(progress * numP);
      const isCrashing = progress >= 0.6 && progress < 0.9;
      const isDead = progress >= 0.9;

      // Draw Path
      if(currentPointIdx > 0 && !isDead) {
        ctx.beginPath(); ctx.moveTo(points[0].x, points[0].y);
        for(let i=1; i<=currentPointIdx; i++) {
          // Add jitter if crashing
          let jX = 0; let jY = 0;
          if(isCrashing) { jX = Math.random()*10-5; jY = Math.random()*20-10; }
          ctx.lineTo(points[i].x + jX, points[i].y + jY);
        }
        ctx.strokeStyle = isCrashing ? '#ff0000' : '#00ff00';
        ctx.lineWidth = isCrashing ? 2 : 4;
        ctx.stroke();

        // Fill
        ctx.lineTo(points[currentPointIdx].x, height); ctx.lineTo(0, height);
        ctx.fillStyle = isCrashing ? 'rgba(255,0,0,0.2)' : 'rgba(0,255,0,0.2)';
        ctx.fill();
      }

      // Flatline
      if(isDead) {
        ctx.beginPath(); ctx.moveTo(0, height-50); ctx.lineTo(width, height-50);
        ctx.strokeStyle = '#ff0000'; ctx.lineWidth = 2; ctx.stroke();
      }

      // UI Updates
      const ticker = document.getElementById('ticker');
      const nar = document.getElementById('narrative');
      const les = document.getElementById('lessons');

      let cText = "";
      story.forEach(s => { if(progress >= s.p) cText = s.t; });
      
      if(cText !== lastNarrative) {
        nar.style.opacity = 0;
        setTimeout(() => { nar.innerText = cText; nar.style.opacity = cText ? 1 : 0; }, 200);
        lastNarrative = cText;
      }

      // Value Update
      const currValRaw = pData[currentPointIdx] || 0;
      const valM = (currValRaw * 10).toFixed(1);
      const pctChange = ((currValRaw / (pData[currentPointIdx-1]||1)) * 100 - 100).toFixed(2);
      
      if(isDead) {
        ticker.style.display = 'none';
        nar.style.display = 'none';
        les.style.opacity = 1;
        document.body.style.background = '#111';
        document.getElementById('hud').style.display = 'none';
      } else {
        ticker.style.display = 'block';
        nar.style.display = 'block';
        les.style.opacity = 0;
        document.body.style.background = isCrashing && Math.random()>0.8 ? '#300' : '#000';
        
        ticker.innerHTML = `VAL: $${valM}M<br><span style="color:${pctChange<0?'#f00':'#0f0'}">${pctChange>0?'+':''}${pctChange}%</span>`;
        if(isCrashing) { ticker.classList.add('glitch'); nar.classList.add('glitch'); }
        else { ticker.classList.remove('glitch'); nar.classList.remove('glitch'); }
      }

      // Audio Mix
      if(audioInit && audioCtx) {
         if(isCrashing) {
            bCrash.gain.setTargetAtTime(1, audioCtx.currentTime, 0.1);
            bUp.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
         } else if(isDead) {
            bCrash.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5);
            if(oAlarm) oAlarm.frequency.setValueAtTime(0, audioCtx.currentTime); // kill alarm
         } else {
            bCrash.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
            bUp.gain.setTargetAtTime(1, audioCtx.currentTime, 0.1);
         }
      }

      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
