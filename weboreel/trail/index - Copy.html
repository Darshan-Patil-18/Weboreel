<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Internet Is Lying To You</title>
<style>
/* Reset and Base */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body, html {
    background-color: #000000;
    color: #00ff41;
    font-family: 'Courier New', Courier, monospace;
    overflow-x: hidden;
    cursor: crosshair;
    line-height: 1.6;
}

/* Custom Scrollbar */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: #000000; }
::-webkit-scrollbar-thumb { background: #00ff41; }
::-webkit-scrollbar-thumb:hover { background: #ff0000; }

/* Scanlines */
body::after {
    content: " ";
    display: block;
    position: fixed;
    top: 0;
    left: 0;
    bottom: 0;
    right: 0;
    background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
    z-index: 10000;
    background-size: 100% 2px, 3px 100%;
    pointer-events: none;
}

/* Background Canvas */
#matrix-canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: -1;
    opacity: 0.35;
}

/* Universal Glitch */
.glitch-flicker {
    animation: random-flicker 4s infinite;
}

@keyframes random-flicker {
    0% { opacity: 1; filter: none; }
    5% { opacity: 0.8; filter: none; }
    10% { opacity: 1; transform: translateX(0); filter: none; }
    12% { opacity: 0.9; transform: translateX(2px); filter: hue-rotate(90deg); }
    14% { opacity: 1; transform: translateX(-2px); filter: none; }
    16% { opacity: 1; transform: translateX(0); filter: none; }
    90% { opacity: 1; filter: none; }
    92% { opacity: 0.7; filter: none; }
    94% { opacity: 1; filter: none; }
    100% { opacity: 1; filter: none; }
}

/* Glitch Heading Text Effect */
.glitch-text {
    position: relative;
    display: inline-block;
    color: #00ff41;
}

.glitch-text::before,
.glitch-text::after {
    content: attr(data-text);
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #000;
}

.glitch-text::before {
    left: 2px;
    text-shadow: -2px 0 red;
    clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
    animation: glitch-anim-1 2.5s infinite linear alternate-reverse;
}

.glitch-text::after {
    left: -2px;
    text-shadow: -2px 0 blue;
    clip-path: polygon(0 55%, 100% 55%, 100% 100%, 0 100%);
    animation: glitch-anim-2 3s infinite linear alternate-reverse;
}

@keyframes glitch-anim-1 {
    0% { clip-path: inset(20% 0 80% 0); }
    20% { clip-path: inset(60% 0 10% 0); }
    40% { clip-path: inset(40% 0 50% 0); }
    60% { clip-path: inset(80% 0 5% 0); }
    80% { clip-path: inset(10% 0 70% 0); }
    100% { clip-path: inset(30% 0 50% 0); }
}

@keyframes glitch-anim-2 {
    0% { clip-path: inset(10% 0 60% 0); }
    20% { clip-path: inset(30% 0 20% 0); }
    40% { clip-path: inset(70% 0 10% 0); }
    60% { clip-path: inset(20% 0 50% 0); }
    80% { clip-path: inset(50% 0 30% 0); }
    100% { clip-path: inset(5% 0 80% 0); }
}

/* UI Elements */
section {
    min-height: 100vh;
    padding: 100px 20px;
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    z-index: 10;
}

h1, h2, h3 { text-transform: uppercase; margin-bottom: 20px; word-wrap: break-word; }
h1 { font-size: clamp(2rem, 5vw, 4rem); }
h2 { font-size: clamp(1.5rem, 4vw, 3rem); }

/* Audio Button */
#mute-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: black;
    color: #00ff41;
    border: 1px solid #00ff41;
    padding: 10px 15px;
    font-family: inherit;
    cursor: crosshair;
    z-index: 200;
    text-transform: uppercase;
    font-weight: bold;
    transition: all 0.2s;
}
#mute-btn:hover { background: #00ff41; color: black; }

/* 1. HERO */
.typewriter {
    overflow: hidden;
    white-space: pre-wrap;
    border-right: .15em solid #00ff41;
    margin: 0 auto;
    animation: blink-caret .75s step-end infinite;
    min-height: 1.6em;
}
@keyframes blink-caret { from, to { border-color: transparent } 50% { border-color: #00ff41; } }

#hero-warning { color: #ff0000; margin-bottom: 20px; font-weight: bold; font-size: clamp(1rem, 2vw, 1.5rem); }
#hero-title-container { display: none; margin-top: 20px; text-align: center; }

#progress-bar-container {
    width: 100%;
    height: 20px;
    border: 1px solid #00ff41;
    margin-top: 30px;
    display: none;
    position: relative;
}
#progress-bar {
    height: 100%;
    background-color: #00ff41;
    width: 0%;
    transition: width 0.1s linear;
}
#access-granted {
    color: #00ff41;
    font-size: 2rem;
    font-weight: bold;
    text-align: center;
    margin-top: 20px;
    display: none;
    animation: flash 0.5s infinite;
}
@keyframes flash { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }

.scroll-indicator {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    display: none;
    animation: pulse 1.5s infinite;
}
.scroll-indicator::after {
    content: "v";
    display: block;
    font-size: 2rem;
}
@keyframes pulse { 0% { opacity: 0.3; transform: translate(-50%, 0); } 50% { opacity: 1; transform: translate(-50%, 10px); } 100% { opacity: 0.3; transform: translate(-50%, 0); } }

/* 2. THE LIES */
.classified-card {
    background: rgba(0, 0, 0, 0.85);
    border: 2px solid #333;
    padding: 30px;
    margin-bottom: 20px;
    position: relative;
    cursor: crosshair;
    transform: perspective(800px) rotateX(-90deg);
    transform-origin: top;
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    opacity: 0;
    font-size: clamp(1rem, 2vw, 1.3rem);
}
.classified-card.reveal {
    transform: perspective(800px) rotateX(0deg);
    opacity: 1;
    border-color: #00ff41;
}
.classified-card::before {
    content: "CLASSIFIED FILE // TOP SECRET";
    position: absolute;
    top: 5px;
    left: 10px;
    font-size: 0.7rem;
    color: #ff0000;
}
.stamp {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(-15deg) scale(3);
    color: #ff0000;
    border: 3px solid #ff0000;
    padding: 5px 15px;
    font-size: clamp(1.5rem, 3vw, 2.5rem);
    font-weight: bold;
    text-transform: uppercase;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.classified-card.reveal .stamp {
    transform: translate(-50%, -50%) rotate(-15deg) scale(1);
    opacity: 0.8;
    transition-delay: 0.5s;
}

/* 3. THE TEST */
.quiz-q {
    margin-bottom: 30px;
    opacity: 0;
    transform: translateX(-20px);
    transition: all 0.4s;
    display: none;
    font-size: clamp(1.2rem, 2vw, 1.5rem);
}
.quiz-q.active {
    display: block;
    opacity: 1;
    transform: translateX(0);
}
.quiz-btn {
    background: transparent;
    color: #00ff41;
    border: 1px solid #00ff41;
    padding: 10px 20px;
    margin-right: 10px;
    font-family: inherit;
    font-size: 1.2rem;
    cursor: crosshair;
    text-transform: uppercase;
    transition: all 0.2s;
}
.quiz-btn:hover { background: #00ff41; color: black; }

/* 4. RESULT */
#result-section { display: none; text-align: center; }
.result-text { font-size: clamp(1.5rem, 3vw, 2.5rem); font-weight: bold; margin-bottom: 20px; min-height: 2em;}
.alert-bg { background-color: rgba(255, 0, 0, 0.15) !important; }

/* 5. ESCAPE PLAN */
.hack-item {
    margin-bottom: 20px;
    opacity: 0;
    font-size: clamp(1.1rem, 2vw, 1.4rem);
    padding-left: 20px;
    position: relative;
}
.hack-item::before { content: ">  "; color: #00ff41; position: absolute; left: -5px; }

/* 6. COMMUNITY WALL */
#wall-input-line {
    display: flex;
    align-items: center;
    margin-bottom: 30px;
    flex-wrap: wrap;
}
#wall-input-prompt {
    color: #00ff41; 
    margin-right: 10px; 
    font-size: clamp(1rem, 2vw, 1.2rem);
}
#wall-input {
    background: transparent;
    border: none;
    border-bottom: 1px solid #333;
    color: #00ff41;
    font-family: inherit;
    font-size: clamp(1rem, 2vw, 1.2rem);
    flex-grow: 1;
    outline: none;
    padding: 5px 0;
    min-width: 200px;
}
#wall-input:focus { border-bottom: 1px solid #00ff41; }
.wall-post {
    border-left: 2px solid #00ff41;
    padding-left: 15px;
    margin-bottom: 20px;
    color: rgba(0, 255, 65, 0.8);
    position: relative;
    overflow: hidden;
    font-size: clamp(1rem, 1.5vw, 1.2rem);
    background: rgba(0, 255, 65, 0.05);
    padding: 10px 10px 10px 15px;
}
.wall-post::before {
    content: "TRANSMISSION RECEIVED // ENCRYPTED";
    display: block;
    font-size: 0.8rem;
    color: #555;
    margin-bottom: 5px;
}

/* 7. FINAL */
#share-btn {
    background: transparent;
    color: #00ff41;
    border: 2px solid #00ff41;
    padding: 15px 30px;
    font-size: clamp(1rem, 2vw, 1.5rem);
    font-family: inherit;
    cursor: crosshair;
    margin-top: 30px;
    text-transform: uppercase;
    transition: all 0.3s;
}
#share-btn:hover {
    background: #00ff41;
    color: black;
    box-shadow: 0 0 15px #00ff41;
}

/* Utilities */
.hidden { display: none !important; }
.text-red { color: #ff0000; text-shadow: 0 0 10px rgba(255,0,0,0.5); }
.text-orange { color: #ff8800; text-shadow: 0 0 10px rgba(255,136,0,0.5); }
.text-green { color: #00ff41; text-shadow: 0 0 10px rgba(0,255,65,0.5); }
</style>
</head>
<body class="glitch-flicker">

<canvas id="matrix-canvas"></canvas>
<button id="mute-btn">[MUTE SIGNAL]</button>

<!-- 1. HERO -->
<section id="s-hero">
    <div id="hero-warning" class="typewriter"></div>
    <div id="hero-title-container">
        <h1 class="glitch-text" data-text="THE INTERNET IS LYING TO YOU">THE INTERNET IS LYING TO YOU</h1>

    </div>
</section>

<section id="s-test">

</section>

<!-- 5. ESCAPE PLAN -->
<section id="s-escape">
    <h2 class="glitch-text" data-text="THE ESCAPE PLAN">THE ESCAPE PLAN</h2>

</section>

<section id="s-wall">

        <span id="wall-input-prompt">root@system:~#</span>

    </div>

        <!-- populated by JS -->
    </div>
</section>

<!-- 7. FINAL SCREEN -->
<section id="s-final" style="text-align: center; display: flex; align-items: center; justify-content: center;">
    <h1 class="glitch-text" data-text="YOU FOUND THE EXIT.">YOU FOUND THE EXIT.</h1>
    <p style="color: #888; margin-top: 10px; font-size: 1.2rem; letter-spacing: 2px;">MOST NEVER DO.</p>
    <div>
        <button id="share-btn">BROADCAST THIS SIGNAL</button>
    </div>
</section>

<script>
// --- AUDIO SYSTEM (Web Audio API) ---
let audioCtx = null;
let droneOsc = null;
let droneGain = null;
let isMuted = true;
let dripInterval = null;

function initAudio() {
    if (audioCtx) return;
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    audioCtx = new AudioContext();

    // Drone hum
    droneOsc = audioCtx.createOscillator();
    droneOsc.type = 'sine';
    droneOsc.frequency.value = 55; // Low hum
    
    droneGain = audioCtx.createGain();
    droneGain.gain.value = 0; // Start muted
    
    droneOsc.connect(droneGain);
    droneGain.connect(audioCtx.destination);
    droneOsc.start();

    // Random digital drips
    dripInterval = setInterval(playDrip, Math.random() * 2000 + 3000);
}

function playDrip() {
    if (!audioCtx || isMuted) return;
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    
    osc.type = 'sine';
    osc.frequency.setValueAtTime(800 + Math.random() * 1000, t);
    osc.frequency.exponentialRampToValueAtTime(100, t + 0.1);
    
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.05, t + 0.05);
    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
    
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + 0.3);
}

function playBeep() {
    if (!audioCtx || isMuted) return;
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    
    osc.type = 'square';
    osc.frequency.setValueAtTime(1200, t);
    
    gain.gain.setValueAtTime(0.05, t);
    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
    
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + 0.1);
}

function playGlitchSound() {
    if (!audioCtx || isMuted) return;
    const t = audioCtx.currentTime;
    const bufferSize = audioCtx.sampleRate * 0.1; // 100ms
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
        data[i] = Math.random() * 2 - 1;
    }
    
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.1, t);
    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
    
    noise.connect(gain);
    gain.connect(audioCtx.destination);
    noise.start(t);
}

function playEerieTone() {
    if (!audioCtx || isMuted) return;
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    
    osc.type = 'sine';
    osc.frequency.setValueAtTime(1200, t);
    osc.frequency.linearRampToValueAtTime(1400, t + 5);
    
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.2, t + 2);
    gain.gain.linearRampToValueAtTime(0, t + 5);
    
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + 5);
}

document.getElementById('mute-btn').addEventListener('click', (e) => {
    initAudio();
    isMuted = !isMuted;
    e.target.innerText = isMuted ? "[MUTE SIGNAL]" : "[AUDIO ACTIVE]";
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    if (!isMuted) {
        droneGain.gain.setTargetAtTime(0.05, audioCtx.currentTime, 0.5);
        playBeep();
    } else {
        droneGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5);
    }
});

// Play beep on ANY click
document.addEventListener('click', (e) => {
    if(e.target.id !== 'mute-btn') {
        initAudio(); // just in case they haven't unmuted but interacted
        playBeep();
    }
});


// --- MATRIX CANVAS ---
const canvas = document.getElementById('matrix-canvas');
const ctx = canvas.getContext('2d');
let cw = canvas.width = window.innerWidth;
let ch = canvas.height = window.innerHeight;
window.addEventListener('resize', () => {
    cw = canvas.width = window.innerWidth;
    ch = canvas.height = window.innerHeight;
});
const cols = Math.floor(cw / 20);
const ypos = Array(cols).fill(0);

function drawMatrix() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
    ctx.fillRect(0, 0, cw, ch);
    ctx.fillStyle = '#00ff41';
    ctx.font = '15pt monospace';
    
    ypos.forEach((y, ind) => {
        const text = String.fromCharCode(Math.random() * 128);
        const x = ind * 20;
        ctx.fillText(text, x, y);
        if (y > 100 + Math.random() * 10000) ypos[ind] = 0;
        else ypos[ind] = y + 20;
    });
}
setInterval(drawMatrix, 50);

// --- TYPEWRITER SYSTEM ---
async function typeLine(element, text, speed = 50) {
    element.innerHTML = '';
    return new Promise(resolve => {
        let i = 0;
        const interval = setInterval(() => {
            element.innerHTML += text.charAt(i);
            i++;
            if (i >= text.length) {
                clearInterval(interval);
                resolve();
            }
        }, speed);
    });
}

function triggerGlitchEffect() {
    document.body.style.transform = `translate(${Math.random()*10-5}px, ${Math.random()*10-5}px)`;
    document.body.style.filter = `hue-rotate(${Math.random()*90}deg) invert(${Math.random()*20}%)`;
    playGlitchSound();
    setTimeout(() => {
        document.body.style.transform = "none";
        document.body.style.filter = "none";
    }, 150);
}

// --- 1. HERO LOGIC ---
window.onload = async () => {
    const warnTxt = "WARNING: What you are about to read cannot be unseen.";
    const warnEl = document.getElementById('hero-warning');
    await typeLine(warnEl, warnTxt, 80);
    
    setTimeout(() => {
        triggerGlitchEffect();
        document.getElementById('hero-title-container').style.display = 'block';
        
        const pbc = document.getElementById('progress-bar-container');
        pbc.style.display = 'block';
        const pb = document.getElementById('progress-bar');
        
        let w = 0;
        const progressInt = setInterval(() => {
            w += Math.random() * 15;
            if (w >= 100) {
                w = 100;
                clearInterval(progressInt);
                pbc.style.display = 'none';
                document.getElementById('loading-text').style.display = 'none';
                document.getElementById('access-granted').style.display = 'block';
                document.getElementById('scroll-ind').style.display = 'block';
                playBeep();
            }
            pb.style.width = w + '%';
        }, 200);
    }, 500);
};

// --- 2. THE LIES ---
const liesData = [
    "You are shown only what algorithms WANT you to see",
    "Your attention is being sold 847 times per day",
    "The average person touches their phone 2,617 times daily",
    "Social media is engineered to feel like a slot machine",
    "You have seen 10,000 ads this week. Named 3."
];
const liesContainer = document.getElementById('lies-container');
liesData.forEach(lie => {
    const el = document.createElement('div');
    el.className = 'classified-card';
    el.innerHTML = `
        <p style="margin-top: 15px;">${lie}</p>
        <div class="stamp">DECLASSIFIED</div>
    `;
    liesContainer.appendChild(el);
});

// Intersection Observer for scroll animations
const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            // Delay for stagger
            const idx = Array.from(entry.target.parentNode.children).indexOf(entry.target);
            setTimeout(() => {
                entry.target.classList.add('reveal');
                playBeep();
            }, idx * 250);
            observer.unobserve(entry.target);
        }
    });
}, { threshold: 0.5 });

document.querySelectorAll('.classified-card').forEach(c => observer.observe(c));

// --- 3. THE TEST ---
const quizData = [
    "Do you check your phone within 5 mins of waking up?",
    "Have you doomscrolled for 1+ hour this week?",
    "Do you feel anxious without your phone?",
    "Have you compared yourself to someone online recently?",
    "Do you remember what you watched yesterday?"
];
const quizContainer = document.getElementById('quiz-container');
let quizScore = 0;
let currentQ = 0;

function renderQuiz() {
    quizContainer.innerHTML = '';
    if (currentQ < quizData.length) {
        const qDiv = document.createElement('div');
        qDiv.className = 'quiz-q active';
        qDiv.innerHTML = `
            <p>> ${quizData[currentQ]}</p>
            <div style="margin-top: 20px;">
                <button class="quiz-btn" onclick="answerQuiz(true)">YES</button>
                <button class="quiz-btn" onclick="answerQuiz(false)">NO</button>
            </div>
            <p style="margin-top: 15px; color: #555; font-size: 0.9rem;">Diagnostic Subject ${currentQ+1}/5</p>
        `;
        quizContainer.appendChild(qDiv);
    } else {
        showResult();
    }
}

function answerQuiz(isYes) {
    if (isYes) quizScore++;
    triggerGlitchEffect();
    currentQ++;
    renderQuiz();
}

renderQuiz();

// --- 4. RESULT ---
function showResult() {
    const sTest = document.getElementById('s-test');
    sTest.innerHTML = '<h2 class="glitch-text" data-text="DIAGNOSTIC COMPLETE">DIAGNOSTIC COMPLETE</h2><p style="color: #555; margin-top:20px;">Scroll down for analysis.</p>';
    
    // Smoothly reveal
    setTimeout(() => {
        const resSec = document.getElementById('s-result');
        resSec.style.display = 'flex';
        
        // Let it layout then scroll to it maybe? Or just intersection observer
    }, 500);
}

const resultObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            let txt = "";
            let colorClass = "";
            if (quizScore <= 2) {
                txt = "You escaped the matrix. Rare. Very rare.";
                colorClass = "text-green";
            } else if (quizScore <= 4) {
                txt = "You are partially plugged in. Wake up.";
                colorClass = "text-orange";
            } else {
                txt = "You are fully in the matrix. They own you.";
                colorClass = "text-red";
                document.body.classList.add('alert-bg');
            }
            
            const statusEl = document.getElementById('result-status');
            statusEl.className = `result-text typewriter ${colorClass}`;
            triggerGlitchEffect();
            playEerieTone();
            typeLine(statusEl, txt, 60);

            resultObserver.unobserve(entry.target);
        }
    });
}, { threshold: 0.5 });

resultObserver.observe(document.getElementById('s-result'));


// --- 5. ESCAPE PLAN ---
const hacksData = [
    "Delete 3 apps you haven't used in 30 days",
    "No phone for first 30 mins after waking",
    "Turn all notifications off except calls",
    "Replace 1 scroll session with 10 mins outside",
    "Unfollow anyone who makes you feel less"
];
const hacksContainer = document.getElementById('hacks-container');
hacksData.forEach(h => {
    const hEl = document.createElement('div');
    hEl.className = 'hack-item';
    hEl.innerText = h;
    hacksContainer.appendChild(hEl);
});

const hackObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            triggerGlitchEffect();
            let idx = Array.from(hacksContainer.children).indexOf(entry.target);
            setTimeout(() => {
                entry.target.style.opacity = '1';
                typeLine(entry.target, entry.target.innerText, 30);
                playBeep();
            }, idx * 800);
            hackObserver.unobserve(entry.target);
        }
    });
}, { threshold: 0.8 });

document.querySelectorAll('.hack-item').forEach(h => hackObserver.observe(h));

// --- 6. COMMUNITY WALL ---
const wallInput = document.getElementById('wall-input');
const wallPosts = document.getElementById('wall-posts');

function loadWall() {
    wallPosts.innerHTML = '';
    const posts = JSON.parse(localStorage.getItem('matrix_plans')) || [
        "Deleted Instagram. First time I saw the sky in months.",
        "Phone goes in a drawer at 8PM every night.",
        "Turned screen grayscale. Boring, but it works."
    ]; // some default dummy data to populate
    posts.slice(-5).reverse().forEach(p => addToWallDOM(p));
}

function addToWallDOM(text) {
    const pEl = document.createElement('div');
    pEl.className = 'wall-post';
    pEl.innerText = text;
    wallPosts.prepend(pEl);
}

wallInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter' && wallInput.value.trim() !== '') {
        triggerGlitchEffect();
        const text = wallInput.value.trim();
        let posts = JSON.parse(localStorage.getItem('matrix_plans')) || [];
        posts.push(text);
        localStorage.setItem('matrix_plans', JSON.stringify(posts));
        addToWallDOM(text);
        wallInput.value = '';
    }
});

loadWall();

// --- 7. FINAL SCREEN ---
document.getElementById('share-btn').addEventListener('click', (e) => {
    navigator.clipboard.writeText("The internet is lying to you. I took the test. Wake up. [Url]");
    e.target.innerText = "SIGNAL BROADCASTED (COPIED)";
    triggerGlitchEffect();
    setTimeout(() => {
        e.target.innerText = "BROADCAST THIS SIGNAL";
    }, 3000);
});

// Random screen glitches independent of scroll/interaction
setInterval(() => {
    if (Math.random() > 0.8) {
        document.body.style.filter = `hue-rotate(${Math.random()*90}deg)`;
        setTimeout(() => document.body.style.filter = 'none', 100);
    }
}, 4000);

</script>
