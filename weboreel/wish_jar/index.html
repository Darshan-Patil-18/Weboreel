<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wish Jar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital@1&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #050810;
      --glow-blue: rgba(100, 180, 255, 0.6);
      --jar-glass: rgba(180, 220, 255, 0.06);
      --jar-border: rgba(180, 220, 255, 0.25);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--navy);
      color: white;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    #stars {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      opacity: 0.4;
    }

    .jar-wrapper {
      position: relative;
      width: 220px;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 10;
      cursor: pointer;
      margin-bottom: 40px;
    }

    @media (max-width: 600px) {
      .jar-wrapper {
        transform: scale(0.81); /* Scales roughly to 180px wide */
        margin-bottom: 20px;
      }
    }

    .jar-glow {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(100,150,255,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: -1;
      transition: all 1s ease;
    }

    .jar-body.active + .jar-glow {
      background: radial-gradient(circle, rgba(100,180,255,0.2) 0%, transparent 70%);
    }

    .jar-lid {
      width: 120px; height: 18px;
      border-radius: 6px;
      background: rgba(180,220,255,0.12);
      border: 2px solid rgba(180,220,255,0.3);
      z-index: 3;
    }

    .jar-neck {
      width: 100px; height: 30px;
      border-radius: 8px 8px 0 0;
      border: 2px solid var(--jar-border);
      border-bottom: none;
      z-index: 2;
      position: relative;
      top: -2px;
    }

    .jar-body {
      width: 220px; height: 260px;
      border-radius: 10px 10px 40px 40px;
      background: var(--jar-glass);
      border: 2px solid var(--jar-border);
      box-shadow: inset 0 0 40px rgba(100,180,255,0.05), 0 0 30px rgba(100,180,255,0.1);
      overflow: hidden;
      position: relative;
      z-index: 1;
      top: -4px;
      transition: box-shadow 1s ease;
    }

    .jar-body.active {
      box-shadow: inset 0 0 60px rgba(100,180,255,0.15), 0 0 60px rgba(100,180,255,0.4);
    }

    .glass-shine {
      position: absolute;
      left: 12px; top: 20px;
      width: 8px; height: 140px;
      background: linear-gradient(to bottom, rgba(255,255,255,0.15), transparent);
      border-radius: 4px;
      pointer-events: none;
      z-index: 2;
    }

    canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
    }

    .tooltip {
      position: absolute;
      top: -45px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.1rem;
      color: white;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      white-space: nowrap;
      background: rgba(0,0,0,0.4);
      padding: 6px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      z-index: 20;
    }

    .input-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 10;
    }

    .wish-label {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.2rem;
      color: rgba(255,255,255,0.5);
      margin-bottom: 8px;
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 12px;
      position: relative;
    }

    input {
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(255,255,255,0.2);
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      width: 280px;
      padding: 0.8rem 0;
      outline: none;
      transition: border-color 0.3s ease;
    }

    @media (max-width: 600px) {
      input { width: 240px; }
    }

    input:focus {
      border-bottom: 1px solid var(--glow-blue);
    }

    button#throwBtn {
      background: rgba(100,180,255,0.15);
      border: 1px solid rgba(100,180,255,0.3);
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      white-space: nowrap;
    }

    button#throwBtn:hover {
      background: rgba(100,180,255,0.3);
    }

    .wish-count {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.4);
      margin-top: 14px;
    }

    #muteBtn {
      position: fixed;
      bottom: 20px; right: 20px;
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.3);
      font-family: 'DM Sans', sans-serif;
      font-size: 1.2rem;
      cursor: pointer;
      z-index: 100;
      transition: color 0.3s;
    }

    #muteBtn:hover {
      color: rgba(255,255,255,0.6);
    }

    .floating-wish {
      position: fixed;
      left: 50%;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      color: white;
      font-size: 0.9rem;
      pointer-events: none;
      z-index: 15;
      white-space: nowrap;
      animation: floatUp 800ms cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }

    @keyframes floatUp {
      0% { transform: translate(-50%, 0) scale(1); opacity: 1; }
      100% { transform: translate(-50%, -200px) scale(0.3); opacity: 0; }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      50% { transform: translateX(5px); }
      75% { transform: translateX(-5px); }
    }

    .shake {
      animation: shake 0.3s ease-in-out;
    }
  </style>
</head>
<body>
  <div id="stars"></div>
  <div class="jar-wrapper" id="jarWrapper">
    <div id="tooltip" class="tooltip"></div>
    <div class="jar-lid"></div>
    <div class="jar-neck"></div>
    <div class="jar-body">
      <div class="glass-shine"></div>
      <canvas id="jarCanvas"></canvas>
    </div>
    <div class="jar-glow" id="jarGlow"></div>
  </div>
  
  <div class="input-section">
    <div class="wish-label">✨ Make a wish</div>
    <div class="input-row">
      <input type="text" id="wishInput" placeholder="Type a wish and press Enter..." maxlength="60" autocomplete="off">
      <button id="throwBtn">Throw &uarr;</button>
    </div>
    <div class="wish-count" id="wishCount">3 wishes inside</div>
  </div>

  <button id="muteBtn">🔊</button>

  <script>
    // Stars Background
    const starsContainer = document.getElementById('stars');
    for(let i=0; i<30; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      const size = Math.random() * 2 + 1;
      star.style.width = size + 'px';
      star.style.height = size + 'px';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      starsContainer.appendChild(star);
    }

    // Canvas Setup
    const canvas = document.getElementById('jarCanvas');
    const ctx = canvas.getContext('2d');
    let cw, ch;
    function resizeCanvas() {
      const rect = canvas.parentElement.getBoundingClientRect();
      cw = canvas.width = rect.width;
      ch = canvas.height = rect.height;
    }
    resizeCanvas();

    // Audio Setup
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let isMuted = false;
    let ambientNode = null;
    let audioInitialized = false;

    function initAudio() {
      if (audioInitialized) return;
      audioCtx.resume();
      
      ambientNode = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      ambientNode.type = 'sine';
      ambientNode.frequency.value = 180;
      gain.gain.value = isMuted ? 0 : 0.015;
      ambientNode.connect(gain);
      gain.connect(audioCtx.destination);
      ambientNode.start();
      
      ambientNode.gainNode = gain;
      audioInitialized = true;
    }

    function playSound(type) {
      if (isMuted || !audioInitialized) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      
      const now = audioCtx.currentTime;
      
      if (type === 'throw') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, now);
        osc.frequency.exponentialRampToValueAtTime(1200, now + 0.2);
        gain.gain.setValueAtTime(0, now);
        gain.gain.linearRampToValueAtTime(0.1, now + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
        osc.start(now);
        osc.stop(now + 0.4);
      } else if (type === 'appear') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(1600, now);
        osc.frequency.exponentialRampToValueAtTime(800, now + 0.15);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
        osc.start(now);
        osc.stop(now + 0.15);
      } else if (type === 'scatter') {
        [400, 600, 800].forEach((freq, i) => {
          const o = audioCtx.createOscillator();
          const g = audioCtx.createGain();
          o.connect(g);
          g.connect(audioCtx.destination);
          const start = now + i * 0.08;
          o.frequency.setValueAtTime(freq, start);
          g.gain.setValueAtTime(0.1, start);
          g.gain.exponentialRampToValueAtTime(0.001, start + 0.1);
          o.start(start);
          o.stop(start + 0.1);
        });
      }
    }

    document.getElementById('muteBtn').addEventListener('click', (e) => {
      isMuted = !isMuted;
      e.target.textContent = isMuted ? '🔇' : '🔊';
      if (ambientNode) {
        ambientNode.gainNode.gain.setTargetAtTime(isMuted ? 0 : 0.015, audioCtx.currentTime, 0.1);
      }
    });

    document.body.addEventListener('click', initAudio, { once: true });
    document.body.addEventListener('keydown', initAudio, { once: true });

    // Fireflies Logic
    const fireflies = [];
    const colors = [
      '255, 220, 100', // gold
      '100, 200, 255', // blue
      '100, 255, 180', // green
      '255, 180, 220', // pink
      '255, 255, 255'  // white
    ];

    function addFirefly(wishText, x, y) {
      if (fireflies.length >= 50) fireflies.shift();
      
      fireflies.push({
        x: x || cw / 2 + (Math.random() * 40 - 20),
        y: y || 20,
        vx: (Math.random() - 0.5) * 0.8,
        vy: (Math.random() - 0.5) * 0.8,
        size: Math.random() * 3 + 3,
        opacity: Math.random() * 0.4 + 0.6,
        pulseSpeed: Math.random() * 0.05 + 0.02,
        pulseOffset: Math.random() * Math.PI * 2,
        color: colors[Math.floor(Math.random() * colors.length)],
        wish: wishText,
        scattered: false
      });
      
      document.getElementById('wishCount').textContent = `${fireflies.length} wishes inside`;
    }

    addFirefly("I wish to build something people love", 110, 150);
    addFirefly("I wish for one good day", 130, 190);
    addFirefly("I wish this feeling lasts", 80, 210);

    let time = 0;
    let mouseX = -100;
    let mouseY = -100;
    let nearestFirefly = null;
    const jarWrapper = document.getElementById('jarWrapper');
    const tooltip = document.getElementById('tooltip');

    jarWrapper.addEventListener('mousemove', (e) => {
      const rect = canvas.getBoundingClientRect();
      mouseX = e.clientX - rect.left;
      mouseY = e.clientY - rect.top;
    });

    jarWrapper.addEventListener('mouseleave', () => {
      mouseX = -100;
      mouseY = -100;
      tooltip.style.opacity = 0;
      nearestFirefly = null;
    });

    jarWrapper.addEventListener('click', () => {
      if (fireflies.length === 0) return;
      playSound('scatter');
      fireflies.forEach(f => {
        f.vx *= 5;
        f.vy *= 5;
        f.scattered = true;
        setTimeout(() => {
          f.vx /= 5;
          f.vy /= 5;
          f.scattered = false;
        }, 500);
      });
    });

    function draw() {
      ctx.clearRect(0, 0, cw, ch);
      time += 1;
      
      let minDist = Infinity;
      let currentNearest = null;

      fireflies.forEach(f => {
        if (!f.scattered) {
          f.x += Math.sin(time * f.pulseSpeed) * 0.3;
        }
        f.x += f.vx;
        f.y += f.vy;
        
        if (f.x < f.size) { f.x = f.size; f.vx *= -1; }
        if (f.x > cw - f.size) { f.x = cw - f.size; f.vx *= -1; }
        if (f.y < f.size) { f.y = f.size; f.vy *= -1; }
        if (f.y > ch - f.size) { f.y = ch - f.size; f.vy *= -1; }
        
        const dist = Math.hypot(f.x - mouseX, f.y - mouseY);
        if (dist < 40 && dist < minDist) {
          minDist = dist;
          currentNearest = f;
        }

        const currentOpacity = f.opacity * (Math.sin(time * f.pulseSpeed + f.pulseOffset) * 0.3 + 0.7);
        let isHovered = (currentNearest === f);
        let size = isHovered ? f.size * 1.5 : f.size;
        let glowRadius = isHovered ? 24 : 12;

        const gradient = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, glowRadius);
        gradient.addColorStop(0, `rgba(${f.color}, ${currentOpacity})`);
        gradient.addColorStop(1, `rgba(${f.color}, 0)`);
        
        ctx.beginPath();
        ctx.arc(f.x, f.y, glowRadius, 0, Math.PI * 2);
        ctx.fillStyle = gradient;
        ctx.fill();
        
        ctx.beginPath();
        ctx.arc(f.x, f.y, isHovered ? 4 : 3, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${currentOpacity})`;
        ctx.fill();
      });
      
      if (currentNearest) {
        if (nearestFirefly !== currentNearest) {
          tooltip.textContent = currentNearest.wish;
          tooltip.style.opacity = 0.8;
          nearestFirefly = currentNearest;
        }
      } else {
        tooltip.style.opacity = 0;
        nearestFirefly = null;
      }

      requestAnimationFrame(draw);
    }
    draw();

    // Interaction
    const input = document.getElementById('wishInput');
    const throwBtn = document.getElementById('throwBtn');
    const jarBody = document.querySelector('.jar-body');

    function throwWish() {
      const text = input.value.trim();
      if (!text) {
        input.classList.add('shake');
        setTimeout(() => input.classList.remove('shake'), 300);
        return;
      }
      
      playSound('throw');
      
      const rect = input.getBoundingClientRect();
      const floating = document.createElement('div');
      floating.className = 'floating-wish';
      floating.textContent = text;
      floating.style.top = rect.top + 'px';
      document.body.appendChild(floating);
      
      input.value = '';
      
      setTimeout(() => {
        floating.remove();
        addFirefly(text);
        playSound('appear');
        
        jarBody.classList.add('active');
        setTimeout(() => {
          jarBody.classList.remove('active');
        }, 1000);
        
      }, 600);
    }

    throwBtn.addEventListener('click', throwWish);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') throwWish();
    });
  </script>
</body>
</html>
