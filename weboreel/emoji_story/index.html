<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>emoji_story</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;700&display=swap');

  body, html {
    margin: 0; padding: 0; width: 100vw; height: 100vh; background: #fafafa;
    font-family: 'DM Sans', sans-serif; overflow: hidden; display: flex; flex-direction: column;
  }

  #timeline-container {
    flex-grow: 1; position: relative; overflow-x: auto; overflow-y: hidden;
    white-space: nowrap; padding: 40vh 50px 0 50px; scroll-behavior: smooth;
  }

  .timeline-line {
    position: absolute; top: 45vh; left: 0; width: 10000px; height: 4px;
    background: #e0e0e0; z-index: 0; border-radius: 2px;
  }

  .emoji-node {
    display: inline-block; position: relative; margin-right: 40px; z-index: 10;
    animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    cursor: pointer; transform-origin: bottom center;
  }

  .emoji-char { font-size: 3rem; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); transition: transform 0.2s; }
  .emoji-node:hover .emoji-char { transform: scale(1.3) translateY(-10px); }

  .emoji-date {
    position: absolute; top: 60px; left: 50%; transform: translateX(-50%);
    font-size: 0.8rem; color: #888; opacity: 0; transition: opacity 0.3s;
  }
  .emoji-node:hover .emoji-date { opacity: 1; }

  @keyframes popIn {
    0% { transform: scale(0) translateY(50px); opacity: 0; }
    100% { transform: scale(1) translateY(0); opacity: 1; }
  }

  #toolbar {
    height: auto; background: #fff; border-top: 1px solid #eee;
    padding: 20px; box-shadow: 0 -4px 20px rgba(0,0,0,0.05); z-index: 100;
  }

  .category-tabs { display: flex; gap: 15px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
  .tab { padding: 8px 16px; border-radius: 20px; background: #f0f0f0; border: none; cursor: pointer; font-weight: 700; color: #555; transition: all 0.2s;}
  .tab.active { background: #000; color: #fff; }

  #emoji-picker { display: flex; gap: 15px; overflow-x: auto; font-size: 2rem; padding-bottom: 10px; }
  .pick-emoji { cursor: pointer; transition: transform 0.2s; }
  .pick-emoji:hover { transform: scale(1.3); }

  /* Audio Context is invisible */
</style>
</head>
<body>

<div id="timeline-container">
  <div class="timeline-line" id="line"></div>
</div>

<div id="toolbar">
  <div class="category-tabs" id="tabs"></div>
  <div id="emoji-picker"></div>
</div>

<script>
  const categories = {
    'Milestones': ['👶', '🎒', '🎓', '💼', '💍', '🏠', '👶', '👴', '🪦'],
    'Emotions': ['😊', '😂', '😭', '😡', '😱', '😍', '🤔', '😴', '🥳'],
    'Travel': ['🚗', '✈️', '🚂', '🛳️', '🏖️', '🏔️', '🗼', '🗽', '⛺'],
    'Hobbies': ['⚽', '🎸', '🎨', '🎮', '📚', '🏃‍♂️', '🍳', '📸', '🎧'],
    'Nature': ['☀️', '🌧️', '❄️', '🌸', '🍂', '🌲', '🌊', '🔥', '🌙']
  };

  const tabsEl = document.getElementById('tabs');
  const pickerEl = document.getElementById('emoji-picker');
  const timelineEl = document.getElementById('timeline-container');
  const lineEl = document.getElementById('line');

  // Audio
  let actx;
  function initAudio() {
    if(!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  }
  
  function playPop() {
    if(!actx) return;
    const osc = actx.createOscillator(); osc.type = 'sine';
    const g = actx.createGain();
    osc.frequency.setValueAtTime(600 + Math.random()*200, actx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(1200, actx.currentTime+0.1);
    g.gain.setValueAtTime(0.3, actx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, actx.currentTime+0.1);
    osc.connect(g); g.connect(actx.destination); osc.start(); osc.stop(actx.currentTime+0.1);
  }

  // Setup UI
  let activeCategory = 'Milestones';

  function renderPicker() {
    pickerEl.innerHTML = '';
    categories[activeCategory].forEach(em => {
      let span = document.createElement('span'); span.className = 'pick-emoji'; span.innerText = em;
      span.onclick = () => addEmojiToTimeline(em);
      pickerEl.appendChild(span);
    });
  }

  function renderTabs() {
    tabsEl.innerHTML = '';
    Object.keys(categories).forEach(cat => {
      let btn = document.createElement('button');
      btn.className = 'tab' + (cat === activeCategory ? ' active' : '');
      btn.innerText = cat;
      btn.onclick = () => {
        activeCategory = cat; renderTabs(); renderPicker();
      };
      tabsEl.appendChild(btn);
    });
  }

  let year = 2024;
  function addEmojiToTimeline(em) {
    initAudio(); playPop();
    
    let node = document.createElement('div');
    node.className = 'emoji-node';
    
    let char = document.createElement('div');
    char.className = 'emoji-char'; char.innerText = em;
    
    let date = document.createElement('div');
    date.className = 'emoji-date'; date.innerText = year++;
    
    node.appendChild(char); node.appendChild(date);
    timelineEl.appendChild(node);
    
    // Extend line
    lineEl.style.width = Math.max(10000, timelineEl.scrollWidth + 500) + 'px';
    
    // Scroll to right
    setTimeout(() => timelineEl.scrollTo({left: timelineEl.scrollWidth, behavior: 'smooth'}), 100);
  }

  renderTabs(); renderPicker();

  // Initial prompt
  document.body.addEventListener('click', () => initAudio(), {once:true});

</script>
</body>
</html>
