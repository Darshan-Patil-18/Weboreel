<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>The Human Body</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html {
      width: 100%; height: 100%; overflow: hidden;
      background: #000; color: #fff; font-family: 'Space Mono', monospace;
      overscroll-behavior: none;
    }

    #scroll-container {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; justify-content: center; align-items: center;
      perspective: 1000px;
    }

    #zoom-container {
      position: relative; width: 100vw; height: 100vh;
      transform-style: preserve-3d; will-change: transform;
    }

    /* Fixed UI Overlay */
    .hud {
      position: fixed; top: 20px; left: 20px; z-index: 100; pointer-events: none;
      color: #0f0; text-shadow: 0 0 10px #0f0; display: flex; flex-direction: column; gap: 5px;
    }
    .hud span { font-size: 0.9rem; }
    .scale-meter { position: fixed; right: 20px; top: 50%; transform: translateY(-50%); color: #0ff; z-index: 100; writing-mode: vertical-rl; letter-spacing: 5px; }

    /* Layers */
    .layer {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center;
      opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    .layer-label { position: absolute; top: 20%; text-align: center; font-size: 2rem; letter-spacing: 10px; color: #fff; text-shadow: 0 0 20px rgba(255,255,255,0.5); }

    /* 1. Skin */
    #l-skin { background: radial-gradient(circle, #eecdb3, #c89666); }
    .pore { position: absolute; width: 2px; height: 2px; background: rgba(0,0,0,0.1); border-radius: 50%; }

    /* 2. Circulatory */
    #l-veins { background: #1a0505; }
    .vein { position: absolute; width: 100%; height: 4px; background: #800; filter: blur(2px); box-shadow: 0 0 10px #f00; transform-origin: center; animation: pulseVein 1s infinite alternate; }
    .vein.blue { background: #008; box-shadow: 0 0 10px #00f; }
    @keyframes pulseVein { 0% { opacity: 0.5; } 100% { opacity: 1; transform: scale(1.05); } }

    /* 3. Heart */
    #l-heart { background: radial-gradient(circle, #300, #000); }
    .heart-shape {
      width: 200px; height: 200px; background: #f00; border-radius: 50% 50% 0 0;
      transform: rotate(45deg); filter: blur(10px) drop-shadow(0 0 50px #f00); animation: heartbeat 1s infinite cubic-bezier(0.215, 0.61, 0.355, 1);
    }
    .heart-shape::before { content: ''; position: absolute; top: 0; left: -100px; width: 200px; height: 200px; background: #f00; border-radius: 50%; }
    @keyframes heartbeat { 0% { transform: rotate(45deg) scale(1); } 20% { transform: rotate(45deg) scale(1.2); } 40% { transform: rotate(45deg) scale(1); } 60% { transform: rotate(45deg) scale(1.1); } 80% { transform: rotate(45deg) scale(1); } 100% { transform: rotate(45deg) scale(1); } }

    /* 4. Bloodstream */
    #l-blood { background: #300; }
    .rbc { position: absolute; width: 80px; height: 80px; background: radial-gradient(circle at 30% 30%, #f55, #800); border-radius: 50%; border: 4px solid #600; box-shadow: inset 0 0 20px #400; animation: floatRBC 3s infinite linear; }
    .rbc::after { content: ''; position: absolute; top: 20px; left: 20px; width: 40px; height: 40px; border-radius: 50%; background: rgba(0,0,0,0.2); filter: blur(5px); }
    @keyframes floatRBC { 0% { transform: translateX(-50vw) rotate(0deg); } 100% { transform: translateX(50vw) rotate(360deg); } }

    /* 5. Cell */
    #l-cell { background: radial-gradient(circle, #050a1a, #000); }
    .nucleus { width: 300px; height: 300px; background: radial-gradient(circle, #00f, #005); border-radius: 50%; filter: blur(5px); box-shadow: 0 0 100px #00f; display: flex; justify-content: center; align-items: center; }
    .nucleolus { width: 100px; height: 100px; background: #fff; border-radius: 50%; filter: blur(10px); }

    /* 6. DNA */
    #l-dna { background: #0a001a; }
    .dna-strand { display: flex; flex-direction: column; gap: 20px; perspective: 500px; }
    .base-pair { width: 300px; height: 10px; display: flex; justify-content: space-between; position: relative; transform-style: preserve-3d; animation: dnaRotate 5s infinite linear; }
    .base-pair::before { content: ''; position: absolute; top: 4px; left: 0; width: 100%; height: 2px; background: rgba(255,255,255,0.2); }
    .base { width: 20px; height: 20px; border-radius: 50%; }
    .base.a { background: #f00; box-shadow: 0 0 10px #f00; } .base.t { background: #0f0; box-shadow: 0 0 10px #0f0; }
    .base.c { background: #00f; box-shadow: 0 0 10px #00f; } .base.g { background: #ff0; box-shadow: 0 0 10px #ff0; }
    @keyframes dnaRotate { 100% { transform: rotateY(360deg); } }

    .mute-btn { position: fixed; bottom: 20px; right: 20px; font-size: 1.5rem; z-index: 100; cursor: pointer; opacity: 0.5; color: white; }
    .start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #fff; display: flex; justify-content: center; align-items: center; z-index: 1000; cursor: pointer; font-size: 2rem; letter-spacing: 10px; }
  </style>
</head>
<body>
  <div class="start-screen" id="start-btn">INITIATE SCAN</div>
  <div class="mute-btn" id="mute-btn">🔬</div>

  <div class="hud">
    <span id="hud-target">TARGET: UNKNOWN</span>
    <span id="hud-mag">MAGNIFICATION: 1X</span>
    <span id="hud-bpm">BPM: 72</span>
  </div>
  <div class="scale-meter" id="scale-meter">MACRO ----------------- MICRO</div>

  <div id="scroll-container">
    <div id="zoom-container">
      
      <div class="layer" id="l-skin" style="z-index: 6;">
        <div class="layer-label" style="color:#000; text-shadow:none;">EPIDERMIS</div>
      </div>
      
      <div class="layer" id="l-veins" style="z-index: 5;">
        <div class="layer-label">VASCULAR SYSTEM</div>
      </div>

      <div class="layer" id="l-heart" style="z-index: 4;">
        <div class="layer-label">MYOCARDIUM</div>
        <div class="heart-shape"></div>
      </div>

      <div class="layer" id="l-blood" style="z-index: 3;">
        <div class="layer-label">BLOODSTREAM</div>
      </div>

      <div class="layer" id="l-cell" style="z-index: 2;">
        <div class="layer-label">CELL NUCLEUS</div>
        <div class="nucleus"><div class="nucleolus"></div></div>
      </div>

      <div class="layer" id="l-dna" style="z-index: 1;">
        <div class="layer-label" style="top:10%">DNA HELIX</div>
        <div class="dna-strand" id="dna-strand"></div>
      </div>

    </div>
  </div>

  <script>
    // Setup Skin Pores
    const lSkin = document.getElementById('l-skin');
    for(let i=0; i<200; i++) {
      const p = document.createElement('div'); p.className = 'pore';
      p.style.top = `${Math.random()*100}%`; p.style.left = `${Math.random()*100}%`;
      lSkin.appendChild(p);
    }
    // Setup Veins
    const lVeins = document.getElementById('l-veins');
    for(let i=0; i<10; i++) {
      const v = document.createElement('div'); v.className = `vein ${Math.random()>0.5?'blue':''}`;
      v.style.top = `${Math.random()*100}%`; v.style.transform = `rotate(${Math.random()*180}deg)`;
      lVeins.appendChild(v);
    }
    // Setup RBCs
    const lBlood = document.getElementById('l-blood');
    for(let i=0; i<15; i++) {
      const r = document.createElement('div'); r.className = 'rbc';
      r.style.top = `${Math.random()*80 + 10}%`; r.style.animationDelay = `-${Math.random()*3}s`;
      r.style.animationDuration = `${2 + Math.random()*2}s`;
      lBlood.appendChild(r);
    }
    // Setup DNA
    const strand = document.getElementById('dna-strand');
    const bases = ['a','t','c','g'];
    const pairs = { 'a':'t', 't':'a', 'c':'g', 'g':'c' };
    for(let i=0; i<15; i++) {
      const b = document.createElement('div'); b.className = 'base-pair';
      b.style.animationDelay = `-${i * 0.2}s`;
      const b1Type = bases[Math.floor(Math.random()*4)];
      const b2Type = pairs[b1Type];
      b.innerHTML = `<div class="base ${b1Type}"></div><div class="base ${b2Type}"></div>`;
      strand.appendChild(b);
    }

    let currentZoom = 1; let targetZoom = 1; let isStarted = false; const ease = 0.05;
    const zoomCont = document.getElementById('zoom-container');
    const layers = [
      { id: 'l-skin', min: 1, max: 5, target: 'EPIDERMIS' },
      { id: 'l-veins', min: 4, max: 15, target: 'VASCULAR' },
      { id: 'l-heart', min: 12, max: 40, target: 'MYOCARDIUM' },
      { id: 'l-blood', min: 35, max: 100, target: 'ERYTHROCYTE' },
      { id: 'l-cell', min: 90, max: 300, target: 'NUCLEUS' },
      { id: 'l-dna', min: 250, max: 1000, target: 'DNA' }
    ];

    window.addEventListener('wheel', e => {
      if(!isStarted) return; e.preventDefault();
      // Exponential zoom
      if(e.deltaY > 0) targetZoom *= 1.1;
      else targetZoom /= 1.1;
      targetZoom = Math.max(1, Math.min(targetZoom, 1200));
    }, {passive: false});

    let touchY = 0;
    window.addEventListener('touchstart', e => touchY = e.touches[0].clientY);
    window.addEventListener('touchmove', e => {
      if(!isStarted) return; e.preventDefault();
      const dy = touchY - e.touches[0].clientY;
      if(dy > 0) targetZoom *= 1.05; else targetZoom /= 1.05;
      targetZoom = Math.max(1, Math.min(targetZoom, 1200));
      touchY = e.touches[0].clientY;
    }, {passive: false});

    // Audio
    let audioCtx, masterGain, hbGain, hbOsc, bloodNoise, bloodFilter, dnaOsc, cellDrone;
    function initAudio() {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      audioCtx = new AudioContext(); masterGain = audioCtx.createGain(); masterGain.gain.value = 0.5; masterGain.connect(audioCtx.destination);
      
      // Heartbeat (Low Sine)
      hbOsc = audioCtx.createOscillator(); hbOsc.type = 'sine'; hbOsc.frequency.value = 40;
      hbGain = audioCtx.createGain(); hbGain.gain.value = 0;
      hbOsc.connect(hbGain).connect(masterGain); hbOsc.start();
      
      // LFO for heartbeat pulse
      const lfo = audioCtx.createOscillator(); lfo.frequency.value = 1.2; // 72 BPM
      const lfoG = audioCtx.createGain(); lfoG.gain.value = 0.5;
      lfo.connect(lfoG).connect(hbGain.gain); lfo.start();

      // Blood rushing (Noise)
      const bSize = audioCtx.sampleRate; const nBuf = audioCtx.createBuffer(1, bSize, audioCtx.sampleRate);
      for(let i=0; i<bSize; i++) nBuf.getChannelData(0)[i] = Math.random()*2-1;
      bloodNoise = audioCtx.createBufferSource(); bloodNoise.buffer = nBuf; bloodNoise.loop = true;
      bloodFilter = audioCtx.createBiquadFilter(); bloodFilter.type = 'bandpass'; bloodFilter.frequency.value = 400;
      const bloodG = audioCtx.createGain(); bloodG.gain.value = 0; // Starts silent
      bloodNoise.connect(bloodFilter).connect(bloodG).connect(masterGain); bloodNoise.start();

      // Cell Drone
      cellDrone = audioCtx.createOscillator(); cellDrone.type = 'sine'; cellDrone.frequency.value = 220;
      const cg = audioCtx.createGain(); cg.gain.value = 0;
      cellDrone.connect(cg).connect(masterGain); cellDrone.start();

      // DNA Chime
      dnaOsc = audioCtx.createOscillator(); dnaOsc.type = 'triangle'; dnaOsc.frequency.value = 880;
      const dg = audioCtx.createGain(); dg.gain.value = 0;
      dnaOsc.connect(dg).connect(masterGain); dnaOsc.start();

      return { hbGain, bloodG, cg, dg, lfo };
    }
    let audioNodes;

    function loop() {
      if(isStarted) {
        currentZoom += (targetZoom - currentZoom) * ease;
        
        // Scale container. Actually, we scale the layers inversely to give zoom effect?
        // No, scale container UP, and fade layers.
        // Wait, scaling container to 1000x will lose resolution.
        // Better: We fake it. Keep zoomContainer scale 1. Scale layers individually.
        
        document.getElementById('hud-mag').innerText = `MAGNIFICATION: ${Math.round(currentZoom)}X`;

        let activeTarget = "UNKNOWN";

        layers.forEach(l => {
          const el = document.getElementById(l.id);
          // When currentZoom == l.min, layer scale is 1.
          // When currentZoom > l.max, layer scale is huge (e.g. 10), fades out.
          // When currentZoom < l.min, layer scale is small (e.g. 0.1), fades out.
          
          if(currentZoom >= l.min && currentZoom <= l.max * 1.5) {
            const relativeScale = currentZoom / l.min;
            el.style.transform = `translate(-50%, -50%) scale(${relativeScale})`;
            
            // Opacity logic
            let op = 1;
            if(currentZoom < l.min * 1.5) op = (currentZoom - l.min) / (l.min * 0.5);
            if(currentZoom > l.max) op = 1 - (currentZoom - l.max) / (l.max * 0.5);
            el.style.opacity = Math.max(0, Math.min(1, op));
            
            if(op > 0.5) activeTarget = l.target;
          } else {
            el.style.opacity = 0;
          }
        });

        document.getElementById('hud-target').innerText = `TARGET: ${activeTarget}`;

        // Audio mixing based on zoom
        if(audioCtx && audioNodes) {
          const t = audioCtx.currentTime;
          // Heartbeat strong around 10-50
          let hVol = 0; if(currentZoom > 5 && currentZoom < 80) hVol = 0.5;
          audioNodes.hbGain.gain.setTargetAtTime(hVol, t, 0.1);
          
          // Blood strong around 30-200
          let bVol = 0; if(currentZoom > 20 && currentZoom < 250) bVol = 0.2;
          audioNodes.bloodG.gain.setTargetAtTime(bVol, t, 0.1);

          // Cell drone around 80-400
          let cVol = 0; if(currentZoom > 70 && currentZoom < 500) cVol = 0.1;
          audioNodes.cg.gain.setTargetAtTime(cVol, t, 0.1);

          // DNA chime > 200
          let dVol = 0; if(currentZoom > 200) dVol = 0.1;
          audioNodes.dg.gain.setTargetAtTime(dVol, t, 0.1);
        }
      }
      requestAnimationFrame(loop);
    }

    document.getElementById('start-btn').addEventListener('click', function() {
      audioNodes = initAudio(); this.style.display = 'none'; isStarted = true; loop();
    });

    let isMuted = false;
    document.getElementById('mute-btn').addEventListener('click', function() {
      if(!audioCtx) return; isMuted = !isMuted;
      masterGain.gain.linearRampToValueAtTime(isMuted ? 0 : 0.5, audioCtx.currentTime + 0.3);
      this.style.opacity = isMuted ? 0.3 : 1;
    });
  </script>
</body>
</html>
