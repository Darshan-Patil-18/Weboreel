<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mirror Reality</title>
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@1,700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html {
      width: 100%; height: 100%; overflow: hidden;
      background: #111; color: #fff; font-family: 'Bodoni Moda', serif;
      overscroll-behavior: none; transition: background 1s;
    }

    #scroll-container {
      position: absolute; top: 0; left: 0; width: 100%; height: 5000px;
      opacity: 0; pointer-events: none;
    }

    /* The Mirror Frame */
    .mirror-frame {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 320px; height: 450px; border: 15px solid #d4af37; border-radius: 160px 160px 20px 20px;
      box-shadow: 0 0 50px rgba(212,175,55,0.3), inset 0 0 20px rgba(0,0,0,0.8);
      background: #222; overflow: hidden;
    }

    /* The Face Container */
    .face {
      position: absolute; top: 50px; left: 50%; transform: translateX(-50%);
      width: 200px; height: 260px; transition: all 1s;
    }

    /* Base Head */
    .head {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: #f0c297; border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
      transition: all 1s; box-shadow: inset -10px -10px 20px rgba(0,0,0,0.2);
    }
    
    /* Imperfections (Only visible in Real) */
    .freckles {
      position: absolute; top: 50%; left: 20%; width: 120px; height: 30px;
      background: radial-gradient(circle, rgba(139,69,19,0.3) 10%, transparent 20%);
      background-size: 10px 10px; transition: opacity 1s;
    }
    
    /* Asymmetry in Real */
    .eye-l { position: absolute; top: 42%; left: 30px; width: 40px; height: 20px; background: #fff; border-radius: 50%; transition: all 1s; border-top: 3px solid #333; }
    .eye-r { position: absolute; top: 40%; right: 30px; width: 40px; height: 22px; background: #fff; border-radius: 50%; transition: all 1s; border-top: 2px solid #333; }
    .iris { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 15px; height: 15px; background: #4b3621; border-radius: 50%; transition: all 1s; }
    
    .nose { position: absolute; top: 60%; left: 52%; transform: translateX(-50%); width: 25px; height: 30px; background: rgba(0,0,0,0.1); border-radius: 50%; transition: all 1s; }
    
    .lip { position: absolute; bottom: 15%; left: 48%; transform: translateX(-50%); width: 60px; height: 15px; background: #c07c7c; border-radius: 20px; transition: all 1s; }

    /* UI Overlay */
    .title {
      position: fixed; top: 5%; left: 50%; transform: translateX(-50%);
      font-size: 2rem; letter-spacing: 5px; z-index: 10;
      opacity: 1; transition: opacity 0.5s; text-align: center;
    }
    
    .hud { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); font-family: monospace; letter-spacing: 2px; color: #888; text-align: center; }

    /* Filter UI elements */
    .scanline { position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: rgba(0,255,0,0.5); opacity: 0; pointer-events: none; }
    @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

    .mute-btn { position: fixed; bottom: 20px; right: 20px; font-size: 1.5rem; z-index: 100; cursor: pointer; opacity: 0.5; }
    .start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; cursor: pointer; font-size: 2rem; letter-spacing: 3px; }
  </style>
</head>
<body>
  <div class="start-screen" id="start-btn">LOOK IN THE MIRROR</div>
  <div class="mute-btn" id="mute-btn">🪞</div>

  <div class="title" id="title">1. UNFILTERED</div>
  <div class="hud">SCROLL TO ENHANCE</div>

  <div class="mirror-frame">
    <div class="scanline" id="scan"></div>
    <div class="face" id="face">
      <div class="head" id="head">
        <div class="freckles" id="freckles"></div>
        <div class="eye-l" id="el"><div class="iris" id="il"></div></div>
        <div class="eye-r" id="er"><div class="iris" id="ir"></div></div>
        <div class="nose" id="nose"></div>
        <div class="lip" id="lip"></div>
      </div>
    </div>
  </div>

  <div id="scroll-container"></div>

  <script>
    let currentY = 0; let targetY = 0; let maxScroll = 4000; let isStarted = false; const ease = 0.05;
    
    window.addEventListener('wheel', e => { if(!isStarted) return; e.preventDefault(); targetY += e.deltaY; targetY = Math.max(0, Math.min(targetY, maxScroll)); }, {passive: false});
    let touchY = 0;
    window.addEventListener('touchstart', e => touchY = e.touches[0].clientY);
    window.addEventListener('touchmove', e => { if(!isStarted) return; e.preventDefault(); targetY += (touchY - e.touches[0].clientY) * 1.5; targetY = Math.max(0, Math.min(targetY, maxScroll)); touchY = e.touches[0].clientY; }, {passive: false});

    // Audio
    let audioCtx, masterGain;
    let bReal, bFilt, bAI, bUncanny;
    
    function initAudio() {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      audioCtx = new AudioContext(); masterGain = audioCtx.createGain(); masterGain.gain.value = 0.5; masterGain.connect(audioCtx.destination);
      
      // Real (Warm acoustic guitar vibe - sine chords)
      bReal = audioCtx.createGain(); bReal.gain.value = 1;
      [196, 246.9, 293.6].forEach(f => {
        const o = audioCtx.createOscillator(); o.type = 'sine'; o.frequency.value = f;
        o.connect(bReal).connect(masterGain); o.start();
      });

      // Filtered (Slick Pop - Triangle with LFO)
      bFilt = audioCtx.createGain(); bFilt.gain.value = 0;
      const oF = audioCtx.createOscillator(); oF.type = 'triangle'; oF.frequency.value = 440;
      const lfo = audioCtx.createOscillator(); lfo.frequency.value = 4; const lfoG = audioCtx.createGain(); lfoG.gain.value = 10;
      lfo.connect(lfoG).connect(oF.frequency);
      oF.connect(bFilt).connect(masterGain); oF.start(); lfo.start();

      // AI (Glitchy Square)
      bAI = audioCtx.createGain(); bAI.gain.value = 0;
      const oA = audioCtx.createOscillator(); oA.type = 'square';
      setInterval(() => { if(isStarted && audioCtx) oA.frequency.setValueAtTime([880, 1760, 440][Math.floor(Math.random()*3)], audioCtx.currentTime); }, 100);
      oA.connect(bAI).connect(masterGain); oA.start();

      // Uncanny (Dissonant Sawtooth drone)
      bUncanny = audioCtx.createGain(); bUncanny.gain.value = 0;
      [100, 105, 111].forEach(f => {
        const oU = audioCtx.createOscillator(); oU.type = 'sawtooth'; oU.frequency.value = f;
        oU.connect(bUncanny).connect(masterGain); oU.start();
      });
    }

    function playShutter() {
      if(!audioCtx) return;
      const osc = audioCtx.createOscillator(); osc.type = 'square'; osc.frequency.setValueAtTime(2000, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.1);
      const g = audioCtx.createGain(); g.gain.setValueAtTime(0.5, audioCtx.currentTime); g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
      osc.connect(g).connect(masterGain); osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    let lastStage = 0;

    function loop() {
      if(isStarted) {
        currentY += (targetY - currentY) * ease;
        const progress = currentY / maxScroll; // 0 to 1

        let stage = 0;
        if(progress > 0.25 && progress < 0.5) stage = 1;
        else if(progress >= 0.5 && progress < 0.75) stage = 2;
        else if(progress >= 0.75) stage = 3;

        if(stage !== lastStage) {
          lastStage = stage;
          playShutter();
          
          // Flash effect
          document.body.style.background = '#fff';
          setTimeout(() => { document.body.style.background = '#111'; }, 100);
        }

        const title = document.getElementById('title');
        const head = document.getElementById('head');
        const frec = document.getElementById('freckles');
        const el = document.getElementById('el'); const er = document.getElementById('er');
        const il = document.getElementById('il'); const ir = document.getElementById('ir');
        const nose = document.getElementById('nose'); const lip = document.getElementById('lip');
        const scan = document.getElementById('scan');

        if(stage === 0) {
          title.innerText = "1. UNFILTERED"; title.style.color = '#fff';
          head.style.background = '#f0c297'; head.style.filter = 'none';
          head.style.borderRadius = '50% 50% 50% 50% / 40% 40% 60% 60%';
          frec.style.opacity = 1;
          
          el.style.top = '42%'; el.style.height = '20px'; el.style.borderTop = '3px solid #333'; el.style.width = '40px';
          er.style.top = '40%'; er.style.height = '22px'; er.style.borderTop = '2px solid #333'; er.style.width = '40px';
          il.style.background = '#4b3621'; ir.style.background = '#4b3621'; il.style.transform = 'translate(-50%,-50%) scale(1)'; ir.style.transform = 'translate(-50%,-50%) scale(1)';
          
          nose.style.width = '25px'; nose.style.left = '52%';
          lip.style.background = '#c07c7c'; lip.style.width = '60px'; lip.style.height = '15px'; lip.style.left = '48%';
          
          scan.style.opacity = 0; scan.style.animation = 'none';
          if(audioCtx) { bReal.gain.setTargetAtTime(1, audioCtx.currentTime, 0.5); bFilt.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); bAI.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); bUncanny.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); }
        } else if(stage === 1) {
          title.innerText = "2. SMOOTH FILTER"; title.style.color = '#ff69b4';
          head.style.background = '#f5d0b5'; head.style.filter = 'blur(1px) contrast(1.1)';
          head.style.borderRadius = '50% 50% 50% 50% / 40% 40% 60% 60%';
          frec.style.opacity = 0;
          
          el.style.top = '41%'; el.style.height = '22px'; el.style.borderTop = '4px solid #111'; el.style.width = '40px';
          er.style.top = '41%'; er.style.height = '22px'; er.style.borderTop = '4px solid #111'; er.style.width = '40px';
          il.style.background = '#5c4033'; ir.style.background = '#5c4033'; il.style.transform = 'translate(-50%,-50%) scale(1.1)'; ir.style.transform = 'translate(-50%,-50%) scale(1.1)';
          
          nose.style.width = '20px'; nose.style.left = '50%';
          lip.style.background = '#ff69b4'; lip.style.width = '65px'; lip.style.height = '20px'; lip.style.left = '50%';

          scan.style.opacity = 0; scan.style.animation = 'none';
          if(audioCtx) { bReal.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); bFilt.gain.setTargetAtTime(1, audioCtx.currentTime, 0.5); bAI.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); bUncanny.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); }
        } else if(stage === 2) {
          title.innerText = "3. AI ENHANCED"; title.style.color = '#0ff';
          head.style.background = '#ffe4c4'; head.style.filter = 'blur(0px) contrast(1.2)';
          head.style.borderRadius = '50% 50% 50% 50% / 40% 40% 70% 70%'; // V-shape jaw
          frec.style.opacity = 0;
          
          el.style.top = '38%'; el.style.height = '25px'; el.style.borderTop = '5px solid #000'; el.style.width = '50px';
          er.style.top = '38%'; er.style.height = '25px'; er.style.borderTop = '5px solid #000'; er.style.width = '50px';
          il.style.background = '#0ff'; ir.style.background = '#0ff'; il.style.transform = 'translate(-50%,-50%) scale(1.3)'; ir.style.transform = 'translate(-50%,-50%) scale(1.3)';
          
          nose.style.width = '15px'; nose.style.left = '50%';
          lip.style.background = '#ff1493'; lip.style.width = '70px'; lip.style.height = '25px'; lip.style.left = '50%';

          scan.style.opacity = 0.5; scan.style.animation = 'scan 2s infinite linear';
          if(audioCtx) { bReal.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); bFilt.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); bAI.gain.setTargetAtTime(1, audioCtx.currentTime, 0.5); bUncanny.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); }
        } else {
          title.innerText = "4. UNCANNY VALLEY"; title.style.color = '#f00';
          head.style.background = '#fffafa'; head.style.filter = 'contrast(1.5)';
          head.style.borderRadius = '50% 50% 50% 50% / 30% 30% 80% 80%'; // Extreme alien jaw
          frec.style.opacity = 0;
          
          el.style.top = '35%'; el.style.height = '40px'; el.style.borderTop = '2px solid #000'; el.style.width = '70px'; el.style.left = '10px';
          er.style.top = '35%'; er.style.height = '40px'; er.style.borderTop = '2px solid #000'; er.style.width = '70px'; er.style.right = '10px';
          il.style.background = '#000'; ir.style.background = '#000'; il.style.transform = 'translate(-50%,-50%) scale(2)'; ir.style.transform = 'translate(-50%,-50%) scale(2)';
          
          nose.style.width = '5px'; nose.style.left = '50%';
          lip.style.background = '#800'; lip.style.width = '100px'; lip.style.height = '10px'; lip.style.left = '50%';

          scan.style.opacity = 0.8; scan.style.animation = 'scan 0.5s infinite linear';
          if(audioCtx) { bReal.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); bFilt.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); bAI.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); bUncanny.gain.setTargetAtTime(1, audioCtx.currentTime, 0.5); }
        }
      }
      requestAnimationFrame(loop);
    }

    document.getElementById('start-btn').addEventListener('click', function() {
      initAudio(); this.style.display = 'none'; isStarted = true; loop();
    });

    let isMuted = false;
    document.getElementById('mute-btn').addEventListener('click', function() {
      if(!audioCtx) return; isMuted = !isMuted;
      masterGain.gain.linearRampToValueAtTime(isMuted ? 0 : 0.5, audioCtx.currentTime + 0.3);
    });
  </script>
</body>
</html>
