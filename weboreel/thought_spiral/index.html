<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thought Spiral</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital@1&family=DM+Sans&family=Playfair+Display:ital@1&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html {
      width: 100%; height: 100%;
      background: #050508; color: #fff;
      overflow: hidden; /* Canvas handles everything, manual scroll capture */
      font-family: 'DM Sans', sans-serif;
    }

    #canvas-spiral {
      position: fixed; top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: 1;
    }

    .ui-layer {
      position: fixed; top: 0; left: 0;
      width: 100vw; height: 100vh;
      pointer-events: none; z-index: 5;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }

    .center-calm {
      font-family: 'Playfair Display', serif; font-style: italic;
      font-size: 3rem; color: #fff; text-shadow: 0 0 20px rgba(255,255,255,0.5);
      opacity: 1; transition: opacity 1s;
    }

    .flash {
      position: absolute; top:0; left:0; width:100%; height:100%;
      background: #fff; opacity: 0; z-index: 10;
    }

    .breathe-text {
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-size: 100px; color: #fff; text-shadow: 0 0 30px rgba(255,255,200,0.8);
      opacity: 0; transition: opacity 2s;
    }

    .final-sub {
      position: absolute; bottom: 20vh;
      font-family: 'DM Sans'; font-size: 1.2rem; color: #aaa;
      opacity: 0; transition: opacity 2s;
    }

    #interactive-input {
      position: absolute; top: 60vh;
      background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.3);
      color: #fff; font-family: 'Cormorant Garamond'; font-size: 1.5rem; font-style: italic;
      text-align: center; outline: none; opacity: 0; pointer-events: none;
      transition: opacity 1s;
    }

    .shake { animation: shake 0.1s infinite; }
    @keyframes shake { 0% { transform: translate(2px,2px); } 50% { transform: translate(-2px,-2px); } 100% { transform: translate(2px,-2px); } }

    .mute-btn {
      position: fixed; bottom: 30px; right: 30px;
      font-size: 2rem; cursor: pointer; z-index: 100; pointer-events: auto; opacity: 0.5;
    }
    .mute-btn:hover { opacity: 1; }

    @media (max-width: 768px) {
      .breathe-text { font-size: 60px; }
      .center-calm { font-size: 2rem; }
    }
  </style>
</head>
<body>

<canvas id="canvas-spiral"></canvas>

<div class="ui-layer">
  <div class="center-calm" id="calm-text">Everything is fine</div>
  <div class="breathe-text" id="breathe-text">BREATHE</div>
  <div class="final-sub" id="final-sub">The spiral was never real. But you are.</div>
  <input type="text" id="interactive-input" placeholder="type it here..." autocomplete="off">
  <div class="flash" id="flash"></div>
</div>

<div class="mute-btn" id="muteBtn" title="Toggle Audio">🌀</div>

<script>
// --- AUDIO ENGINE ---
const AudioContext = window.AudioContext || window.webkitAudioContext;
let actx, masterGain, distNode, noiseGain;
let isMuted = true;
let oscs = {};

function initAudio() {
  if(actx) return;
  actx = new AudioContext();
  masterGain = actx.createGain(); masterGain.connect(actx.destination);
  masterGain.gain.value = 0.5;

  distNode = actx.createWaveShaper(); distNode.curve = makeDistCurve(0);
  distNode.connect(masterGain);

  noiseGain = actx.createGain(); noiseGain.gain.value = 0;
  let bs = actx.createBufferSource();
  let b = actx.createBuffer(1, actx.sampleRate*2, actx.sampleRate);
  let d = b.getChannelData(0); for(let i=0;i<b.length;i++) d[i]=Math.random()*2-1;
  bs.buffer = b; bs.loop = true;
  let f = actx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=800;
  bs.connect(f).connect(noiseGain).connect(masterGain); bs.start();

  oscs.c = startOsc(261.63, 0.04); // C4
  oscs.e = startOsc(329.63, 0);    // E4
  oscs.g = startOsc(196.00, 0);    // G3 (minor feel)
  oscs.final = startOsc(528, 0);   // Healing

  isMuted = false;
  document.getElementById('muteBtn').style.opacity = '1';
}

function startOsc(freq, vol) {
  let o = actx.createOscillator(); o.frequency.value = freq;
  let g = actx.createGain(); g.gain.value = vol;
  o.connect(g).connect(distNode); o.start();
  return {o, g};
}

function makeDistCurve(k) {
  let n = 44100, curve = new Float32Array(n), deg = Math.PI/180, x;
  for(let i=0; i<n; ++i) { x = i*2/n-1; curve[i] = (3+k)*x*20*deg/(Math.PI+k*Math.abs(x)); }
  return curve;
}

document.getElementById('muteBtn').addEventListener('click', () => {
  if(!actx) { initAudio(); return; }
  isMuted = !isMuted;
  masterGain.gain.setTargetAtTime(isMuted ? 0 : 0.5, actx.currentTime, 0.1);
  document.getElementById('muteBtn').style.opacity = isMuted ? '0.5' : '1';
});

function updateAudioParams(stage, curr) {
  if(!actx || isMuted) return;
  let now = actx.currentTime;
  if(stage===1) { oscs.c.g.gain.setTargetAtTime(0.04, now, 0.5); oscs.e.g.gain.setTargetAtTime(0, now, 0.5); distNode.curve = makeDistCurve(0); noiseGain.gain.setTargetAtTime(0, now, 0.5); }
  if(stage===2) { oscs.e.g.gain.setTargetAtTime(0.03, now, 1); }
  if(stage===3) { oscs.g.g.gain.setTargetAtTime(0.03, now, 1); distNode.curve = makeDistCurve(10); }
  if(stage===4) { distNode.curve = makeDistCurve(100); noiseGain.gain.setTargetAtTime(0.05, now, 0.5); }
  if(stage===5) { oscs.e.g.gain.setTargetAtTime(0, now, 1); oscs.g.g.gain.setTargetAtTime(0, now, 2); distNode.curve = makeDistCurve(10); noiseGain.gain.setTargetAtTime(0.02, now, 1); }
  if(stage===6) { oscs.c.g.gain.setTargetAtTime(0, now, 0.1); distNode.curve = makeDistCurve(0); noiseGain.gain.setTargetAtTime(0, now, 0.1); }
  if(stage===7) { oscs.final.g.gain.setTargetAtTime(0.06, now, 2); }
}

// --- SCROLL ENGINE ---
let currentY = 0, targetY = 0, ease = 0.07;
let maxScroll = 4000;

window.addEventListener('wheel', e => {
  e.preventDefault();
  targetY += e.deltaY;
  targetY = Math.max(0, Math.min(targetY, maxScroll));
}, { passive: false });

let tStart = 0;
window.addEventListener('touchstart', e => tStart = e.touches[0].clientY, {passive:false});
window.addEventListener('touchmove', e => {
  e.preventDefault();
  targetY += (tStart - e.touches[0].clientY) * 1.5;
  targetY = Math.max(0, Math.min(targetY, maxScroll));
  tStart = e.touches[0].clientY;
}, {passive:false});

// --- SPIRAL RENDERING ---
const canvas = document.getElementById('canvas-spiral');
const ctx = canvas.getContext('2d');
let cw, ch;
let isMobile = false;

function resize() {
  cw = canvas.width = window.innerWidth;
  ch = canvas.height = window.innerHeight;
  isMobile = cw < 768;
}
window.addEventListener('resize', resize);
resize();

let rotationAngle = 0;
let userWords = [];

class SpiralLayer {
  constructor(text, offsetAngle, speedMult, radiusMult, color) {
    this.baseText = text;
    this.text = text;
    this.offsetAngle = offsetAngle;
    this.speedMult = speedMult;
    this.radiusMult = radiusMult;
    this.color = color;
    this.opacity = 1.0;
  }
}

let spirals = [
  new SpiralLayer("Everything is fine", 0, 1, 1, '255,255,255')
];

let currentStage = 0;
let breathScale = 1.0; let breathDir = 0.005;

function tick() {
  currentY += (targetY - currentY) * ease;
  
  let stage = 1;
  if(currentY > 400) stage = 2;
  if(currentY > 900) stage = 3;
  if(currentY > 1500) stage = 4;
  if(currentY > 2200) stage = 5;
  if(currentY > 2800) stage = 6;
  if(currentY > 3200) stage = 7;

  if(stage !== currentStage) {
    currentStage = stage;
    updateAudioParams(stage, currentY);
    
    // UI Updates
    document.getElementById('calm-text').style.opacity = stage >= 4 ? '0' : '1';
    if(stage === 2 && spirals.length === 1) spirals.push(new SpiralLayer("what if", Math.PI, 1.2, 1.5, '255,200,200'));
    if(stage === 3 && spirals.length === 2) {
      spirals.push(new SpiralLayer("what if it's not fine", Math.PI/2, -1.5, 2, '255,150,150'));
      spirals.push(new SpiralLayer("what if everyone knows", -Math.PI/2, 1.8, 2.5, '255,100,100'));
    }
    if(stage === 4) {
      document.body.classList.add('shake'); ease = 0.04;
      if(spirals.length < 6) {
        spirals.push(new SpiralLayer("wrong choice", 0, 2.5, 0.8, '255,50,0'));
        spirals.push(new SpiralLayer("mistake", Math.PI, -2, 1.2, '255,0,0'));
      }
    } else {
      document.body.classList.remove('shake'); ease = 0.07;
    }
    if(stage === 5) {
      spirals[0].text = "FINE"; spirals[1].text = "WHAT"; spirals[2].text = "NOT";
      spirals[3].text = "KNOW"; spirals[4].text = "WRONG"; spirals[5].text = "MISTAKE";
      spirals.forEach((s,i) => { if(i>3) s.opacity = 0; });
    }
    if(stage === 6) {
      let fl = document.getElementById('flash'); fl.style.opacity = '1';
      setTimeout(() => fl.style.opacity = '0', 500);
      ease = 0.15;
    }
    if(stage === 7) {
      setTimeout(() => {
        document.getElementById('breathe-text').style.opacity = '1';
        setTimeout(()=>document.getElementById('final-sub').style.opacity = '1', 2000);
        let inp = document.getElementById('interactive-input');
        inp.style.pointerEvents = 'auto'; inp.style.opacity = '1';
      }, 1000);
    }
  }

  // Draw
  ctx.clearRect(0,0,cw,ch);
  
  if(stage < 7) {
    let rotSpeed = 0.002;
    if(stage===4) rotSpeed = 0.008;
    if(stage===5) rotSpeed = 0.001;
    rotationAngle += rotSpeed;

    let baseMaxR = isMobile ? Math.min(cw, ch)*0.4 : 300;
    
    let collapseProgress = 0;
    if(stage === 6) collapseProgress = Math.min(1, (currentY - 2800) / 400);
    baseMaxR *= (1 - collapseProgress);

    let turns = 3 + (currentY / maxScroll) * 4;
    if(isMobile) turns *= 0.6;
    let pointsCount = 2000;

    spirals.forEach(s => {
      if(s.opacity <= 0) return;
      
      let spiralPts = [];
      let maxR = baseMaxR * s.radiusMult;
      
      for(let i=0; i<pointsCount; i++) {
        let t = i/pointsCount;
        let a = t * turns * Math.PI * 2 + rotationAngle * s.speedMult + s.offsetAngle;
        let r = t * maxR;
        spiralPts.push({ x: cw/2 + Math.cos(a)*r, y: ch/2 + Math.sin(a)*r, a: a });
      }

      let chars = (s.text + ' ').repeat(40).split('');
      let cIdx = 0;

      ctx.save();
      spiralPts.forEach((pt, i) => {
        if(i % 8 !== 0) return;
        let c = chars[cIdx++ % chars.length];
        ctx.save();
        ctx.translate(pt.x, pt.y);
        ctx.rotate(pt.a + Math.PI/2);
        
        let dist = Math.hypot(pt.x - cw/2, pt.y - ch/2);
        let op = 0.2 + (dist / maxR) * 0.7;
        let size = 8 + (dist / maxR) * 16;
        if(stage === 3 || stage === 4) size *= (0.5 + Math.random()); // distortion
        
        ctx.fillStyle = `rgba(${s.color},${op * s.opacity})`;
        ctx.font = `${size}px "Cormorant Garamond"`;
        ctx.fillText(c, 0, 0);
        ctx.restore();
      });
      ctx.restore();
    });
  } else {
    // Stage 7: Breathe pulse
    breathScale += breathDir;
    if(breathScale > 1.03 || breathScale < 0.97) breathDir *= -1;
    document.getElementById('breathe-text').style.transform = `scale(${breathScale})`;
    
    // Draw user interactive spirals
    userWords.forEach((uw, idx) => {
      uw.life -= 0.01;
      if(uw.life <= 0) { userWords.splice(idx,1); return; }
      
      uw.angle += 0.05;
      uw.r += 2;
      ctx.save();
      ctx.translate(cw/2 + Math.cos(uw.angle)*uw.r, ch/2 + Math.sin(uw.angle)*uw.r);
      ctx.rotate(uw.angle + Math.PI/2);
      ctx.fillStyle = `rgba(255,255,255,${uw.life})`;
      ctx.font = `14px "Cormorant Garamond"`;
      ctx.fillText(uw.word, 0, 0);
      ctx.restore();
    });
  }

  requestAnimationFrame(tick);
}

document.getElementById('interactive-input').addEventListener('keypress', e => {
  if(e.key === 'Enter' && e.target.value.trim() !== '') {
    userWords.push({ word: e.target.value, angle: Math.random()*Math.PI*2, r: 0, life: 1.0 });
    e.target.value = '';
    // small cathartic chime
    if(actx && !isMuted) {
      let o=actx.createOscillator(); let g=actx.createGain();
      o.frequency.value=800; o.connect(g).connect(masterGain);
      g.gain.setValueAtTime(0.05, actx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime+1);
      o.start(); o.stop(actx.currentTime+1.1);
    }
  }
});

requestAnimationFrame(tick);

</script>
</body>
</html>
