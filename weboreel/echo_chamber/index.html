<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Echo Chamber</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital@1&family=DM+Sans:wght@400;700&family=Space+Mono&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html {
      width: 100%; height: 100%;
      background: #1a1410; color: #fff;
      overflow-x: hidden;
      font-family: 'DM Sans', sans-serif;
      overscroll-behavior: none;
      transition: background 1s;
    }
    
    .scroll-container {
      position: fixed; top: 0; left: 0;
      width: 100vw; height: 100vh;
      perspective: 800px;
      transform-style: preserve-3d;
      z-index: 5;
    }

    .echo-layer {
      position: absolute;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      will-change: transform, opacity;
      pointer-events: none;
    }

    /* Tunnel texts */
    .tunnel-text {
      font-size: 2rem;
      max-width: 800px;
      margin: 20px;
      white-space: pre-wrap;
    }
    
    .center-text { opacity: 1; }
    .edge-text { opacity: 0.6; font-size: 1.5rem; }
    .far-edge-text { opacity: 0.2; font-size: 1rem; }

    /* Section 2 Echo */
    .s2-echo {
      text-shadow: 8px 0 rgba(255,255,255,0.3), 16px 0 rgba(255,255,255,0.15), 24px 0 rgba(255,255,255,0.07);
    }

    /* Section 3 Amplification */
    .s3-amp {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      width: 150vw;
      transform: translateX(-16vw);
      color: #ff8800;
    }
    .s3-amp div { font-family: 'Bebas Neue', cursive; font-size: 4rem; letter-spacing: -2px; line-height: 0.9; }

    /* Notifications */
    .notif {
      position: absolute; right: -300px;
      background: #fff; color: #000;
      padding: 15px 20px; border-radius: 8px;
      font-family: 'Space Mono', monospace; font-size: 0.9rem;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      transition: right 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.5s;
      opacity: 0; pointer-events: none;
    }

    /* Section 4 Distortion */
    .s4-dist {
      color: #cc0000;
      font-family: 'Bebas Neue';
      font-size: 6rem;
      display: flex; flex-wrap: wrap; justify-content: center;
      opacity: 0.8;
    }
    .glitch { clip-path: polygon(0 20%, 100% 20%, 100% 40%, 0 40%); animation: glitch 0.2s infinite; }
    @keyframes glitch { 0% { transform: translateX(0); } 50% { transform: translateX(10px); } 100% { transform: translateX(-5px); } }
    .shake { animation: shake 0.1s infinite; }
    @keyframes shake { 0% { transform: translate(2px, 1px); } 50% { transform: translate(-1px, -2px); } 100% { transform: translate(2px, 2px); } }

    .clean-text { font-family: 'DM Sans'; font-size: 2.5rem; color: #fff; z-index: 10; text-shadow: 0 0 20px #000; }

    /* Section 5 The Wall */
    .wall-container {
      position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
      display: flex; flex-direction: column; justify-content: center;
      background: #000; opacity: 0; pointer-events: none; z-index: 20;
    }
    .wall-line {
      width: 100%; height: 2px; background: #fff; margin: 20px 0;
      transition: clip-path 0.1s;
    }
    .wall-text { font-size: 1.5rem; text-align: center; }
    .stacked-text { 
      font-family: 'Bebas Neue'; color: rgba(255,255,255,0.3); font-size: 1.5rem; 
      line-height: 0.8; height: 200px; overflow: hidden; display: flex; flex-direction: column; justify-content: flex-end;
      text-align: center; margin-bottom: 5px;
    }

    /* Section 6 The Break */
    .shatter-piece { position: absolute; background: #fff; width: 50px; height: 2px; opacity: 0; }
    .whiteout { position: fixed; top:0; left:0; width: 100vw; height: 100vh; background: #fff; opacity: 0; pointer-events: none; z-index: 30; }

    /* Section 7 Silence */
    .silence-container {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: #f0f0f0; color: #000;
      display: flex; flex-direction: column; align-items: flex-start; justify-content: center;
      padding: 10vw; opacity: 0; pointer-events: none; z-index: 40;
    }
    .silence-q { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 5rem; margin-bottom: 2rem; }
    .silence-a { font-family: 'DM Sans'; font-size: 1.2rem; margin-bottom: 1rem; cursor: pointer; }
    .silence-end { opacity: 0; transition: opacity 2s; margin-top: 50px; }

    .mute-btn {
      position: fixed; bottom: 30px; right: 30px;
      font-size: 2rem; cursor: pointer; z-index: 100; user-select: none; opacity: 0.5;
    }
    .mute-btn:hover { opacity: 1; }

    @media (max-width: 768px) {
      .s3-amp { grid-template-columns: 1fr; width: 100vw; transform: none; }
      .s3-amp div { font-size: 2.5rem; }
      .tunnel-text { font-size: 1.2rem; }
      .silence-q { font-size: 3rem; }
    }
  </style>
</head>
<body>

<div class="scroll-container" id="tunnel">
  <!-- JavaScript populates layers -->
</div>

<div class="notif" id="n1" style="top:20%;">87 people agree with you</div>
<div class="notif" id="n2" style="top:40%;">Your post got 1,200 likes</div>
<div class="notif" id="n3" style="top:60%;">People like you also believe...</div>

<div class="wall-container" id="wall">
  <div class="stacked-text" id="wall-stack">
    <!-- JS injected pileup -->
  </div>
  <div class="wall-line" id="wall-line"></div>
  <div class="wall-text">You've reached the edge of your bubble.</div>
</div>

<div class="whiteout" id="whiteout"></div>

<div class="silence-container" id="silence">
  <div class="silence-q" id="q-text">What do you actually think?</div>
  <div class="silence-a">The most radical thing you can do is change your mind.</div>
  <div class="silence-end" id="s-end">The echo is over. Or it's just beginning. You decide.</div>
</div>

<div class="mute-btn" id="muteBtn" title="Toggle Audio">📢</div>

<script>
// --- AUDIO ENGINE ---
const AudioContext = window.AudioContext || window.webkitAudioContext;
let actx, masterGain, delayNode, feedbackGain, distortionNode, droneOsc, noiseNode, lfo;
let isMuted = true;

function initAudio() {
  if(actx) return;
  actx = new AudioContext();
  masterGain = actx.createGain();
  masterGain.connect(actx.destination);
  masterGain.gain.value = 0.5;

  // Echo Network
  delayNode = actx.createDelay(2.0);
  delayNode.delayTime.value = 0.3;
  feedbackGain = actx.createGain();
  feedbackGain.gain.value = 0.0;
  
  delayNode.connect(feedbackGain);
  feedbackGain.connect(delayNode);
  delayNode.connect(masterGain);

  // Distortion
  distortionNode = actx.createWaveShaper();
  distortionNode.curve = makeDistortionCurve(400);
  distortionNode.oversample = '4x';
  distortionNode.connect(delayNode);
  distortionNode.connect(masterGain);

  // Base Drone
  droneOsc = actx.createOscillator();
  droneOsc.frequency.value = 261;
  let dGain = actx.createGain();
  dGain.gain.value = 0.03;
  droneOsc.connect(dGain).connect(distortionNode);
  droneOsc.start();

  isMuted = false;
  document.getElementById('muteBtn').style.opacity = '1';
}

function makeDistortionCurve(amount) {
  let k = typeof amount === 'number' ? amount : 50,
      n_samples = 44100,
      curve = new Float32Array(n_samples),
      deg = Math.PI / 180,
      i = 0, x;
  for ( ; i < n_samples; ++i ) {
    x = i * 2 / n_samples - 1;
    curve[i] = ( 3 + k ) * x * 20 * deg / ( Math.PI + k * Math.abs(x) );
  }
  return curve;
}

function playBreath() {
  if(!actx || isMuted) return;
  let bs = actx.createBufferSource();
  let b = actx.createBuffer(1, actx.sampleRate*3, actx.sampleRate);
  let data = b.getChannelData(0);
  for(let i=0;i<b.length;i++) data[i]=Math.random()*2-1;
  bs.buffer = b;
  let filter = actx.createBiquadFilter(); filter.type='lowpass'; filter.frequency.value=800;
  let g = actx.createGain();
  g.gain.setValueAtTime(0, actx.currentTime);
  g.gain.linearRampToValueAtTime(0.05, actx.currentTime + 1.0); // inhale
  g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 3.0); // exhale
  bs.connect(filter).connect(g).connect(masterGain);
  bs.start();
}

function playSilenceTone() {
  if(!actx || isMuted) return;
  droneOsc.frequency.setTargetAtTime(528, actx.currentTime, 0.5);
  feedbackGain.gain.setTargetAtTime(0, actx.currentTime, 0.5); // kill echo
}

document.getElementById('muteBtn').addEventListener('click', () => {
  if(!actx) { initAudio(); return; }
  isMuted = !isMuted;
  masterGain.gain.setTargetAtTime(isMuted ? 0 : 0.5, actx.currentTime, 0.1);
  document.getElementById('muteBtn').style.opacity = isMuted ? '0.5' : '1';
});

// --- TUNNEL SETUP ---
const tunnel = document.getElementById('tunnel');
const numLayers = 30;
let layers = [];

const contentStages = [
  '<div class="tunnel-text center-text">You are surrounded by people who agree with you.</div><div class="tunnel-text edge-text">You are surrounded by people who agree with you.</div>',
  '<div class="tunnel-text center-text s2-echo">It feels safe in here.</div><div class="tunnel-text center-text s2-echo">The more you hear it, the more it feels true.</div>',
  '<div class="s3-amp"><div>YES</div><div>YES</div><div>YES</div><div>YES</div><div>YES</div><div>YES</div><div>YES</div></div>',
  '<div class="s4-dist">THIS IS THE TRUTH THIS IS THE TRUTH THIS IS THE TRUTH THIS IS THE TRUTH</div>',
  '<div class="clean-text">When was the last time you heard something that surprised you?</div>',
  ''
];

for(let i=0; i<numLayers; i++) {
  let div = document.createElement('div');
  div.className = 'echo-layer';
  // Distribute content
  div.innerHTML = contentStages[i % contentStages.length];
  tunnel.appendChild(div);
  layers.push(div);
}

// Stack wall text
let st = document.getElementById('wall-stack');
for(let i=0; i<15; i++) {
  st.innerHTML += `<div>YOU ARE RIGHT EVERYONE ELSE IS WRONG</div>`;
}


// --- SCROLL ENGINE ---
let currentY = 0, targetY = 0;
let ease = 0.085;
const maxScroll = 6000;
let breakTriggered = false;

window.addEventListener('wheel', e => {
  e.preventDefault();
  targetY += e.deltaY * 0.8;
  targetY = Math.max(0, Math.min(targetY, maxScroll));
}, { passive: false });

let tStart = 0;
window.addEventListener('touchstart', e => tStart = e.touches[0].clientY, {passive:false});
window.addEventListener('touchmove', e => {
  e.preventDefault();
  targetY += (tStart - e.touches[0].clientY) * 1.5;
  targetY = Math.max(0, Math.min(targetY, maxScroll));
  tStart = e.touches[0].clientY;
}, {passive:false});

function tick() {
  currentY += (targetY - currentY) * ease;
  
  if(!breakTriggered) {
    // Tunnel motion
    layers.forEach((layer, i) => {
      let depth = (i * 150) - (currentY * 0.8);
      let scale = 1;
      let op = 1;
      
      if(depth > 0) {
        // behind camera
        op = 0;
      } else {
        // in front
        // -3000 is far away
        op = 1 - (Math.abs(depth) / 3000);
      }
      
      if(currentY > 3000) {
        document.body.classList.add('shake');
        if(actx && !isMuted) feedbackGain.gain.setTargetAtTime(0.85, actx.currentTime, 0.1);
      } else {
        document.body.classList.remove('shake');
        if(actx && !isMuted) feedbackGain.gain.setTargetAtTime(currentY/4000, actx.currentTime, 0.1);
      }
      
      layer.style.transform = `translateZ(${depth}px) scale(${scale})`;
      layer.style.opacity = Math.max(0, op);
    });

    // Sections
    if(currentY > 1500 && currentY < 2500) {
      document.body.style.background = '#3a1a00';
      document.getElementById('n1').style.opacity = '1'; document.getElementById('n1').style.right = '20px';
      setTimeout(()=> { document.getElementById('n2').style.opacity = '1'; document.getElementById('n2').style.right = '20px'; }, 500);
      setTimeout(()=> { document.getElementById('n3').style.opacity = '1'; document.getElementById('n3').style.right = '20px'; }, 1000);
      ease = 0.05; // Harder
    } else {
      document.querySelectorAll('.notif').forEach(n => { n.style.opacity = '0'; n.style.right = '-300px'; });
    }
    
    if(currentY > 2500 && currentY < 4000) {
      document.body.style.background = '#1a0000';
    }
    
    if(currentY > 4000) {
      document.getElementById('wall').style.opacity = '1';
      tunnel.style.opacity = '0';
      ease = 0.03; // the wall
      
      // Cracking
      let progress = (currentY - 4000) / 1000;
      if(progress > 0) {
        document.getElementById('wall-line').style.clipPath = `polygon(0 0, ${40-progress*20}% 0, ${45}% 100%, ${55}% 100%, ${60+progress*20}% 0, 100% 0, 100% 100%, 0 100%)`;
      }
    } else {
      document.getElementById('wall').style.opacity = '0';
      tunnel.style.opacity = '1';
    }

    if(currentY > 5000 && !breakTriggered) {
      triggerBreak();
    }
  }

  requestAnimationFrame(tick);
}

function triggerBreak() {
  breakTriggered = true;
  ease = 0.12;
  document.getElementById('wall-line').style.display = 'none';
  
  // Shatter
  for(let i=0; i<20; i++) {
    let p = document.createElement('div');
    p.className = 'shatter-piece';
    p.style.top = '50%'; p.style.left = '50%';
    document.getElementById('wall').appendChild(p);
    setTimeout(() => {
      p.style.opacity = '1';
      p.style.transform = `translate(${(Math.random()-0.5)*1000}px, ${(Math.random()-0.5)*1000}px) rotate(${Math.random()*360}deg)`;
      p.style.transition = 'transform 1s cubic-bezier(0.1, 0.8, 0.2, 1), opacity 1s';
      p.style.opacity = '0';
    }, 50);
  }

  let w = document.getElementById('whiteout');
  w.style.opacity = '1';
  
  if(actx && !isMuted) {
    let osc = actx.createOscillator(); let g = actx.createGain();
    osc.type = 'square'; osc.connect(g).connect(masterGain);
    g.gain.setValueAtTime(0.2, actx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.3);
    osc.start(); osc.stop(actx.currentTime + 0.3);
  }

  setTimeout(() => {
    w.style.transition = 'opacity 2s';
    w.style.opacity = '0';
    document.getElementById('wall').style.display = 'none';
    
    let sil = document.getElementById('silence');
    sil.style.opacity = '1';
    sil.style.pointerEvents = 'auto';
    
    playSilenceTone();
    playBreath();

  }, 500);
}

document.querySelector('.silence-a').addEventListener('click', () => {
  document.getElementById('s-end').style.opacity = '1';
});

requestAnimationFrame(tick);

</script>
</body>
</html>
