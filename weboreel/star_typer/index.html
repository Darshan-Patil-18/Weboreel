<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STAR TYPER</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&family=Space+Mono&display=swap');

    body, html {
      margin: 0; padding: 0; width: 100%; height: 100%;
      background-color: #02020f;
      overflow: hidden;
      font-family: 'Space Mono', monospace;
      color: white;
      filter: brightness(1.1);
      user-select: none;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      position: absolute;
      top: 0; left: 0;
      z-index: 1;
    }

    .nebula {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      z-index: 0;
      opacity: 0.05;
      pointer-events: none;
    }
    .n1 { width: 60vw; height: 60vw; background: radial-gradient(circle, #8a2be2, transparent); top: -10vw; left: -10vw; }
    .n2 { width: 50vw; height: 50vw; background: radial-gradient(circle, #00ced1, transparent); bottom: -10vw; right: -10vw; }
    .n3 { width: 70vw; height: 70vw; background: radial-gradient(circle, #00008b, transparent); top: 20vw; left: 30vw; }

    .stats {
      position: absolute;
      top: 20px;
      width: 100%;
      text-align: center;
      z-index: 10;
      opacity: 0.3;
      font-size: 14px;
      pointer-events: none;
    }

    .placeholder {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      opacity: 0;
      animation: fadeIn 3s forwards 1s;
      pointer-events: none;
      font-style: italic;
      color: rgba(255,255,255,0.5);
      transition: opacity 0.5s;
    }

    @keyframes fadeIn { to { opacity: 1; } }

    .letter-display {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 5;
      font-family: 'Playfair Display', serif;
      font-size: 15vw;
      color: white;
      pointer-events: none;
      opacity: 0;
      text-shadow: 0 0 20px rgba(255,255,255,0.5);
    }

    .letter-anim {
      animation: letterPop 0.6s ease-out forwards;
    }

    @keyframes letterPop {
      0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
    }

    .toolbar {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 10px;
      background: rgba(20, 20, 30, 0.6);
      padding: 10px 20px;
      border-radius: 30px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
    }

    button {
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.7);
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      cursor: pointer;
      padding: 5px 10px;
      border-radius: 15px;
      transition: all 0.2s;
    }
    button:hover { background: rgba(255,255,255,0.1); color: white; }

    #mobileInput {
      position: absolute;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      width: 80%;
      max-width: 300px;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(255,255,255,0.3);
      color: white;
      font-family: 'Space Mono', monospace;
      font-size: 16px;
      text-align: center;
      outline: none;
      z-index: 10;
      display: none;
    }

    @media (max-width: 768px) {
      #mobileInput { display: block; }
      .toolbar { width: 90%; justify-content: center; flex-wrap: wrap; bottom: 20px; gap: 5px; }
      .stats { font-size: 12px; }
    }

    #darkOverlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: black;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s;
    }
  </style>
</head>
<body>
  <div class="nebula n1"></div>
  <div class="nebula n2"></div>
  <div class="nebula n3"></div>
  
  <canvas id="galaxy"></canvas>
  <div id="darkOverlay"></div>
  
  <div class="stats">✦ <span id="starCount">0</span> STARS IN YOUR GALAXY</div>
  <div class="placeholder" id="placeholder">start typing...</div>
  <div class="letter-display" id="letterDisplay"></div>
  
  <div class="toolbar">
    <button id="btnSave">🌌 SAVE GALAXY</button>
    <button id="btnSupernova">💥 SUPERNOVA</button>
    <button id="btnClear">🗑️ CLEAR SKY</button>
    <button id="btnSound">♪ SOUND: OFF</button>
  </div>
  
  <input type="text" id="mobileInput" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="touch here to type...">

  <script>
    const canvas = document.getElementById('galaxy');
    const ctx = canvas.getContext('2d', { alpha: false });
    let width, height;

    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
    }
    window.addEventListener('resize', resize);
    resize();

    // Static background stars
    const staticStars = [];
    for(let i=0; i<150; i++) {
      staticStars.push({
        x: Math.random() * width,
        y: Math.random() * height,
        r: Math.random() * 1 + 0.5,
        alpha: Math.random() * 0.8 + 0.2
      });
    }

    // Dynamic stars
    let stars = [];
    const MAX_STARS = 800;

    class Star {
      constructor(x, y, color, size, vx, vy) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.r = size;
        this.vx = vx;
        this.vy = vy;
        this.settled = false;
        this.id = Math.random() * 1000;
        this.supernovaFlash = 0;
        this.rainbow = false;
        this.alpha = 1;
        this.fadingOut = false;
        this.imploding = false;
        this.clearing = false;
      }

      update(time) {
        if (this.imploding) {
          this.r -= 0.5;
          this.supernovaFlash = 1;
          if (this.r <= 0) this.alpha = 0;
          return;
        }

        if (this.fadingOut || this.clearing) {
          this.alpha -= (this.clearing ? 0.02 : 0.01);
        }

        if (!this.settled) {
          this.x += this.vx;
          this.y += this.vy;
          this.vx *= 0.94;
          this.vy *= 0.94;
          if (Math.abs(this.vx) < 0.1 && Math.abs(this.vy) < 0.1) {
            this.settled = true;
          }
        } else {
          // Gentle drift
          this.vx += Math.sin(time * 0.001 + this.id) * 0.002;
          this.vy += Math.cos(time * 0.001 + this.id) * 0.002;
          this.vx *= 0.9;
          this.vy *= 0.9;
          this.x += this.vx;
          this.y += this.vy;
        }

        // Mouse repel
        if (mouse.x && mouse.y) {
          const dx = this.x - mouse.x;
          const dy = this.y - mouse.y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (dist < 100) {
            const force = (100 - dist) / 100;
            this.vx -= (dx / dist) * force * 1;
            this.vy -= (dy / dist) * force * 1;
            this.settled = false;
          }
        }

        // Wrap around screen
        if (this.x < 0) this.x = width;
        if (this.x > width) this.x = 0;
        if (this.y < 0) this.y = height;
        if (this.y > height) this.y = 0;
      }

      draw(ctx, time) {
        if (this.alpha <= 0 || this.r <= 0) return;
        ctx.beginPath();
        ctx.arc(this.x, this.y, Math.max(0.1, this.r), 0, Math.PI * 2);
        
        let renderColor = this.color;
        if (this.rainbow) {
          const hue = (time * 0.1 + this.id) % 360;
          renderColor = `hsl(${hue}, 100%, 70%)`;
        } else if (this.supernovaFlash > 0) {
          renderColor = `rgba(255,255,255,${this.supernovaFlash})`;
          this.supernovaFlash -= 0.05;
        }

        ctx.globalAlpha = Math.max(0, this.alpha);
        ctx.fillStyle = renderColor;
        ctx.shadowBlur = 6;
        ctx.shadowColor = renderColor;
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;
      }
    }

    // Shooting stars
    let shootingStars = [];
    class ShootingStar {
      constructor() {
        this.x = Math.random() < 0.5 ? 0 : width;
        this.y = Math.random() * height;
        this.vx = (this.x === 0 ? 1 : -1) * (Math.random() * 5 + 10);
        this.vy = (Math.random() - 0.5) * 5;
        this.life = 1;
        this.decay = 0.02;
        this.history = [];
      }
      update() {
        this.history.push({x: this.x, y: this.y});
        if (this.history.length > 10) this.history.shift();
        this.x += this.vx;
        this.y += this.vy;
        this.life -= this.decay;
      }
      draw(ctx) {
        if (this.history.length < 2) return;
        ctx.beginPath();
        ctx.moveTo(this.history[0].x, this.history[0].y);
        for (let i = 1; i < this.history.length; i++) {
          ctx.lineTo(this.history[i].x, this.history[i].y);
        }
        ctx.strokeStyle = `rgba(200, 255, 255, ${Math.max(0, this.life)})`;
        ctx.lineWidth = 2;
        ctx.stroke();
      }
    }

    let lastShootingStar = 0;
    function spawnShootingStar(time) {
      if (time - lastShootingStar > 4000 + Math.random() * 3000) {
        shootingStars.push(new ShootingStar());
        lastShootingStar = time;
        playShootingStarSound();
      }
    }

    // Interaction
    const mouse = { x: null, y: null };
    window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
    window.addEventListener('mouseleave', () => { mouse.x = null; mouse.y = null; });
    window.addEventListener('touchmove', e => { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; }, {passive: true});
    window.addEventListener('touchend', () => { mouse.x = null; mouse.y = null; });

    window.addEventListener('click', e => {
      if (!audioCtx && soundEnabled) initAudio();
      if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') return;
      spawnBurst(e.clientX, e.clientY, 25, '#ffffff');
    });

    // Sound System
    let audioCtx;
    let soundEnabled = false;

    document.getElementById('btnSound').addEventListener('click', (e) => {
      if (!audioCtx) initAudio();
      soundEnabled = !soundEnabled;
      e.target.textContent = soundEnabled ? '♪ SOUND: ON' : '♪ SOUND: OFF';
    });

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }

    window.addEventListener('keydown', () => {
      if (!audioCtx && soundEnabled) initAudio();
    }, { once: true });

    function playTone(freq, duration, gainVal, type = 'sine') {
      if (!soundEnabled || !audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const delay = audioCtx.createDelay();
      const feedback = audioCtx.createGain();
      
      osc.type = type;
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      
      gain.gain.setValueAtTime(gainVal, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
      
      delay.delayTime.value = 0.15;
      feedback.gain.value = 0.3;
      
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      
      gain.connect(delay);
      delay.connect(feedback);
      feedback.connect(delay);
      delay.connect(audioCtx.destination);
      
      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    }

    function playShootingStarSound() {
      if (!soundEnabled || !audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.frequency.setValueAtTime(800, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.8);
      gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.8);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.8);
    }

    function playSupernovaSound() {
      if (!soundEnabled || !audioCtx) return;
      [200, 300, 450, 600, 900].forEach((f) => {
        playTone(f, 1.5, 0.05, 'sine');
      });
    }

    // Typing Logic
    const placeholder = document.getElementById('placeholder');
    const letterDisplay = document.getElementById('letterDisplay');
    let typedString = "";

    const vowels = ['a','e','i','o','u'];
    const numRegex = /[0-9]/;

    function spawnBurst(x, y, count, colorOverride) {
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 2 + Math.random() * 4;
        const vx = Math.cos(angle) * speed;
        const vy = Math.sin(angle) * speed;
        const size = 2 + Math.random() * 3;
        let color = colorOverride || '#ffffff';
        stars.push(new Star(x, y, color, size, vx, vy));
      }
      trimStars();
    }

    function spawnRing(x, y, count) {
      for (let i = 0; i < count; i++) {
        const angle = (i / count) * Math.PI * 2;
        const speed = 4;
        const vx = Math.cos(angle) * speed;
        const vy = Math.sin(angle) * speed;
        stars.push(new Star(x, y, '#ffffff', 2.5, vx, vy));
      }
      trimStars();
    }

    function trimStars() {
      if (stars.length > MAX_STARS) {
        const excess = stars.length - MAX_STARS;
        let marked = 0;
        for (let i = 0; i < stars.length && marked < excess; i++) {
          if (!stars[i].fadingOut && !stars[i].clearing && !stars[i].imploding) {
            stars[i].fadingOut = true;
            marked++;
          }
        }
      }
    }

    function showLetter(char) {
      letterDisplay.textContent = char;
      letterDisplay.classList.remove('letter-anim');
      void letterDisplay.offsetWidth; // trigger reflow
      letterDisplay.classList.add('letter-anim');
    }

    let particles = [];
    class Particle {
      constructor(x, y, type) {
        this.x = x; this.y = y; this.type = type;
        this.vx = (Math.random() - 0.5) * 6;
        this.vy = (Math.random() - 0.5) * 6 - 2;
        this.life = 1;
      }
      update() {
        this.x += this.vx; this.y += this.vy;
        this.life -= 0.015;
      }
      draw(ctx) {
        ctx.globalAlpha = Math.max(0, this.life);
        if (this.type === 'heart') {
          ctx.fillStyle = '#ff66b2';
          ctx.font = '30px Arial';
          ctx.fillText('❤', this.x - 15, this.y + 10);
        } else {
          ctx.fillStyle = Math.random() > 0.5 ? '#ff4500' : '#ffa500';
          ctx.beginPath();
          ctx.arc(this.x, this.y, Math.random()*4+2, 0, Math.PI*2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
      }
    }

    function spawnComboParticles(type) {
      for(let i=0; i<40; i++) {
        particles.push(new Particle(width/2, height/2, type));
      }
    }

    function handleKeyPress(key, keyCode) {
      if (placeholder.style.opacity !== '0') {
        placeholder.style.opacity = '0';
      }
      
      if (key.length === 1) {
        showLetter(key);
        typedString += key.toLowerCase();
        if (typedString.length > 10) typedString = typedString.slice(-10);
        
        let color = '#aaddff'; // consonant
        if (vowels.includes(key.toLowerCase())) color = '#ffd700'; // vowel
        else if (numRegex.test(key)) color = '#00ff88'; // number
        
        spawnBurst(width/2, height/2, 15 + Math.floor(Math.random()*6), color);
        
        const freq = 200 + (keyCode * 3.5) % 600;
        playTone(freq, 0.3, 0.04);
        
        checkCombos();
      } else if (key === ' ' || key === 'Spacebar') {
        spawnRing(width/2, height/2, 30);
        playTone(1200, 0.05, 0.03);
        typedString += ' ';
      } else if (key === 'Backspace') {
        let activeStars = stars.filter(s => !s.imploding && !s.clearing && !s.fadingOut);
        activeStars.sort((a,b) => {
          const da = Math.pow(a.x - width/2, 2) + Math.pow(a.y - height/2, 2);
          const db = Math.pow(b.x - width/2, 2) + Math.pow(b.y - height/2, 2);
          return da - db;
        });
        for(let i=0; i<Math.min(15, activeStars.length); i++) {
          activeStars[i].imploding = true;
        }
        playTone(80, 0.1, 0.05, 'sine');
      } else if (key === 'Enter') {
        flashAll();
      }
    }

    window.addEventListener('keydown', (e) => {
      if (e.target.id === 'mobileInput') {
        if (e.key === 'Backspace' || e.key === 'Enter' || e.key === ' ') {
          if (e.key === ' ') e.preventDefault();
          handleKeyPress(e.key, e.keyCode);
        }
        return;
      }
      if (e.key === ' ') e.preventDefault();
      handleKeyPress(e.key, e.keyCode || e.key.charCodeAt(0));
    });

    document.getElementById('mobileInput').addEventListener('input', (e) => {
      if (e.data && e.data.trim() !== '') {
        const char = e.data.slice(-1);
        handleKeyPress(char, char.charCodeAt(0));
      }
      e.target.value = ''; 
    });

    function checkCombos() {
      const last4 = typedString.slice(-4);
      if (last4 === 'love') spawnComboParticles('heart');
      if (last4 === 'fire') spawnComboParticles('fire');
      if (last4 === 'dark') {
        document.getElementById('darkOverlay').style.opacity = '1';
        setTimeout(() => document.getElementById('darkOverlay').style.opacity = '0', 1000);
      }
      if (last4 === 'god') {
        stars.forEach(s => s.rainbow = true);
        setTimeout(() => { stars.forEach(s => s.rainbow = false); }, 3000);
      }
    }

    function flashAll() {
      playSupernovaSound();
      stars.forEach(s => {
        if(s.alpha > 0 && !s.clearing && !s.imploding) {
          s.supernovaFlash = 1;
          s.vx += (Math.random() - 0.5) * 4;
          s.vy += (Math.random() - 0.5) * 4;
          s.settled = false;
        }
      });
    }

    // Toolbar actions
    document.getElementById('btnClear').addEventListener('click', () => {
      stars = [];
    });

    document.getElementById('btnSupernova').addEventListener('click', () => {
      playSupernovaSound();
      stars.forEach(s => {
        if (s.alpha > 0) {
          s.supernovaFlash = 1;
          const dx = s.x - width/2;
          const dy = s.y - height/2;
          const dist = Math.sqrt(dx*dx + dy*dy) || 1;
          s.vx = (dx/dist) * 8;
          s.vy = (dy/dist) * 8;
          s.settled = false;
          s.clearing = true;
        }
      });
    });

    document.getElementById('btnSave').addEventListener('click', () => {
      const tempCanvas = document.createElement('canvas');
      tempCanvas.width = width;
      tempCanvas.height = height;
      const tctx = tempCanvas.getContext('2d');
      
      // Draw background
      tctx.fillStyle = '#02020f';
      tctx.fillRect(0, 0, width, height);
      
      // Draw nebulas
      tctx.filter = 'blur(80px)';
      tctx.globalAlpha = 0.05;
      tctx.fillStyle = '#8a2be2';
      tctx.beginPath(); tctx.arc(0, 0, width*0.3, 0, Math.PI*2); tctx.fill();
      tctx.fillStyle = '#00ced1';
      tctx.beginPath(); tctx.arc(width, height, width*0.25, 0, Math.PI*2); tctx.fill();
      tctx.fillStyle = '#00008b';
      tctx.beginPath(); tctx.arc(width*0.3, height*0.2, width*0.35, 0, Math.PI*2); tctx.fill();
      
      // Draw current canvas state
      tctx.filter = 'none';
      tctx.globalAlpha = 1;
      tctx.drawImage(canvas, 0, 0);
      
      const link = document.createElement('a');
      link.download = 'my-galaxy.png';
      link.href = tempCanvas.toDataURL('image/png');
      link.click();
    });

    // Render Loop
    let frameCount = 0;
    function draw(time) {
      ctx.clearRect(0, 0, width, height);
      
      // Static background stars
      ctx.fillStyle = '#ffffff';
      staticStars.forEach(s => {
        ctx.globalAlpha = s.alpha;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;

      stars.forEach(s => s.update(time));
      
      // Remove dead stars
      stars = stars.filter(s => s.alpha > 0);
      
      // Draw constellation connections
      ctx.lineWidth = 1;
      for(let i=0; i<stars.length; i++) {
        if (stars[i].alpha <= 0) continue;
        for(let j=i+1; j<stars.length; j++) {
          if (stars[j].alpha <= 0) continue;
          const dx = stars[i].x - stars[j].x;
          const dy = stars[i].y - stars[j].y;
          const distSq = dx*dx + dy*dy;
          if (distSq < 6400) { // 80px distance
            ctx.beginPath();
            ctx.moveTo(stars[i].x, stars[i].y);
            ctx.lineTo(stars[j].x, stars[j].y);
            const opacity = Math.min(stars[i].alpha, stars[j].alpha, 0.15);
            ctx.strokeStyle = `rgba(150, 200, 255, ${opacity})`;
            ctx.stroke();
          }
        }
      }

      // Draw dynamic stars
      stars.forEach(s => s.draw(ctx, time));
      
      // Draw shooting stars
      spawnShootingStar(time);
      for(let i=shootingStars.length-1; i>=0; i--) {
        shootingStars[i].update();
        shootingStars[i].draw(ctx);
        if(shootingStars[i].life <= 0) shootingStars.splice(i, 1);
      }
      
      // Draw combo particles
      for(let i=particles.length-1; i>=0; i--) {
        particles[i].update();
        particles[i].draw(ctx);
        if(particles[i].life <= 0) particles.splice(i, 1);
      }

      // Update counter efficiently
      if (frameCount % 10 === 0) {
        const count = stars.filter(s => !s.imploding && !s.clearing && !s.fadingOut).length;
        document.getElementById('starCount').innerText = count;
      }
      frameCount++;

      requestAnimationFrame(draw);
    }
    requestAnimationFrame(draw);
  </script>
</body>
</html>
