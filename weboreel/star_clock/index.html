<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Star Clock - Astronomical Experience</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap');

    :root {
      --gold: #d4a843;
      --bg: #000008;
      --planet-blue: #4a9eff;
      --planet-dark: #0a2a6e;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      color: white;
      font-family: 'Space Mono', monospace;
      overflow: hidden;
      user-select: none;
      -webkit-font-smoothing: antialiased;
    }

    /* Background Layers */
    #bg-parallax {
      position: absolute;
      inset: -10%;
      width: 120%;
      height: 120%;
      transform-style: preserve-3d;
      pointer-events: none;
      z-index: 1;
    }

    #nebula {
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(circle at 20% 20%, rgba(80,20,120,0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(20,60,120,0.06) 0%, transparent 50%);
    }

    #milky-way {
      position: absolute;
      inset: -50%;
      background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.03) 50%, transparent 60%);
      filter: blur(20px);
    }

    #grain {
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      opacity: 0.03;
    }

    #stars {
      position: absolute;
      inset: 0;
    }

    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle linear infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 1; box-shadow: 0 0 5px white; }
    }

    /* UI Layer */
    #ui-layer {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 10;
    }

    #ui-layer > * {
      pointer-events: auto;
    }

    /* Clock Container */
    #clock-container {
      width: clamp(300px, 55vw, 500px);
      aspect-ratio: 1;
      position: relative;
      margin-bottom: 4vh;
      margin-top: -5vh; /* adjust visual center */
    }

    .clock-drift {
      width: 100%;
      height: 100%;
      position: relative;
      border-radius: 50%;
      animation: drift 3600s linear infinite;
    }

    @keyframes drift {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    canvas, svg, #hitboxes {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    #hitboxes {
      pointer-events: none;
    }

    .hitbox {
      position: absolute;
      pointer-events: auto;
      cursor: pointer;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      width: 40px; height: 40px;
    }

    /* Planet & Inner Elements */
    #planet-wrapper {
      position: absolute;
      inset: 0;
    }

    #planet-pos {
      position: absolute;
      top: 20.833%; /* (50% - 175/600 * 100%) */
      left: 50%;
      transform-origin: center;
      transform: translate(-50%, -50%);
    }

    #planet {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, var(--planet-blue), var(--planet-dark));
      box-shadow: 0 0 10px rgba(74,158,255,0.4);
      cursor: pointer;
      pointer-events: auto;
    }

    #planet-label {
      position: absolute;
      left: 22px;
      top: -2px;
      font-size: 11px;
      color: white;
      text-shadow: 0 0 5px rgba(255,255,255,0.8);
    }

    #galactic-core {
      position: absolute;
      top: 50%; left: 50%;
      width: 8px; height: 8px;
      background: white;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 15px 2px white;
      z-index: 5;
    }

    #pulsar {
      position: absolute;
      top: 50%; left: 50%;
      width: 24px; height: 24px;
      background: white;
      transform: translate(-50%, -50%);
      clip-path: polygon(
        50% 0%, 60% 20%, 85% 15%, 80% 40%, 
        100% 50%, 80% 60%, 85% 85%, 60% 80%, 
        50% 100%, 40% 80%, 15% 85%, 20% 60%, 
        0% 50%, 20% 40%, 15% 15%, 40% 20%
      );
      z-index: 4;
    }

    @keyframes pulse {
      0% { transform: translate(-50%, -50%) scale(1); filter: drop-shadow(0 0 5px rgba(255,255,255,0.5)); }
      10% { transform: translate(-50%, -50%) scale(1.4); filter: drop-shadow(0 0 20px rgba(255,255,255,1)); }
      100% { transform: translate(-50%, -50%) scale(1); filter: drop-shadow(0 0 5px rgba(255,255,255,0.5)); }
    }

    /* Time Display */
    #time-display-wrapper {
      text-align: center;
    }

    #digital-time {
      font-size: clamp(1.5rem, 3vw, 2.5rem);
      color: white;
      letter-spacing: 2px;
    }

    .sep {
      color: rgba(255,255,255,0.3);
      margin: 0 4px;
    }

    #date-display {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      color: #aaa;
      margin-top: 8px;
      font-size: 1.2rem;
    }

    #star-sign {
      font-family: 'Bebas Neue', sans-serif;
      color: var(--gold);
      margin-top: 8px;
      font-size: 1rem;
      letter-spacing: 3px;
    }

    /* Info Panel */
    #info-panel {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 15px 30px;
      text-align: center;
      width: 90%;
      max-width: 450px;
      transition: opacity 1s ease-in-out;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    #info-title {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      color: white;
      font-size: 1.3rem;
      margin-bottom: 4px;
    }

    #info-desc {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      color: #ffebd2;
      font-size: 1rem;
      opacity: 0.8;
    }

    /* Tooltip */
    #planet-tooltip {
      position: fixed;
      background: rgba(5,10,25,0.85);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(74,158,255,0.3);
      border-radius: 8px;
      padding: 12px 18px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 100;
      min-width: 180px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    }

    .tt-label {
      font-family: 'Bebas Neue', sans-serif;
      color: var(--planet-blue);
      font-size: 1rem;
      letter-spacing: 1.5px;
      margin-bottom: 6px;
    }

    .tt-time {
      font-size: 0.85rem;
      color: white;
      margin-bottom: 6px;
      opacity: 0.9;
    }

    .tt-fact {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.95rem;
      color: #aaa;
      line-height: 1.3;
    }

    /* Constellation Overlay */
    #constellation-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 5, 0.85);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }

    #constellation-overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .close-btn {
      position: absolute;
      top: 40px;
      right: 40px;
      font-size: 2.5rem;
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      transition: color 0.3s;
      font-family: sans-serif;
      line-height: 1;
    }

    .close-btn:hover {
      color: white;
    }

    #overlay-canvas {
      width: 300px;
      height: 300px;
      filter: drop-shadow(0 0 15px rgba(255,255,255,0.2));
    }

    #overlay-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3.5rem;
      color: var(--gold);
      margin-top: 30px;
      letter-spacing: 5px;
      text-shadow: 0 0 20px rgba(212, 168, 67, 0.4);
    }

    #overlay-desc {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.3rem;
      color: #ddd;
      max-width: 500px;
      text-align: center;
      margin-top: 15px;
      line-height: 1.5;
      padding: 0 20px;
    }

    /* Mute Button */
    #mute-btn {
      position: fixed;
      bottom: 30px;
      right: 30px;
      font-size: 1.8rem;
      color: white;
      cursor: pointer;
      opacity: 0.4;
      transition: all 0.3s;
      z-index: 100;
      user-select: none;
    }

    #mute-btn:hover {
      text-shadow: 0 0 15px white;
      opacity: 1;
    }

    @media (max-width: 600px) {
      #info-panel { bottom: 20px; padding: 12px 20px; }
      #mute-btn { top: 20px; right: 20px; bottom: auto; }
      .close-btn { top: 20px; right: 20px; }
    }
  </style>
</head>
<body>

  <!-- Background Layers for Parallax -->
  <div id="bg-parallax">
    <div id="nebula"></div>
    <div id="grain"></div>
    <div id="stars"></div>
    <div id="milky-way"></div>
  </div>

  <!-- UI Layer -->
  <div id="ui-layer">
    <div id="clock-container">
      <div class="clock-drift">
        
        <!-- SVG for Arcs -->
        <svg viewBox="0 0 600 600">
          <circle id="sec-arc" cx="300" cy="300" r="125" fill="none" stroke="#4aff4a" stroke-width="4" stroke-dasharray="785.4" stroke-dashoffset="0" style="transform-origin: center; transform: rotate(-90deg);" stroke-linecap="round"/>
          <circle id="planet-trail" cx="300" cy="300" r="175" fill="none" stroke="rgba(74,158,255,0.25)" stroke-width="4" stroke-dasharray="15.2 1100" stroke-linecap="round" style="transform-origin: center;"/>
        </svg>

        <!-- Canvas for Static Clock Rings & Constellations -->
        <canvas id="clock-canvas" width="600" height="600"></canvas>

        <!-- Invisible Hitboxes for Interactivity -->
        <div id="hitboxes"></div>

        <!-- HTML Overlay Elements inside Drift -->
        <div id="planet-wrapper">
          <div id="planet-pos">
            <div id="planet"></div>
            <div id="planet-label">0</div>
          </div>
        </div>

        <div id="pulsar"></div>
        <div id="galactic-core"></div>
        
      </div>
    </div>

    <div id="time-display-wrapper">
      <div id="digital-time">-- <span class="sep">:</span> -- <span class="sep">:</span> --</div>
      <div id="date-display">Gathering Starlight...</div>
      <div id="star-sign">---</div>
    </div>
  </div>

  <!-- Panels & Overlays -->
  <div id="info-panel">
    <div id="info-title">Initializing...</div>
    <div id="info-desc">Syncing with galactic core.</div>
  </div>

  <div id="planet-tooltip">
    <div class="tt-label">MINUTE TRAVELER</div>
    <div class="tt-time"><span id="tt-min">--</span>m <span id="tt-sec">--</span>s remaining</div>
    <div class="tt-fact">Seeking planetary data...</div>
  </div>

  <div id="constellation-overlay">
    <div class="close-btn">&times;</div>
    <canvas id="overlay-canvas" width="300" height="300"></canvas>
    <div id="overlay-title">Name</div>
    <div id="overlay-desc">Description</div>
  </div>

  <div id="mute-btn">✦</div>

  <script>
    /* --- DATA --- */
    const constellations = [
      { name: "Orion", desc: "The Hunter. Symbol of courage and the eternal chase.", dots: [[0,0],[10,-20],[-10,20],[20,20],[-20,-20], [0, 30]] },
      { name: "Ursa Major", desc: "The Great Bear. The eternal guide for celestial navigators.", dots: [[0,0],[-15,-10],[-30,-15],[-40,0],[-20,10], [15, -5]] },
      { name: "Cassiopeia", desc: "The Seated Queen. A distinct W shape woven into the northern sky.", dots: [[-20,-20],[-10,0],[0,-15],[10,0],[20,-20]] },
      { name: "Leo", desc: "The Lion. A symbol of immense strength and cosmic royalty.", dots: [[0,0],[15,-15],[25,0],[10,20],[-10,10], [-20, 0]] },
      { name: "Scorpius", desc: "The Scorpion. A magnificent stinger commanding the southern sky.", dots: [[0,-10],[10,-5],[15,10],[0,25],[-15,15], [-20, 5]] },
      { name: "Virgo", desc: "The Maiden. Harvester of the cosmos and bringer of justice.", dots: [[-15,-20],[0,-10],[10,5],[5,25],[-10,15], [-25, 0]] },
      { name: "Gemini", desc: "The Twins. Castor and Pollux bound together across eternity.", dots: [[-10,-20],[10,-20],[-5,20],[15,20], [-15, 0], [20, 0]] },
      { name: "Taurus", desc: "The Bull. Guardian of the Pleiades star cluster.", dots: [[0,0],[-15,-20],[15,-20],[0,20], [-25, -10], [25, -10]] },
      { name: "Aries", desc: "The Ram. The coveted golden fleece of the heavens.", dots: [[10,-10],[0,0],[-15,-5], [-25, -15]] },
      { name: "Aquarius", desc: "The Water Bearer. Pouring the waters of life into the void.", dots: [[-20,0],[-10,-10],[10,-10],[20,0], [0, 15]] },
      { name: "Pisces", desc: "The Fishes. Two ethereal fish bound by an invisible cosmic cord.", dots: [[-20,-20],[-10,0],[10,0],[20,20], [-30, -10], [30, 10]] },
      { name: "Sagittarius", desc: "The Archer. Forever aiming his arrow at the galactic center.", dots: [[-10,-10],[0,0],[15,-15],[-15,15], [10, 5], [-5, 20]] },
    ];

    const planetFacts = [
      "Jupiter has 95 recognized moons.",
      "Venus spins in the opposite direction to most planets.",
      "Mars hosts the largest dust storms in the solar system.",
      "Saturn's beautiful rings are mostly made of ice chunks.",
      "Neptune is battered by winds blowing at 1,200 mph.",
      "Mercury is the fastest planet, completing an orbit in 88 days.",
      "A day on Venus is longer than a year on Venus.",
      "Uranus rotates on its side, uniquely tilted."
    ];

    /* --- SETUP STARS & BG --- */
    const starsDiv = document.getElementById('stars');
    for(let i=0; i<300; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      const size = 1 + Math.random() * 2;
      star.style.width = size + 'px';
      star.style.height = size + 'px';
      star.style.animationDelay = (Math.random() * 6) + 's';
      star.style.animationDuration = (2 + Math.random() * 4) + 's';
      starsDiv.appendChild(star);
    }

    /* --- AUDIO SYSTEM --- */
    let audioCtx, masterGain, reverbNode;
    let isMuted = true;
    let audioInit = false;
    const muteBtn = document.getElementById('mute-btn');

    function initAudio() {
      if (audioInit) return;
      audioInit = true;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 0;
      masterGain.connect(audioCtx.destination);
      
      reverbNode = audioCtx.createConvolver();
      const sr = audioCtx.sampleRate;
      const len = sr * 3;
      const imp = audioCtx.createBuffer(2, len, sr);
      for(let i=0; i<2; i++) {
        const d = imp.getChannelData(i);
        for(let j=0; j<len; j++) {
          d[j] = (Math.random()*2-1) * Math.pow(1 - j/len, 3);
        }
      }
      reverbNode.buffer = imp;
      reverbNode.connect(masterGain);
      
      const synthBus = audioCtx.createGain();
      synthBus.connect(reverbNode);
      synthBus.connect(masterGain); 
      
      // Drone
      const sub = audioCtx.createOscillator();
      sub.type = 'sine'; sub.frequency.value = 40;
      const subGain = audioCtx.createGain(); subGain.gain.value = 0.04;
      sub.connect(subGain).connect(synthBus);
      sub.start();
      
      // Pad
      const pad1 = audioCtx.createOscillator(); pad1.type = 'sine'; pad1.frequency.value = 123;
      const pad2 = audioCtx.createOscillator(); pad2.type = 'sine'; pad2.frequency.value = 177;
      const padGain = audioCtx.createGain(); padGain.gain.value = 0.025;
      pad1.connect(padGain).connect(synthBus);
      pad2.connect(padGain).connect(synthBus);
      pad1.start(); pad2.start();
      
      // Shimmer
      const shim = audioCtx.createOscillator(); shim.type = 'triangle'; shim.frequency.value = 1200;
      const shimGain = audioCtx.createGain();
      const lfo = audioCtx.createOscillator(); lfo.type = 'sine'; lfo.frequency.value = 0.1;
      const lfoGain = audioCtx.createGain(); lfoGain.gain.value = 0.012;
      lfo.connect(shimGain.gain);
      shim.connect(shimGain).connect(synthBus);
      shim.start(); lfo.start();
      
      // Ping
      setInterval(() => {
        if(isMuted) return;
        const p = audioCtx.createOscillator(); p.type = 'sine'; p.frequency.value = 800 + Math.random() * 800;
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(0, audioCtx.currentTime);
        g.gain.linearRampToValueAtTime(0.06, audioCtx.currentTime + 0.1);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2);
        p.connect(g).connect(reverbNode);
        p.start(); p.stop(audioCtx.currentTime + 2.1);
      }, 10000);
    }

    muteBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if(!audioInit) initAudio();
      isMuted = !isMuted;
      muteBtn.style.opacity = isMuted ? '0.4' : '1';
      muteBtn.style.textShadow = isMuted ? 'none' : '0 0 15px white';
      if(masterGain && audioCtx) {
        masterGain.gain.setTargetAtTime(isMuted ? 0 : 1, audioCtx.currentTime, 0.1);
        if(!isMuted && audioCtx.state === 'suspended') audioCtx.resume();
      }
    });

    document.body.addEventListener('click', () => {
      if(!audioInit) {
        initAudio();
        isMuted = false;
        muteBtn.style.opacity = '1';
        muteBtn.style.textShadow = '0 0 15px white';
        masterGain.gain.setTargetAtTime(1, audioCtx.currentTime, 0.1);
        if(audioCtx.state === 'suspended') audioCtx.resume();
      }
    }, {once: true});

    document.body.addEventListener('touchstart', () => {
      if(!audioInit) {
        initAudio();
        isMuted = false;
        muteBtn.style.opacity = '1';
        muteBtn.style.textShadow = '0 0 15px white';
        masterGain.gain.setTargetAtTime(1, audioCtx.currentTime, 0.1);
        if(audioCtx.state === 'suspended') audioCtx.resume();
      }
    }, {once: true, passive: true});

    function playHeartbeat() {
      if(!audioInit || isMuted) return;
      const o = audioCtx.createOscillator(); o.type = 'sine'; o.frequency.value = 600;
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0.04, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);
      o.connect(g).connect(masterGain);
      o.start(); o.stop(audioCtx.currentTime + 0.05);
    }

    function playChime(freqs, duration) {
      if(!audioInit || isMuted) return;
      freqs.forEach((f, i) => {
        const o = audioCtx.createOscillator(); o.type = 'sine'; o.frequency.value = f;
        const g = audioCtx.createGain();
        const start = audioCtx.currentTime + i * duration;
        g.gain.setValueAtTime(0, start);
        g.gain.linearRampToValueAtTime(0.05, start + 0.05);
        g.gain.exponentialRampToValueAtTime(0.001, start + duration * 3);
        o.connect(g).connect(reverbNode);
        o.start(start); o.stop(start + duration * 4);
      });
    }

    function playMinuteChime() { playChime([523, 659, 784], 0.15); }
    function playHourChime() { playChime([523, 659, 784, 1046, 1318], 0.2); }
    function playClickSweep() {
      if(!audioInit || isMuted) return;
      const o = audioCtx.createOscillator(); o.type = 'sine';
      o.frequency.setValueAtTime(400, audioCtx.currentTime);
      o.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.2);
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0.05, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
      o.connect(g).connect(masterGain);
      o.start(); o.stop(audioCtx.currentTime + 0.25);
    }

    /* --- CANVAS DRAWING --- */
    const canvas = document.getElementById('clock-canvas');
    const ctx = canvas.getContext('2d');
    const hitboxes = document.getElementById('hitboxes');

    // Create hitboxes
    constellations.forEach((c, i) => {
      const angle = (i / 12) * Math.PI * 2 - Math.PI/2;
      const box = document.createElement('div');
      box.className = 'hitbox';
      const x = 300 + Math.cos(angle) * 250;
      const y = 300 + Math.sin(angle) * 250;
      box.style.left = `calc(${(x/600)*100}%)`;
      box.style.top = `calc(${(y/600)*100}%)`;
      box.addEventListener('click', () => showOverlay(i));
      hitboxes.appendChild(box);
    });

    function drawCanvas(currentHour) {
      ctx.clearRect(0, 0, 600, 600);
      
      // Rings
      ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(300, 300, 250, 0, Math.PI*2); ctx.stroke();
      ctx.strokeStyle = 'rgba(255,255,255,0.05)';
      ctx.beginPath(); ctx.arc(300, 300, 175, 0, Math.PI*2); ctx.stroke();
      ctx.strokeStyle = 'rgba(255,255,255,0.03)';
      ctx.beginPath(); ctx.arc(300, 300, 125, 0, Math.PI*2); ctx.stroke();
      
      // Ticks
      for(let i=0; i<60; i++) {
        const angle = (i / 60) * Math.PI * 2 - Math.PI / 2;
        const isFive = i % 5 === 0;
        const len = isFive ? 8 : 4;
        const x1 = 300 + Math.cos(angle) * (175 - len/2);
        const y1 = 300 + Math.sin(angle) * (175 - len/2);
        const x2 = 300 + Math.cos(angle) * (175 + len/2);
        const y2 = 300 + Math.sin(angle) * (175 + len/2);
        ctx.beginPath();
        ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
        ctx.strokeStyle = isFive ? 'rgba(255,255,255,0.4)' : 'rgba(255,255,255,0.15)';
        ctx.lineWidth = 1; ctx.stroke();
      }
      
      // Constellations
      constellations.forEach((c, i) => {
        const angle = (i / 12) * Math.PI * 2 - Math.PI/2;
        const cx = 300 + Math.cos(angle) * 250;
        const cy = 300 + Math.sin(angle) * 250;
        const isCurrent = (i === currentHour % 12);
        
        if (isCurrent) {
          // Hour hand
          ctx.beginPath();
          ctx.moveTo(300, 300); ctx.lineTo(cx, cy);
          ctx.strokeStyle = 'rgba(212, 168, 67, 0.6)';
          ctx.lineWidth = 1; ctx.stroke();
          
          // Glow
          const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 35);
          grad.addColorStop(0, 'rgba(212, 168, 67, 0.25)');
          grad.addColorStop(1, 'transparent');
          ctx.fillStyle = grad;
          ctx.beginPath(); ctx.arc(cx, cy, 35, 0, Math.PI*2); ctx.fill();
        }
        
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(angle + Math.PI/2);
        
        ctx.beginPath();
        c.dots.forEach((dot, idx) => {
          const dx = dot[0] * 1.2;
          const dy = dot[1] * 1.2;
          if (idx === 0) ctx.moveTo(dx, dy); else ctx.lineTo(dx, dy);
        });
        ctx.strokeStyle = isCurrent ? 'rgba(212, 168, 67, 0.9)' : 'rgba(255,255,255,0.2)';
        ctx.lineWidth = isCurrent ? 1.5 : 1; ctx.stroke();
        
        c.dots.forEach(dot => {
          ctx.beginPath();
          ctx.arc(dot[0]*1.2, dot[1]*1.2, isCurrent ? 2 : 1.5, 0, Math.PI*2);
          ctx.fillStyle = isCurrent ? '#d4a843' : '#fff';
          ctx.fill();
        });
        ctx.restore();
      });
    }

    /* --- CLOCK LOGIC --- */
    let lastSec = -1;
    let lastMin = -1;
    let lastHour = -1;
    
    // Setup initial drift angle so 12 is correct
    const initDate = new Date();
    const initDriftProgress = (initDate.getMinutes() * 60 + initDate.getSeconds() + initDate.getMilliseconds()/1000) / 3600;
    document.querySelector('.clock-drift').style.animationDelay = `-${initDriftProgress * 3600}s`;
    
    // Enable transitions shortly after load
    setTimeout(() => {
      document.getElementById('planet-wrapper').style.transition = 'transform 1s linear';
      document.getElementById('planet-trail').style.transition = 'transform 1s linear';
    }, 100);

    function updateInfoPanel(hr) {
      const c = constellations[hr % 12];
      const panel = document.getElementById('info-panel');
      panel.style.opacity = 0;
      setTimeout(() => {
        document.getElementById('info-title').innerText = `Currently in ${c.name}`;
        document.getElementById('info-desc').innerText = c.desc;
        panel.style.opacity = 1;
      }, 500);
    }

    function update() {
      requestAnimationFrame(update);
      const now = new Date();
      const sec = now.getSeconds();
      const min = now.getMinutes();
      const hr = now.getHours();
      
      if (sec !== lastSec) {
        if (lastSec !== -1) {
          playHeartbeat();
          if (min !== lastMin) {
            playMinuteChime();
            document.querySelector('.tt-fact').innerText = planetFacts[min % planetFacts.length];
          }
          if (hr !== lastHour) {
            playHourChime();
            updateInfoPanel(hr);
            drawCanvas(hr);
          }
        } else {
          // Init UI
          updateInfoPanel(hr);
          drawCanvas(hr);
          document.querySelector('.tt-fact').innerText = planetFacts[min % planetFacts.length];
        }
        
        // Pulsar
        const pulsar = document.getElementById('pulsar');
        pulsar.style.animation = 'none';
        void pulsar.offsetWidth; // reflow
        pulsar.style.animation = 'pulse 1s ease-out forwards';
        
        // Planet Pos updates every second for 1s transition
        const planetAngle = (min + sec/60) * 6; // 360 / 60
        document.getElementById('planet-wrapper').style.transform = `rotate(${planetAngle}deg)`;
        document.getElementById('planet-trail').style.transform = `rotate(${planetAngle - 90 - 5}deg)`;
        
        // Second Arc Color & Length
        const secArc = document.getElementById('sec-arc');
        if (sec === 0) secArc.style.transition = 'none';
        else if (sec === 1) secArc.style.transition = 'stroke-dashoffset 1s linear, stroke 1s linear';
        
        const progress = sec / 60;
        secArc.style.strokeDashoffset = progress * 785.4;
        secArc.style.stroke = `hsl(${120 - progress * 120}, 100%, 64%)`;
        
        // Label logic
        document.getElementById('planet-label').innerText = min;
        if(planetTooltip.style.opacity === '1') {
          document.getElementById('tt-min').innerText = min;
          document.getElementById('tt-sec').innerText = 60 - sec;
        }
        
        // Counter-rotate the label wrapper so it stays upright
        const driftAngleSec = (min * 60 + sec) * 0.1; 
        document.getElementById('planet-pos').style.transform = `translate(-50%, -50%) rotate(${-(planetAngle + driftAngleSec)}deg)`;
        
        // Digital time
        const pMin = min.toString().padStart(2, '0');
        const pSec = sec.toString().padStart(2, '0');
        const pHr = hr.toString().padStart(2, '0');
        document.getElementById('digital-time').innerHTML = `${pHr} <span class="sep">:</span> ${pMin} <span class="sep">:</span> ${pSec}`;
        
        lastSec = sec;
        lastMin = min;
        lastHour = hr;
      }
      
      updateTooltipPos();
    }
    requestAnimationFrame(update);

    // Date Setup
    const days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
    const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    document.getElementById('date-display').innerText = `${days[initDate.getDay()]}, ${initDate.getDate()} ${months[initDate.getMonth()]} ${initDate.getFullYear()}`;

    // Star Sign approx
    const signs = ["CAPRICORN","AQUARIUS","PISCES","ARIES","TAURUS","GEMINI","CANCER","LEO","VIRGO","LIBRA","SCORPIO","SAGITTARIUS","CAPRICORN"];
    const signDates = [20, 19, 20, 20, 21, 21, 22, 23, 23, 23, 22, 22];
    const d = initDate.getDate(), m = initDate.getMonth();
    document.getElementById('star-sign').innerText = d <= signDates[m] ? signs[m] : signs[m+1];

    /* --- INTERACTIONS --- */
    const planet = document.getElementById('planet');
    const planetTooltip = document.getElementById('planet-tooltip');
    
    planet.addEventListener('mouseenter', () => {
      planetTooltip.style.opacity = 1;
      updateTooltipPos();
      document.getElementById('tt-min').innerText = lastMin;
      document.getElementById('tt-sec').innerText = 60 - lastSec;
    });
    
    planet.addEventListener('mouseleave', () => {
      planetTooltip.style.opacity = 0;
    });

    function updateTooltipPos() {
      if (planetTooltip.style.opacity === '1') {
        const rect = planet.getBoundingClientRect();
        planetTooltip.style.left = (rect.left + rect.width/2) + 'px';
        planetTooltip.style.top = (rect.top - 15) + 'px';
        planetTooltip.style.transform = 'translate(-50%, -100%)';
      }
    }

    // Overlay
    function showOverlay(index) {
      const c = constellations[index];
      const overlay = document.getElementById('constellation-overlay');
      document.getElementById('overlay-title').innerText = c.name;
      document.getElementById('overlay-desc').innerText = c.desc;
      
      const octx = document.getElementById('overlay-canvas').getContext('2d');
      octx.clearRect(0, 0, 300, 300);
      octx.save();
      octx.translate(150, 150);
      
      octx.beginPath();
      c.dots.forEach((dot, idx) => {
        const dx = dot[0] * 3.5;
        const dy = dot[1] * 3.5;
        if (idx === 0) octx.moveTo(dx, dy); else octx.lineTo(dx, dy);
      });
      octx.strokeStyle = 'rgba(255,255,255,0.4)';
      octx.lineWidth = 1.5; octx.stroke();
      
      c.dots.forEach(dot => {
        octx.beginPath();
        octx.arc(dot[0]*3.5, dot[1]*3.5, 3, 0, Math.PI*2);
        octx.fillStyle = 'white';
        octx.fill();
        octx.shadowColor = 'white';
        octx.shadowBlur = 10;
        octx.fill();
      });
      octx.restore();
      
      overlay.classList.add('visible');
      playClickSweep();
    }

    document.querySelector('.close-btn').addEventListener('click', () => {
      document.getElementById('constellation-overlay').classList.remove('visible');
    });

    document.getElementById('constellation-overlay').addEventListener('click', function(e) {
      if (e.target.id !== 'overlay-canvas' && !e.target.closest('#overlay-title') && !e.target.closest('#overlay-desc')) {
        this.classList.remove('visible');
      }
    });

    // Parallax Dragging
    let isDragging = false;
    let rotX = 0, rotY = 0;
    
    function startDrag(e) {
      if (e.target.closest('#ui-layer') && !e.target.id.includes('ui-layer')) {
        // If clicking on specific UI elements like the clock, allow drag if it's the container, but not if it's the hitbox
        if (e.target.classList.contains('hitbox') || e.target.id === 'planet') return;
      }
      isDragging = true;
    }
    
    function stopDrag() { isDragging = false; }
    
    let lastTouchX, lastTouchY;
    
    function doDrag(e) {
      if(!isDragging) return;
      const mx = e.movementX || (e.touches ? e.touches[0].clientX - lastTouchX : 0);
      const my = e.movementY || (e.touches ? e.touches[0].clientY - lastTouchY : 0);
      
      if(e.touches) {
        lastTouchX = e.touches[0].clientX;
        lastTouchY = e.touches[0].clientY;
      }
      
      rotY += mx * 0.15;
      rotX -= my * 0.15;
      rotX = Math.max(-25, Math.min(25, rotX));
      rotY = Math.max(-25, Math.min(25, rotY));
      
      document.getElementById('bg-parallax').style.transform = `perspective(1000px) rotateX(${rotX}deg) rotateY(${rotY}deg)`;
    }

    document.addEventListener('mousedown', startDrag);
    document.addEventListener('mouseup', stopDrag);
    document.addEventListener('mousemove', doDrag);

    document.addEventListener('touchstart', (e) => {
      lastTouchX = e.touches[0].clientX;
      lastTouchY = e.touches[0].clientY;
      startDrag(e);
    }, {passive: false});
    document.addEventListener('touchend', stopDrag);
    document.addEventListener('touchmove', (e) => {
      if(isDragging && !e.target.closest('#info-panel')) e.preventDefault();
      doDrag(e);
    }, {passive: false});

  </script>
</body>
</html>
