<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vote_battle</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Anton&display=swap');

  body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; font-family: 'Anton', sans-serif; display: flex; }

  .side {
    width: 50vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
    padding-top: 10vh; cursor: pointer; position: relative; overflow: hidden;
  }
  
  #left-side { background: #e74c3c; color: white; border-right: 5px solid #000; }
  #right-side { background: #3498db; color: white; }

  h1 { font-size: 4rem; margin: 0; text-transform: uppercase; z-index: 10; pointer-events: none; text-shadow: 4px 4px 0 #000; }
  .score { font-size: 8rem; margin: 0; z-index: 10; pointer-events: none; text-shadow: 4px 4px 0 #000; line-height: 1; }

  .instruction { position: absolute; bottom: 20px; font-size: 1.5rem; opacity: 0.5; pointer-events: none; }

  canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }

  #vs {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    background: #000; color: #fff; width: 100px; height: 100px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-size: 3rem;
    z-index: 100; box-shadow: 0 0 0 10px rgba(0,0,0,0.2); pointer-events: none;
  }

</style>
</head>
<body>

<div id="vs">VS</div>

<div class="side" id="left-side">
  <canvas id="c-left"></canvas>
  <h1 contenteditable="true" style="pointer-events: auto;">OPTION A</h1>
  <div class="score" id="score-left">0</div>
  <div class="instruction">TAP TO VOTE</div>
</div>

<div class="side" id="right-side">
  <canvas id="c-right"></canvas>
  <h1 contenteditable="true" style="pointer-events: auto;">OPTION B</h1>
  <div class="score" id="score-right">0</div>
  <div class="instruction">TAP TO VOTE</div>
</div>

<script>
  let actx;
  function initAudio() { if(!actx) actx = new (window.AudioContext || window.webkitAudioContext)(); }

  function playDrop(isLeft) {
    if(!actx) return;
    const osc = actx.createOscillator(); osc.type = 'sine';
    const g = actx.createGain();
    osc.frequency.setValueAtTime(isLeft ? 300 : 400, actx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(50, actx.currentTime+0.1);
    g.gain.setValueAtTime(0.3, actx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime+0.1);
    osc.connect(g); g.connect(actx.destination); osc.start(); osc.stop(actx.currentTime+0.1);
  }

  // Simple Physics Engine for dropping balls
  class PhysicsWorld {
    constructor(canvas, isLeft) {
      this.canvas = canvas; this.ctx = canvas.getContext('2d');
      this.w = canvas.width = window.innerWidth/2;
      this.h = canvas.height = window.innerHeight;
      this.balls = []; this.isLeft = isLeft;
      window.addEventListener('resize', () => { this.w=canvas.width=window.innerWidth/2; this.h=canvas.height=window.innerHeight; });
    }
    
    addBall(x) {
      this.balls.push({ x: x, y: -20, vx: (Math.random()-0.5)*5, vy: Math.random()*5, r: 15 + Math.random()*10 });
    }
    
    update() {
      this.ctx.clearRect(0,0,this.w,this.h);
      
      const gravity = 0.5; const bounce = 0.6; const friction = 0.98;
      
      for(let i=0; i<this.balls.length; i++) {
        let b = this.balls[i];
        b.vy += gravity; b.x += b.vx; b.y += b.vy;
        
        // Ground
        if(b.y + b.r > this.h) { b.y = this.h - b.r; b.vy *= -bounce; b.vx *= friction; }
        // Walls
        if(b.x - b.r < 0) { b.x = b.r; b.vx *= -bounce; }
        if(b.x + b.r > this.w) { b.x = this.w - b.r; b.vx *= -bounce; }
        
        // Simple ball-ball collision
        for(let j=i+1; j<this.balls.length; j++) {
          let b2 = this.balls[j];
          let dx = b2.x - b.x; let dy = b2.y - b.y;
          let dist = Math.sqrt(dx*dx + dy*dy);
          if(dist < b.r + b2.r) {
            let overlap = (b.r + b2.r - dist) / 2;
            let nx = dx/dist; let ny = dy/dist;
            b.x -= nx * overlap; b.y -= ny * overlap;
            b2.x += nx * overlap; b2.y += ny * overlap;
            
            // basic velocity swap
            let dvx = b.vx - b2.vx; let dvy = b.vy - b2.vy;
            b.vx -= dvx*0.5; b.vy -= dvy*0.5;
            b2.vx += dvx*0.5; b2.vy += dvy*0.5;
          }
        }
        
        this.ctx.beginPath(); this.ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
        this.ctx.fillStyle = this.isLeft ? '#c0392b' : '#2980b9';
        this.ctx.fill();
        this.ctx.lineWidth = 3; this.ctx.strokeStyle = '#fff'; this.ctx.stroke();
      }
    }
  }

  const worldLeft = new PhysicsWorld(document.getElementById('c-left'), true);
  const worldRight = new PhysicsWorld(document.getElementById('c-right'), false);

  let scoreLeft = 0; let scoreRight = 0;

  document.getElementById('left-side').addEventListener('mousedown', (e) => {
    if(e.target.tagName === 'H1') return;
    initAudio(); playDrop(true);
    scoreLeft++; document.getElementById('score-left').innerText = scoreLeft;
    worldLeft.addBall(e.clientX);
  });

  document.getElementById('right-side').addEventListener('mousedown', (e) => {
    if(e.target.tagName === 'H1') return;
    initAudio(); playDrop(false);
    scoreRight++; document.getElementById('score-right').innerText = scoreRight;
    worldRight.addBall(e.clientX - window.innerWidth/2);
  });

  function loop() {
    worldLeft.update(); worldRight.update();
    requestAnimationFrame(loop);
  }
  loop();

</script>
</body>
</html>
