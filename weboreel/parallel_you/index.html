<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Parallel You</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html {
      width: 100%; height: 100%; overflow: hidden;
      background: #0f172a; color: #fff; font-family: 'DM Sans', sans-serif;
      overscroll-behavior: none;
    }

    #scroll-container {
      position: absolute; top: 0; left: 0; width: 100%; will-change: transform;
    }

    .scene {
      width: 100%; height: 100vh; position: relative; display: flex; justify-content: center; align-items: center;
    }

    /* Timeline Paths */
    .path-container {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1;
    }
    .path {
      position: absolute; width: 4px; height: 100%; background: #334155; left: 50%; transform: translateX(-50%);
      transition: all 0.5s ease-out;
    }
    
    .path-rich { left: 70%; background: #fbbf24; opacity: 0; box-shadow: 0 0 15px #fbbf24; }
    .path-athlete { left: 30%; background: #ef4444; opacity: 0; box-shadow: 0 0 15px #ef4444; }
    .path-coder { left: 85%; background: #22c55e; opacity: 0; box-shadow: 0 0 15px #22c55e; }
    
    .path-glow { position: absolute; top: 0; left: 50%; width: 20px; height: 100px; background: linear-gradient(to bottom, transparent, #fff, transparent); transform: translateX(-50%); animation: travel 2s infinite linear; }
    @keyframes travel { 0% { top: -100px; } 100% { top: 100vh; } }

    /* Avatars */
    .avatar-wrapper {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; align-items: center;
    }
    .avatar {
      width: 80px; height: 80px; background: #fff; border-radius: 50%;
      display: flex; justify-content: center; align-items: center; font-size: 40px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5); transition: all 0.5s;
    }
    .avatar-label { margin-top: 15px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; text-align: center; }

    /* Environment elements */
    .bg-text { position: absolute; font-size: 15vw; opacity: 0.03; font-weight: bold; white-space: nowrap; pointer-events: none; }

    .mute-btn { position: fixed; bottom: 20px; right: 20px; font-size: 1.5rem; z-index: 100; cursor: pointer; opacity: 0.5; color: white; }
    .start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; cursor: pointer; font-size: 2rem; }
  </style>
</head>
<body>
  <div class="start-screen" id="start-btn">
    <div>ENTER THE MULTIVERSE</div>
    <div style="font-size: 1rem; color: #94a3b8; margin-top: 20px;">Scroll to branch</div>
  </div>
  <div class="mute-btn" id="mute-btn">🌌</div>

  <div class="path-container">
    <div class="path" id="p-main"><div class="path-glow"></div></div>
    <div class="path path-rich" id="p-rich"></div>
    <div class="path path-athlete" id="p-athlete"></div>
    <div class="path path-coder" id="p-coder"></div>
  </div>

  <div class="avatar-wrapper" id="avatar-container">
    <div class="avatar" id="avatar">😐</div>
    <div class="avatar-label" id="avatar-label">Default You</div>
  </div>

  <div id="scroll-container">
    <div class="scene"><div class="bg-text" style="top:20%">THE BASELINE</div></div>
    <div class="scene"><div class="bg-text" style="top:50%; color:#ef4444">THE ATHLETE</div></div>
    <div class="scene"><div class="bg-text" style="top:30%; color:#fbbf24">THE CEO</div></div>
    <div class="scene"><div class="bg-text" style="top:70%; color:#22c55e">THE ARCHITECT</div></div>
    <div class="scene"><div class="bg-text" style="top:40%;">ALL OF THEM</div></div>
  </div>

  <script>
    let currentY = 0; let targetY = 0; let maxScroll = 0; let isStarted = false; const ease = 0.08;
    const scrollCont = document.getElementById('scroll-container');
    const vh = window.innerHeight;
    
    function resize() { maxScroll = scrollCont.offsetHeight - vh; }
    window.addEventListener('resize', resize);
    window.addEventListener('wheel', e => { if(!isStarted) return; e.preventDefault(); targetY += e.deltaY; targetY = Math.max(0, Math.min(targetY, maxScroll)); }, {passive: false});
    let touchY = 0;
    window.addEventListener('touchstart', e => touchY = e.touches[0].clientY);
    window.addEventListener('touchmove', e => { if(!isStarted) return; e.preventDefault(); targetY += (touchY - e.touches[0].clientY) * 1.5; targetY = Math.max(0, Math.min(targetY, maxScroll)); touchY = e.touches[0].clientY; }, {passive: false});

    const avatar = document.getElementById('avatar');
    const avatarContainer = document.getElementById('avatar-container');
    const avatarLabel = document.getElementById('avatar-label');
    
    const pMain = document.getElementById('p-main');
    const pAthlete = document.getElementById('p-athlete');
    const pRich = document.getElementById('p-rich');
    const pCoder = document.getElementById('p-coder');

    // Audio Context
    let audioCtx, masterGain;
    let baseTrack, athleteTrack, richTrack, coderTrack;
    
    function initAudio() {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      audioCtx = new AudioContext(); masterGain = audioCtx.createGain(); masterGain.gain.value = 0.5; masterGain.connect(audioCtx.destination);
      
      // Base Drone
      const baseOsc = audioCtx.createOscillator(); baseOsc.type = 'sine'; baseOsc.frequency.value = 110;
      baseTrack = audioCtx.createGain(); baseTrack.gain.value = 0.5;
      baseOsc.connect(baseTrack).connect(masterGain); baseOsc.start();

      // Athlete Fast Pulse
      const athOsc = audioCtx.createOscillator(); athOsc.type = 'sawtooth'; athOsc.frequency.value = 55;
      const athLFO = audioCtx.createOscillator(); athLFO.frequency.value = 8; // 8Hz pulse
      const athLFOGain = audioCtx.createGain(); athLFOGain.gain.value = 50;
      athLFO.connect(athLFOGain).connect(athOsc.frequency);
      athleteTrack = audioCtx.createGain(); athleteTrack.gain.value = 0;
      athOsc.connect(athleteTrack).connect(masterGain); athOsc.start(); athLFO.start();

      // Rich Chords
      const rOsc1 = audioCtx.createOscillator(); rOsc1.type = 'triangle'; rOsc1.frequency.value = 220; // A3
      const rOsc2 = audioCtx.createOscillator(); rOsc2.type = 'triangle'; rOsc2.frequency.value = 277.18; // C#4
      const rOsc3 = audioCtx.createOscillator(); rOsc3.type = 'triangle'; rOsc3.frequency.value = 329.63; // E4
      richTrack = audioCtx.createGain(); richTrack.gain.value = 0;
      rOsc1.connect(richTrack); rOsc2.connect(richTrack); rOsc3.connect(richTrack);
      richTrack.connect(masterGain); rOsc1.start(); rOsc2.start(); rOsc3.start();

      // Coder Arp
      const cOsc = audioCtx.createOscillator(); cOsc.type = 'square'; cOsc.frequency.value = 440;
      coderTrack = audioCtx.createGain(); coderTrack.gain.value = 0;
      cOsc.connect(coderTrack).connect(masterGain); cOsc.start();
      
      // Arp logic
      const scale = [440, 523.25, 659.25, 783.99, 880];
      let step = 0;
      setInterval(() => {
        if(coderTrack.gain.value > 0.01) {
          cOsc.frequency.setValueAtTime(scale[step % scale.length], audioCtx.currentTime);
          step++;
        }
      }, 150);
    }

    function loop() {
      if(isStarted) {
        currentY += (targetY - currentY) * ease;
        scrollCont.style.transform = `translateY(${-currentY}px)`;

        const progress = currentY / maxScroll; // 0 to 1

        let state = 0; // Default
        if(progress > 0.15 && progress < 0.4) state = 1; // Athlete
        else if(progress >= 0.4 && progress < 0.65) state = 2; // Rich
        else if(progress >= 0.65 && progress < 0.9) state = 3; // Coder
        else if(progress >= 0.9) state = 4; // All

        // Visuals & Logic
        switch(state) {
          case 0:
            avatar.innerText = '😐'; avatarLabel.innerText = 'Default You';
            avatarContainer.style.left = '50%'; avatar.style.background = '#fff'; avatar.style.boxShadow = '0 10px 25px rgba(0,0,0,0.5)';
            pMain.style.opacity = '1'; pAthlete.style.opacity = '0'; pRich.style.opacity = '0'; pCoder.style.opacity = '0';
            if(audioCtx) { athleteTrack.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1); richTrack.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1); coderTrack.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1); }
            break;
          case 1: // Athlete
            avatar.innerText = '🏃'; avatarLabel.innerText = 'The Athlete'; avatarLabel.style.color = '#ef4444';
            avatarContainer.style.left = '30%'; avatar.style.background = '#ef4444'; avatar.style.boxShadow = '0 0 50px #ef4444';
            pMain.style.opacity = '0.2'; pAthlete.style.opacity = '1'; pRich.style.opacity = '0'; pCoder.style.opacity = '0';
            if(audioCtx) { athleteTrack.gain.setTargetAtTime(0.3, audioCtx.currentTime, 0.1); richTrack.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1); coderTrack.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1); }
            break;
          case 2: // Rich
            avatar.innerText = '🍾'; avatarLabel.innerText = 'The CEO'; avatarLabel.style.color = '#fbbf24';
            avatarContainer.style.left = '70%'; avatar.style.background = '#fbbf24'; avatar.style.boxShadow = '0 0 50px #fbbf24';
            pMain.style.opacity = '0.2'; pAthlete.style.opacity = '0'; pRich.style.opacity = '1'; pCoder.style.opacity = '0';
            if(audioCtx) { athleteTrack.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1); richTrack.gain.setTargetAtTime(0.2, audioCtx.currentTime, 0.1); coderTrack.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1); }
            break;
          case 3: // Coder
            avatar.innerText = '💻'; avatarLabel.innerText = 'The Architect'; avatarLabel.style.color = '#22c55e';
            avatarContainer.style.left = '85%'; avatar.style.background = '#22c55e'; avatar.style.boxShadow = '0 0 50px #22c55e';
            pMain.style.opacity = '0.2'; pAthlete.style.opacity = '0'; pRich.style.opacity = '0'; pCoder.style.opacity = '1';
            if(audioCtx) { athleteTrack.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1); richTrack.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1); coderTrack.gain.setTargetAtTime(0.1, audioCtx.currentTime, 0.1); }
            break;
          case 4: // All
            avatar.innerText = '🌌'; avatarLabel.innerText = 'Infinite Potential'; avatarLabel.style.color = '#fff';
            avatarContainer.style.left = '50%'; avatar.style.background = 'linear-gradient(45deg, #ef4444, #fbbf24, #22c55e)'; avatar.style.boxShadow = '0 0 100px #fff';
            pMain.style.opacity = '1'; pAthlete.style.opacity = '1'; pRich.style.opacity = '1'; pCoder.style.opacity = '1';
            if(audioCtx) { athleteTrack.gain.setTargetAtTime(0.2, audioCtx.currentTime, 0.5); richTrack.gain.setTargetAtTime(0.2, audioCtx.currentTime, 0.5); coderTrack.gain.setTargetAtTime(0.1, audioCtx.currentTime, 0.5); }
            break;
        }

      }
      requestAnimationFrame(loop);
    }

    document.getElementById('start-btn').addEventListener('click', function() {
      initAudio(); this.style.display = 'none'; isStarted = true; resize(); loop();
    });

    let isMuted = false;
    document.getElementById('mute-btn').addEventListener('click', function() {
      if(!audioCtx) return; isMuted = !isMuted;
      masterGain.gain.linearRampToValueAtTime(isMuted ? 0 : 0.5, audioCtx.currentTime + 0.3);
      this.style.opacity = isMuted ? 0.3 : 1;
    });
    window.onload = resize;
  </script>
</body>
</html>
