<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Last Library</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,700&family=Playfair+Display:ital@1&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html {
      width: 100%; height: 100%;
      background: #1a1512; color: #d4c4a8;
      overflow-x: hidden;
      font-family: 'Cormorant Garamond', serif;
      overscroll-behavior: none;
    }

    #canvas-dust {
      position: fixed; top: 0; left: 0;
      width: 100vw; height: 100vh;
      pointer-events: none; z-index: 10;
    }

    .scroll-container {
      position: fixed; top: 0; left: 0;
      width: 100vw; will-change: transform; z-index: 5;
    }

    /* Bookshelf CSS Art */
    .bookshelf {
      position: relative; width: 100vw; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding-top: 20vh;
    }

    .shelf-row {
      width: 80vw; height: 20px; background: #2a1f18;
      border-bottom: 5px solid #110d0a; margin-top: 300px;
      position: relative; display: flex; align-items: flex-end; justify-content: center;
    }

    .book {
      width: 40px; height: 250px; background: #553322;
      margin: 0 5px; border-radius: 2px 5px 5px 2px;
      box-shadow: inset -5px 0 10px rgba(0,0,0,0.5), 5px 0 15px rgba(0,0,0,0.8);
      position: relative; cursor: pointer; transition: transform 0.3s;
      display: flex; align-items: center; justify-content: center;
    }
    .book:hover { transform: translateY(-20px); }
    .book.b1 { background: #3b2016; height: 260px; width: 50px; }
    .book.b2 { background: #1f2b24; height: 230px; width: 45px; transform-origin: bottom left; transform: rotate(-10deg); }
    .book.b2:hover { transform: rotate(-10deg) translateY(-20px); }
    .book.b3 { background: #4a1515; height: 280px; width: 60px; }
    .book.b4 { background: #1a1a1a; height: 240px; width: 40px; }

    .book-title {
      writing-mode: vertical-rl; text-orientation: mixed;
      color: #d4a843; font-family: 'Playfair Display'; font-style: italic;
      letter-spacing: 2px; opacity: 0.6; pointer-events: none;
    }

    /* Reading UI */
    .reading-ui {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 80vw; max-width: 600px; height: 70vh;
      background: #f5f0e8; color: #1a1a1a;
      box-shadow: 0 0 50px rgba(0,0,0,0.8);
      padding: 50px; border-radius: 5px;
      opacity: 0; pointer-events: none; transition: opacity 0.5s; z-index: 20;
      overflow-y: auto; font-size: 1.5rem; line-height: 1.6;
    }
    .reading-ui.active { opacity: 1; pointer-events: auto; }
    
    .close-btn {
      position: absolute; top: 20px; right: 20px;
      font-size: 1.5rem; cursor: pointer; font-family: 'DM Sans';
    }

    /* Quote Overlay */
    .quote-overlay {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-size: 3rem; text-align: center; max-width: 80vw;
      font-family: 'Playfair Display'; font-style: italic;
      opacity: 0; pointer-events: none; transition: opacity 2s; z-index: 2;
    }
    .visible { opacity: 1; }

    .mute-btn {
      position: fixed; bottom: 30px; right: 30px;
      font-size: 2rem; cursor: pointer; z-index: 100; pointer-events: auto; opacity: 0.5;
    }
    .mute-btn:hover { opacity: 1; }

    @media (max-width: 768px) {
      .book { width: 30px; height: 180px; }
      .book.b1 { height: 190px; width: 35px; } .book.b2 { height: 170px; } .book.b3 { height: 200px; width: 40px; }
      .quote-overlay { font-size: 2rem; }
      .reading-ui { width: 95vw; padding: 30px; font-size: 1.2rem; }
    }
  </style>
</head>
<body>

<canvas id="canvas-dust"></canvas>

<div class="scroll-container" id="scroll-container">
  <div class="bookshelf">
    <div style="height: 300px;"></div>
    <!-- Row 1 -->
    <div class="shelf-row">
      <div class="book b1" onclick="openBook(0)"><div class="book-title">Genesis</div></div>
      <div class="book b4" onclick="openBook(1)"><div class="book-title">I</div></div>
      <div class="book b2" onclick="openBook(2)"><div class="book-title">Flora</div></div>
      <div class="book b1" onclick="openBook(3)"><div class="book-title"></div></div>
      <div class="book b3" onclick="openBook(4)"><div class="book-title">Empire</div></div>
    </div>
    <!-- Row 2 -->
    <div class="shelf-row">
      <div class="book b4" onclick="openBook(5)"><div class="book-title">II</div></div>
      <div class="book b3" onclick="openBook(6)"><div class="book-title">Steel</div></div>
      <div class="book b1" onclick="openBook(7)"><div class="book-title"></div></div>
      <div class="book b2" onclick="openBook(8)"><div class="book-title">Fauna</div></div>
    </div>
    <!-- Row 3 -->
    <div class="shelf-row">
      <div class="book b1" onclick="openBook(9)"><div class="book-title">Silicon</div></div>
      <div class="book b4" onclick="openBook(10)"><div class="book-title">III</div></div>
      <div class="book b3" onclick="openBook(11)"><div class="book-title">Glass</div></div>
    </div>
    <!-- Row 4 -->
    <div class="shelf-row">
      <div class="book b2" onclick="openBook(12)"><div class="book-title">Silence</div></div>
      <div class="book b1" onclick="openBook(13)"><div class="book-title">Dust</div></div>
    </div>
    <div style="height: 100vh;"></div>
  </div>
</div>

<div class="quote-overlay" id="q-text">Everything that ever happened is written here.</div>

<div class="reading-ui" id="reader">
  <div class="close-btn" onclick="closeBook()">✕</div>
  <div id="reader-content"></div>
</div>

<div class="mute-btn" id="muteBtn" title="Toggle Audio">📖</div>

<script>
// --- AUDIO ENGINE ---
const AudioContext = window.AudioContext || window.webkitAudioContext;
let actx, masterGain;
let isMuted = true;

function initAudio() {
  if(actx) return;
  actx = new AudioContext();
  masterGain = actx.createGain(); masterGain.connect(actx.destination);
  masterGain.gain.value = 0.5;
  isMuted = false;
  document.getElementById('muteBtn').style.opacity = '1';
}

function playPageTurn() {
  if(!actx || isMuted) return;
  let bs = actx.createBufferSource();
  let b = actx.createBuffer(1, actx.sampleRate*0.5, actx.sampleRate);
  let d = b.getChannelData(0); 
  for(let i=0;i<b.length;i++) {
    let envelope = Math.exp(-i/(actx.sampleRate*0.1));
    d[i] = (Math.random()*2-1) * envelope;
  }
  bs.buffer = b;
  let f = actx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=800; f.Q.value=0.5;
  let g = actx.createGain(); g.gain.setValueAtTime(0.08, actx.currentTime);
  
  bs.connect(f).connect(g).connect(masterGain);
  bs.start();
}

function playNote(freq) {
  if(!actx || isMuted) return;
  let o = actx.createOscillator(); o.type='sine'; o.frequency.value=freq;
  let g = actx.createGain(); g.gain.setValueAtTime(0, actx.currentTime);
  g.gain.linearRampToValueAtTime(0.05, actx.currentTime+0.5); g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime+4);
  o.connect(g).connect(masterGain); o.start(); o.stop(actx.currentTime+4);
}

document.getElementById('muteBtn').addEventListener('click', () => {
  if(!actx) { initAudio(); return; }
  isMuted = !isMuted;
  masterGain.gain.setTargetAtTime(isMuted ? 0 : 0.5, actx.currentTime, 0.1);
  document.getElementById('muteBtn').style.opacity = isMuted ? '0.5' : '1';
});

// --- DUST PHYSICS ---
const canvas = document.getElementById('canvas-dust');
const ctx = canvas.getContext('2d');
let cw, ch;
let dust = [];

function resize() {
  cw = canvas.width = window.innerWidth;
  ch = canvas.height = window.innerHeight;
  if(dust.length===0) {
    for(let i=0; i<300; i++) dust.push({x: Math.random()*cw, y: Math.random()*ch, s: Math.random()*2, v: Math.random()*0.5+0.1, a: Math.random()*Math.PI*2});
  }
}
window.addEventListener('resize', resize);
resize();

// --- SCROLL ENGINE ---
let current = 0, target = 0, velocity = 0;
const ease = 0.08;
const container = document.getElementById('scroll-container');
let maxScroll = 0;

function tickScroll() {
  maxScroll = container.getBoundingClientRect().height - window.innerHeight;
  velocity = (target - current) * ease;
  current += velocity;
  container.style.transform = `translateY(${-current}px)`;
  
  // Quote fade
  let q = document.getElementById('q-text');
  if(current < 200) q.style.opacity = 1 - current/200;
  else q.style.opacity = 0;

  // Dust render
  ctx.clearRect(0,0,cw,ch);
  ctx.fillStyle = '#d4c4a8';
  dust.forEach(d => {
    // Scroll interaction
    d.y -= velocity * d.v * 2;
    d.x += Math.sin(d.a)*0.2; d.a += 0.01;
    if(d.y < 0) d.y += ch; if(d.y > ch) d.y -= ch;
    
    ctx.globalAlpha = Math.min(1, d.v * 2);
    ctx.beginPath(); ctx.arc(d.x, d.y, d.s, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1.0;

  requestAnimationFrame(tickScroll);
}

window.addEventListener('wheel', e => {
  if(readerOpen) return;
  e.preventDefault();
  target += e.deltaY * 0.8;
  target = Math.max(0, Math.min(target, maxScroll));
}, { passive: false });

let tStart = 0;
window.addEventListener('touchstart', e => tStart = e.touches[0].clientY, {passive:false});
window.addEventListener('touchmove', e => {
  if(readerOpen) return;
  e.preventDefault();
  target += (tStart - e.touches[0].clientY) * 1.5;
  target = Math.max(0, Math.min(target, maxScroll));
  tStart = e.touches[0].clientY;
}, {passive:false});

requestAnimationFrame(tickScroll);

// --- INTERACTION ---
let readerOpen = false;
const bookContents = [
  "In the beginning, there was only the sound of water. The earth had not yet hardened.",
  "Journal Entry 01: We learned how to strike stone together today. Fire is terrifying but warm.",
  "The leaves remember the seasons even when they fall. This is how the soil learns.",
  "A blank book. Someone intended to write here but ran out of time.",
  "Rome fell. They all fall. The bricks turn back to dust, the iron to rust.",
  "Journal Entry 402: We built machines to do the thinking for us. Now we have too much time.",
  "The skyscrapers scrape nothing. They just stand there, empty.",
  "A catalog of extinct birds. There are thousands of pages.",
  "The animals returned to the cities when we left. They don't seem to miss us.",
  "We captured lightning in sand. We called it computers.",
  "Journal Entry 999: I am the last one maintaining the servers. Why?",
  "The screens cracked. The power failed. The real stars came back.",
  "There is no one left to read this. The silence is absolute.",
  "And in the end, there was only the sound of water. The earth had reclaimed it all."
];
const notes = [261.6, 293.6, 329.6, 349.2, 392.0, 440.0, 493.8, 523.2];

function openBook(idx) {
  playPageTurn();
  playNote(notes[idx % notes.length]);
  document.getElementById('reader-content').innerText = bookContents[idx % bookContents.length];
  document.getElementById('reader').classList.add('active');
  readerOpen = true;
}

function closeBook() {
  playPageTurn();
  document.getElementById('reader').classList.remove('active');
  readerOpen = false;
}

</script>
</body>
</html>
