<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Founder Journey</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html {
      width: 100%; height: 100%; overflow: hidden;
      background: #fafafa; color: #111; font-family: 'Montserrat', sans-serif;
      overscroll-behavior: none; transition: background 1s, color 1s;
    }

    #scroll-container {
      position: absolute; top: 0; left: 0; width: 100%; height: 4000px;
      opacity: 0; pointer-events: none; z-index: 1000;
    }

    /* The Stage */
    .scene {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 300px; height: 500px; display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
    }

    /* Platform */
    .platform { width: 100px; height: 10px; background: #ddd; border-radius: 5px; transition: all 1s; }

    /* The Avatar */
    .avatar { position: relative; width: 80px; height: 160px; transition: all 1s; }
    
    .head { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 40px; height: 40px; background: #333; border-radius: 50%; transition: all 1s; }
    .torso { position: absolute; top: 45px; left: 50%; transform: translateX(-50%); width: 60px; height: 60px; background: #333; border-radius: 10px; transition: all 1s; }
    .legs { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 60px; height: 50px; display: flex; justify-content: space-between; }
    .leg { width: 25px; height: 100%; background: #333; border-radius: 5px; transition: all 1s; }
    
    /* Props */
    .prop-back { position: absolute; top: 45px; left: 5px; width: 70px; height: 60px; background: #e74c3c; border-radius: 10px; z-index: -1; opacity: 0; transition: opacity 0.5s; } /* Backpack */
    .prop-hand { position: absolute; top: 60px; right: -20px; width: 40px; height: 30px; background: #95a5a6; border-radius: 5px; opacity: 0; transition: opacity 0.5s; } /* Laptop */

    .title { position: fixed; top: 10%; left: 50%; transform: translateX(-50%); font-size: 4rem; font-weight: 800; text-transform: uppercase; letter-spacing: 5px; z-index: 20; transition: color 1s; opacity: 0; }
    .hud { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); letter-spacing: 2px; z-index: 20; color: #888; font-size: 0.9rem; }
  </style>
</head>
<body>

  <div class="title" id="title">THE STUDENT</div>
  <div class="hud">SCROLL TO GROW</div>

  <div class="scene">
    <div class="avatar" id="avatar">
      <div class="prop-back" id="p-back"></div>
      <div class="head" id="head"></div>
      <div class="torso" id="torso"></div>
      <div class="prop-hand" id="p-hand"></div>
      <div class="legs"><div class="leg" id="l1"></div><div class="leg" id="l2"></div></div>
    </div>
    <div class="platform" id="plat"></div>
  </div>

  <div id="scroll-container"></div>

  <script>
    let currentY = 0; let targetY = 0; let maxScroll = 4000; const ease = 0.05;
    
    let audioInit = false; let audioCtx, masterGain;
    
    function initAudio() {
      if(audioInit) return; audioInit = true;
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      audioCtx = new AudioContext(); masterGain = audioCtx.createGain(); masterGain.gain.value = 0.5; masterGain.connect(audioCtx.destination);
    }

    function playStage(idx) {
      if(!audioCtx) return;
      const t = audioCtx.currentTime;
      if(idx === 0) { // School bell ring
         const o = audioCtx.createOscillator(); o.type = 'triangle'; o.frequency.setValueAtTime(800, t);
         const g = audioCtx.createGain(); g.gain.setValueAtTime(0.5, t); g.gain.exponentialRampToValueAtTime(0.01, t+0.5);
         o.connect(g).connect(masterGain); o.start(); o.stop(t+0.5);
      } else if(idx === 1) { // Keyboard type
         const o = audioCtx.createOscillator(); o.type = 'square'; o.frequency.setValueAtTime(400, t);
         const g = audioCtx.createGain(); g.gain.setValueAtTime(0.2, t); g.gain.exponentialRampToValueAtTime(0.01, t+0.1);
         o.connect(g).connect(masterGain); o.start(); o.stop(t+0.1);
      } else if(idx === 2) { // Phone ring
         const o = audioCtx.createOscillator(); o.type = 'sine'; o.frequency.setValueAtTime(1200, t); o.frequency.setValueAtTime(1400, t+0.1);
         const g = audioCtx.createGain(); g.gain.setValueAtTime(0.3, t); g.gain.exponentialRampToValueAtTime(0.01, t+0.4);
         o.connect(g).connect(masterGain); o.start(); o.stop(t+0.4);
      } else if(idx === 3) { // Orchestral swell (chord)
         [261.63, 329.63, 392.00].forEach(f => {
           const o = audioCtx.createOscillator(); o.type = 'sine'; o.frequency.value = f;
           const g = audioCtx.createGain(); g.gain.setValueAtTime(0.01, t); g.gain.linearRampToValueAtTime(0.5, t+1); g.gain.exponentialRampToValueAtTime(0.01, t+3);
           o.connect(g).connect(masterGain); o.start(); o.stop(t+3);
         });
      }
    }

    window.addEventListener('wheel', e => { initAudio(); e.preventDefault(); targetY += e.deltaY; targetY = Math.max(0, Math.min(targetY, maxScroll)); }, {passive: false});
    window.addEventListener('mousedown', initAudio);
    let touchY = 0;
    window.addEventListener('touchstart', e => { initAudio(); touchY = e.touches[0].clientY; });
    window.addEventListener('touchmove', e => { e.preventDefault(); targetY += (touchY - e.touches[0].clientY) * 1.5; targetY = Math.max(0, Math.min(targetY, maxScroll)); touchY = e.touches[0].clientY; }, {passive: false});

    let currentStage = -1;

    function loop() {
      currentY += (targetY - currentY) * ease;
      const progress = currentY / maxScroll; // 0 to 1

      let stage = 0;
      if(progress > 0.25 && progress < 0.5) stage = 1;
      else if(progress >= 0.5 && progress < 0.75) stage = 2;
      else if(progress >= 0.75) stage = 3;

      if(stage !== currentStage) {
        currentStage = stage;
        if(audioInit) playStage(stage);
        
        const title = document.getElementById('title');
        title.style.opacity = 0; setTimeout(()=>{title.style.opacity=1;}, 300);
        
        const head = document.getElementById('head');
        const torso = document.getElementById('torso');
        const l1 = document.getElementById('l1'); const l2 = document.getElementById('l2');
        const pBack = document.getElementById('p-back');
        const pHand = document.getElementById('p-hand');
        const plat = document.getElementById('plat');

        if(stage === 0) {
          title.innerText = "THE STUDENT"; document.body.style.background = '#fafafa'; document.body.style.color = '#111';
          torso.style.background = '#3498db'; torso.style.borderRadius = '10px';
          l1.style.background = '#2c3e50'; l2.style.background = '#2c3e50';
          pBack.style.opacity = 1; pHand.style.opacity = 0;
          plat.style.width = '100px'; plat.style.height = '10px'; plat.style.background = '#ddd'; plat.style.boxShadow = 'none';
        } else if(stage === 1) {
          title.innerText = "THE BUILDER"; document.body.style.background = '#2c3e50'; document.body.style.color = '#fff';
          torso.style.background = '#000'; torso.style.borderRadius = '20px 20px 0 0'; // Hoodie
          pBack.style.opacity = 0; pHand.style.opacity = 1; pHand.style.background = '#95a5a6'; // Laptop
          plat.style.width = '150px'; plat.style.height = '20px'; plat.style.background = '#34495e';
        } else if(stage === 2) {
          title.innerText = "THE FOUNDER"; document.body.style.background = '#fff'; document.body.style.color = '#111';
          torso.style.background = '#111'; torso.style.borderRadius = '5px'; // Shirt
          pHand.style.background = '#333'; pHand.style.width = '20px'; pHand.style.height = '30px'; pHand.style.top = '50px'; // Phone
          plat.style.width = '200px'; plat.style.height = '40px'; plat.style.background = '#e74c3c';
        } else {
          title.innerText = "THE LEADER"; document.body.style.background = '#111'; document.body.style.color = '#d4af37';
          torso.style.background = '#2c3e50'; torso.style.border = '2px solid #d4af37'; // Suit
          pHand.style.opacity = 0;
          plat.style.width = '300px'; plat.style.height = '80px'; plat.style.background = '#000'; plat.style.boxShadow = '0 -10px 50px rgba(212, 175, 55, 0.5)';
        }
      }

      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
