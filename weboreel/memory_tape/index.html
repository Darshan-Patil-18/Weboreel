<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memory Tape</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;700&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1a1008;
            --brand-amber: #ffaa00;
            --brand-red: #ff3333;
            --shell-bg: #1a1a1a;
            --shell-grad: linear-gradient(145deg, #2a2a2a, #1a1a1a);
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.8) 100%),
                radial-gradient(ellipse at 50% 0%, rgba(255,180,80,0.15) 0%, transparent 60%),
                repeating-linear-gradient(90deg, rgba(255,255,255,0.02) 0px, transparent 1px, transparent 20px),
                repeating-linear-gradient(45deg, rgba(255,255,255,0.02) 0px, transparent 1px, transparent 20px);
            background-attachment: fixed;
            font-family: 'DM Sans', sans-serif;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .noise-overlay {
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.05;
            pointer-events: none;
            z-index: 50;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
            transition: transform 0.3s ease;
        }

        /* --- Memory Display Screen --- */
        .screen-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
        }

        .memory-screen {
            width: 340px;
            height: 80px;
            background: #0d0800;
            border: 2px solid #333;
            border-radius: 6px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 0 10px rgba(255,140,0,0.1);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            padding: 0 15px;
            box-sizing: border-box;
        }

        .scanlines {
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(transparent, transparent 2px, rgba(0,0,0,0.3) 2px, rgba(0,0,0,0.3) 4px);
            pointer-events: none;
            z-index: 10;
        }

        .screen-content {
            font-family: 'Special Elite', monospace;
            color: var(--brand-amber);
            font-size: 1.1rem;
            position: relative;
            z-index: 5;
            display: flex;
            align-items: center;
            text-shadow: 0 0 5px rgba(255, 170, 0, 0.4);
        }

        .scroll-wrapper {
            display: flex;
            white-space: pre;
            width: fit-content;
            transform: translateX(0);
            will-change: transform;
        }

        .cursor {
            animation: blink 1s step-end infinite;
            margin-left: 5px;
        }

        @keyframes blink { 50% { opacity: 0; } }

        .screen-label {
            font-size: 0.6rem;
            color: var(--brand-amber);
            letter-spacing: 0.3em;
            margin-top: 8px;
            opacity: 0.6;
            text-shadow: 0 0 5px rgba(255,170,0,0.3);
        }

        /* --- Cassette Tape --- */
        .cassette-wrapper {
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.8));
            transition: filter 0.2s ease;
        }

        .cassette-shell {
            width: 340px;
            height: 210px;
            background: var(--shell-grad);
            border: 2px solid #333;
            border-radius: 12px;
            box-sizing: border-box;
            position: relative;
            clip-path: polygon(
                0 0, 100% 0, 
                100% 90%, 95% 90%, 95% 100%, 
                5% 100%, 5% 90%, 0 90%
            );
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
        }

        .cassette-label {
            width: 220px;
            height: 90px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 6px;
            background: linear-gradient(135deg, #c8860a, #a06008);
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background 0.3s ease;
        }

        .cassette-label.recording {
            background: linear-gradient(135deg, #c8300a, #a02008);
        }

        .screw-hole {
            width: 8px;
            height: 8px;
            background: #111;
            border-radius: 50%;
            position: absolute;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.8), 0 1px 0 rgba(255,255,255,0.1);
        }
        .screw-hole.top-left { top: 8px; left: 8px; }
        .screw-hole.top-right { top: 8px; right: 8px; }

        .side-indicator {
            position: absolute;
            top: 8px;
            left: 25px;
            font-family: 'Special Elite', monospace;
            font-size: 0.6rem;
            color: rgba(255,255,255,0.9);
        }

        .brand-text {
            position: absolute;
            top: 8px;
            right: 25px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.8);
            letter-spacing: 0.05em;
        }

        .tape-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.4rem;
            color: white;
            margin-top: 18px;
            letter-spacing: 0.05em;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .rec-indicator {
            position: absolute;
            top: 8px;
            right: 80px;
            color: var(--brand-red);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.65rem;
            font-weight: bold;
            opacity: 0;
            text-shadow: 0 0 5px rgba(255,50,50,0.5);
        }
        .cassette-label.recording .rec-indicator {
            animation: blink 1s infinite;
        }

        .tape-window {
            width: 120px;
            height: 30px;
            background: #000;
            border-radius: 4px;
            border: 2px solid #222;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            z-index: 3;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }

        .tape-line {
            width: 100%;
            height: 2px;
            background: #4a2a10;
            box-shadow: 0 0 2px rgba(74,42,16,0.5);
        }

        .reel {
            width: 70px;
            height: 70px;
            background: #111;
            border: 3px solid #333;
            border-radius: 50%;
            position: absolute;
            transform: translate(-50%, -50%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 4;
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.9);
        }
        .reel-left { top: 105px; left: 85px; }
        .reel-right { top: 105px; left: 255px; }

        .reel-inner {
            width: 40px;
            height: 40px;
            background: #1a1a1a;
            border: 2px solid #444;
            border-radius: 50%;
            position: relative;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5), 0 2px 4px rgba(0,0,0,0.8);
        }

        .spoke {
            width: 2px;
            height: 20px;
            background: #555;
            position: absolute;
            top: 0;
            left: 19px;
            transform-origin: 1px 20px;
            border-radius: 1px;
        }

        @keyframes spin-cw {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes spin-ccw {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }

        .playing .reel-left .reel-inner { animation: spin-cw 3s linear infinite; }
        .playing .reel-right .reel-inner { animation: spin-ccw 3s linear infinite; }
        .rewinding .reel-left .reel-inner { animation: spin-ccw 0.5s linear infinite; }
        .rewinding .reel-right .reel-inner { animation: spin-cw 0.5s linear infinite; }

        /* --- Controls --- */
        .controls-area {
            margin-top: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .controls-row {
            display: flex;
            gap: 8px;
        }

        .control-btn {
            width: 48px;
            height: 48px;
            border-radius: 6px;
            background: var(--shell-grad);
            border: 1px solid #444;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.1s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'DM Sans', sans-serif;
        }

        .control-btn:hover {
            background: linear-gradient(145deg, #333, #222);
            transform: translateY(-2px);
        }

        .control-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 2px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.02);
        }

        .control-btn.active-play {
            box-shadow: 0 0 15px rgba(255,170,0,0.4);
            color: var(--brand-amber);
            text-shadow: 0 0 5px rgba(255,170,0,0.5);
        }

        .control-btn.active-record {
            box-shadow: 0 0 15px rgba(255,50,50,0.5);
            color: var(--brand-red);
            text-shadow: 0 0 5px rgba(255,50,50,0.5);
        }

        /* --- VU Meter --- */
        .vu-meter {
            display: flex;
            gap: 3px;
            align-items: flex-end;
            height: 30px;
            background: #0d0800;
            padding: 6px;
            border-radius: 6px;
            border: 2px solid #333;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
            box-sizing: border-box;
        }

        .vu-bar {
            width: 6px;
            height: 4px;
            background: #00ff00;
            transition: height 0.1s ease;
            border-radius: 1px;
            box-shadow: 0 0 3px rgba(0,255,0,0.4);
        }
        .vu-bar:nth-child(n+6) { background: #ffcc00; box-shadow: 0 0 3px rgba(255,204,0,0.4); }
        .vu-bar:nth-child(n+8) { background: #ff3300; box-shadow: 0 0 3px rgba(255,51,0,0.4); }

        /* --- Tape Collection --- */
        .tape-collection {
            position: absolute;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            width: 200px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 20;
        }

        .collection-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 0.9rem;
            color: var(--brand-amber);
            letter-spacing: 0.3em;
            margin-bottom: 5px;
            text-shadow: 0 0 5px rgba(255,170,0,0.3);
        }

        .tape-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .tape-list::-webkit-scrollbar { width: 4px; }
        .tape-list::-webkit-scrollbar-thumb { background: var(--brand-amber); border-radius: 4px; }
        .tape-list::-webkit-scrollbar-track { background: #111; border-radius: 4px; }

        .tape-card {
            width: 160px;
            background: #1a1a1a;
            border-left: 2px solid #555;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .tape-card:hover {
            background: #222;
            transform: translateX(-2px);
        }

        .tape-card.active {
            border-left-color: var(--brand-amber);
            box-shadow: 0 0 15px rgba(255,170,0,0.15);
            background: #1e150b;
        }

        .tape-preview {
            font-family: 'Special Elite', monospace;
            font-size: 0.75rem;
            color: var(--brand-amber);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 5px;
        }

        .tape-number {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 0.7rem;
            color: #888;
        }

        .delete-btn {
            position: absolute;
            right: 5px;
            top: 5px;
            color: #666;
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 0.7rem;
            opacity: 0;
            transition: all 0.2s;
            padding: 2px 5px;
        }

        .tape-card:hover .delete-btn { opacity: 1; }
        .delete-btn:hover { color: var(--brand-red); transform: scale(1.2); }

        @keyframes slideIn {
            from { transform: translateX(20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* --- Record Overlay --- */
        .record-overlay {
            position: fixed;
            bottom: -300px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
        }

        .record-overlay.visible {
            bottom: 40px;
        }

        .record-container {
            width: 340px;
            background: rgba(20, 10, 0, 0.95);
            border: 1px solid var(--brand-amber);
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8), 0 0 20px rgba(255,170,0,0.2);
            backdrop-filter: blur(10px);
            box-sizing: border-box;
        }

        #record-input {
            width: 100%;
            height: 80px;
            background: rgba(0,0,0,0.6);
            border: 1px solid #555;
            color: var(--brand-amber);
            font-family: 'Special Elite', monospace;
            padding: 10px;
            box-sizing: border-box;
            resize: none;
            border-radius: 4px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        #record-input:focus {
            outline: none;
            border-color: var(--brand-amber);
            box-shadow: inset 0 0 5px rgba(255,170,0,0.2);
        }

        #record-input::placeholder {
            color: rgba(255,170,0,0.3);
        }

        .record-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .char-counter {
            font-size: 0.8rem;
            color: #888;
        }

        .record-actions {
            display: flex;
            align-items: center;
        }

        .cancel-btn {
            background: transparent;
            color: #aaa;
            border: none;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.8rem;
            text-decoration: underline;
            margin-right: 15px;
            transition: color 0.2s;
        }

        .cancel-btn:hover { color: white; }

        .save-btn {
            background: var(--brand-amber);
            color: var(--bg-color);
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            font-family: 'DM Sans', sans-serif;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .save-btn:hover {
            background: #ffbb33;
            transform: scale(1.05);
            box-shadow: 0 4px 10px rgba(255,170,0,0.3);
        }

        /* --- Mute Button --- */
        .mute-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            border: 1px solid #444;
            color: white;
            font-size: 1.2rem;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 200;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .mute-btn:hover {
            background: rgba(0,0,0,0.8);
            border-color: #666;
            transform: scale(1.05);
        }

        /* --- Responsive Design --- */
        @media (max-width: 900px) {
            body {
                flex-direction: column;
                justify-content: flex-start;
                padding-top: 20px;
                overflow-y: auto;
            }
            .main-container {
                transform: scale(0.82); /* Cassette roughly 280x175 */
                transform-origin: top center;
                margin-bottom: -40px; /* offset scaling gap */
            }
            .tape-collection {
                position: relative;
                right: auto;
                top: auto;
                transform: none;
                width: 90%;
                max-width: 340px;
                margin-top: 20px;
                margin-bottom: 40px;
            }
            .tape-list {
                flex-direction: row;
                overflow-x: auto;
                padding-bottom: 15px;
                width: 100%;
                gap: 15px;
            }
            .tape-card {
                flex-shrink: 0;
            }
            .controls-row {
                gap: 5px;
            }
            .control-btn {
                width: 40px;
                height: 40px;
                font-size: 1rem;
            }
            .mute-btn {
                bottom: auto;
                top: 20px;
                right: 20px;
            }
            .record-overlay.visible {
                bottom: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="noise-overlay"></div>

    <div class="main-container">
        <!-- Memory Display -->
        <div class="screen-wrapper">
            <div class="memory-screen">
                <div class="scanlines"></div>
                <div class="screen-content" id="display-content">
                    <div class="scroll-wrapper" id="scroll-wrapper">
                        <span class="scrolling-text" id="scroll-text-1"></span><span class="scrolling-text" id="scroll-text-2"></span>
                    </div>
                    <span class="cursor" id="cursor">▌</span>
                </div>
            </div>
            <div class="screen-label">NOW PLAYING</div>
        </div>

        <!-- Cassette Tape -->
        <div class="cassette-wrapper" id="cassette-wrapper">
            <div class="cassette-shell" id="cassette">
                <div class="cassette-label" id="cassette-label">
                    <div class="screw-hole top-left"></div>
                    <div class="screw-hole top-right"></div>
                    <div class="side-indicator">SIDE A</div>
                    <div class="brand-text">MEMORY-90</div>
                    <div class="tape-title">MY MEMORIES</div>
                    <div class="rec-indicator" id="rec-indicator">● REC</div>
                    
                    <div class="tape-window">
                        <div class="tape-line"></div>
                    </div>
                </div>
                
                <div class="reel reel-left">
                    <div class="reel-inner">
                        <div class="spoke" style="transform: rotate(0deg)"></div>
                        <div class="spoke" style="transform: rotate(120deg)"></div>
                        <div class="spoke" style="transform: rotate(240deg)"></div>
                    </div>
                </div>
                
                <div class="reel reel-right">
                    <div class="reel-inner">
                        <div class="spoke" style="transform: rotate(0deg)"></div>
                        <div class="spoke" style="transform: rotate(120deg)"></div>
                        <div class="spoke" style="transform: rotate(240deg)"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Controls & VU Meter -->
        <div class="controls-area">
            <div class="controls-row">
                <button class="control-btn" id="btn-prev" title="PREV">&#x23EE;</button>
                <button class="control-btn" id="btn-rewind" title="REWIND">&#x23EA;</button>
                <button class="control-btn" id="btn-record" title="RECORD">&#x23FA;</button>
                <button class="control-btn" id="btn-play" title="PLAY / PAUSE">&#x25B6;</button>
                <button class="control-btn" id="btn-next" title="NEXT">&#x23E9;</button>
            </div>
            
            <div class="vu-meter" id="vu-meter">
                <div class="vu-bar"></div><div class="vu-bar"></div><div class="vu-bar"></div><div class="vu-bar"></div>
                <div class="vu-bar"></div><div class="vu-bar"></div><div class="vu-bar"></div><div class="vu-bar"></div>
            </div>
        </div>
    </div>

    <!-- Tape Collection -->
    <div class="tape-collection">
        <div class="collection-title">TAPE COLLECTION</div>
        <div class="tape-list" id="tape-list"></div>
    </div>

    <!-- Record Input Overlay -->
    <div class="record-overlay" id="record-overlay">
        <div class="record-container">
            <textarea id="record-input" placeholder="Type your memory here..." maxlength="120"></textarea>
            <div class="record-footer">
                <div class="char-counter" id="char-counter">0/120</div>
                <div class="record-actions">
                    <button class="cancel-btn" id="btn-cancel">CANCEL</button>
                    <button class="save-btn" id="btn-save">SAVE TAPE ◆</button>
                </div>
            </div>
        </div>
    </div>

    <button class="mute-btn" id="btn-mute" title="Toggle Sound">🔊</button>

    <script>
        // State
        let tapes = [
            { id: 1, text: "The first time I stayed up all night coding and it finally worked at 4am" },
            { id: 2, text: "That one evening when everything felt possible" },
            { id: 3, text: "I remember the exact smell of rain on a summer afternoon" }
        ];
        let currentTapeIndex = 0;
        let isPlaying = false;
        let isRecording = false;
        let nextId = 4;

        // Elements
        const cassette = document.getElementById('cassette');
        const cassetteLabel = document.getElementById('cassette-label');
        const cassetteWrapper = document.getElementById('cassette-wrapper');
        const btnPlay = document.getElementById('btn-play');
        const btnRecord = document.getElementById('btn-record');
        const scrollText1 = document.getElementById('scroll-text-1');
        const scrollText2 = document.getElementById('scroll-text-2');
        const scrollWrapper = document.getElementById('scroll-wrapper');
        const tapeList = document.getElementById('tape-list');
        const vuBars = document.querySelectorAll('.vu-bar');
        
        // Audio Context
        let audioCtx;
        let masterGain;
        let isMuted = false;
        let audioInitialized = false;
        let hissNode = null;

        function initAudio() {
            if (audioInitialized) return;
            const AC = window.AudioContext || window.webkitAudioContext;
            if (!AC) return; // fallback
            audioCtx = new AC();
            masterGain = audioCtx.createGain();
            masterGain.connect(audioCtx.destination);
            masterGain.gain.value = isMuted ? 0 : 1;
            
            // force resume
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            audioInitialized = true;
        }

        // Sound Effects
        function playClick() {
            if(!audioInitialized) initAudio();
            if(!audioCtx) return;
            const bufferSize = audioCtx.sampleRate * 0.02;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'highpass';
            filter.frequency.value = 3000;
            
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.02);
            
            noise.connect(filter);
            filter.connect(gain);
            gain.connect(masterGain);
            noise.start();
        }

        function playClunk() {
            if(!audioInitialized) initAudio();
            if(!audioCtx) return;
            const bufferSize = audioCtx.sampleRate * 0.04;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 500;
            
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.04);
            
            noise.connect(filter);
            filter.connect(gain);
            gain.connect(masterGain);
            noise.start();
        }

        function playRewind() {
            if(!audioInitialized) initAudio();
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(400, audioCtx.currentTime + 0.6);
            
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.6);
            
            osc.connect(gain);
            gain.connect(masterGain);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.6);
        }

        function playBeep(freq, durationMs) {
            if(!audioInitialized) initAudio();
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            osc.type = 'sine';
            osc.frequency.value = freq;
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + durationMs/1000);
            
            osc.connect(gain);
            gain.connect(masterGain);
            osc.start();
            osc.stop(audioCtx.currentTime + durationMs/1000);
        }

        function startHiss() {
            if(!audioInitialized) initAudio();
            if(!audioCtx || hissNode) return;
            const bufferSize = audioCtx.sampleRate * 2;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            
            hissNode = audioCtx.createBufferSource();
            hissNode.buffer = buffer;
            hissNode.loop = true;
            
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 4000;
            
            const gain = audioCtx.createGain();
            gain.gain.value = 0.03;
            
            hissNode.connect(filter);
            filter.connect(gain);
            gain.connect(masterGain);
            hissNode.start();
        }

        function stopHiss() {
            if(hissNode) {
                hissNode.stop();
                hissNode.disconnect();
                hissNode = null;
            }
        }

        // Initialize Audio on first touch
        document.addEventListener('click', initAudio, { once: true });
        document.addEventListener('touchstart', initAudio, { once: true });
        document.addEventListener('keydown', initAudio, { once: true });

        // Mute Toggle
        document.getElementById('btn-mute').addEventListener('click', (e) => {
            e.stopPropagation(); // prevent early interaction bugs
            isMuted = !isMuted;
            if(masterGain) masterGain.gain.value = isMuted ? 0 : 1;
            document.getElementById('btn-mute').innerText = isMuted ? '🔇' : '🔊';
        });

        // Animations
        let scrollPos = 0;
        let animId;
        
        function animateDisplay() {
            if(isPlaying) {
                scrollPos -= 1.5;
                if (scrollText1.innerText !== "— INSERT TAPE —") {
                    const width = scrollText1.offsetWidth;
                    if (width > 0 && Math.abs(scrollPos) >= width) {
                        scrollPos += width;
                    }
                } else {
                    scrollPos = 0;
                }
                scrollWrapper.style.transform = `translateX(${scrollPos}px)`;
            }
            animId = requestAnimationFrame(animateDisplay);
        }
        animId = requestAnimationFrame(animateDisplay);

        setInterval(() => {
            vuBars.forEach(bar => {
                if (isPlaying) {
                    bar.style.height = (4 + Math.random() * 26) + 'px';
                } else {
                    bar.style.height = '4px';
                }
            });
        }, 150);

        // Core Logic
        function renderTapes(newTapeIndex = -1) {
            tapeList.innerHTML = '';
            tapes.forEach((tape, index) => {
                const card = document.createElement('div');
                card.className = `tape-card ${index === currentTapeIndex ? 'active' : ''}`;
                if (index === newTapeIndex) {
                    card.style.animation = 'slideIn 0.3s ease forwards';
                }
                
                const preview = document.createElement('div');
                preview.className = 'tape-preview';
                preview.innerText = tape.text.length > 20 ? tape.text.substring(0, 20) + '...' : tape.text;
                
                const num = document.createElement('div');
                num.className = 'tape-number';
                num.innerText = `#${tape.id.toString().padStart(2, '0')}`;
                
                const delBtn = document.createElement('button');
                delBtn.className = 'delete-btn';
                delBtn.innerText = '✕';
                delBtn.title = 'Delete';
                delBtn.onclick = (e) => {
                    e.stopPropagation();
                    playClick();
                    deleteTape(index);
                };
                
                card.appendChild(preview);
                card.appendChild(num);
                card.appendChild(delBtn);
                
                card.onclick = () => {
                    if (isRecording) return;
                    playClick();
                    currentTapeIndex = index;
                    updateActiveTapeUI();
                    loadTape(index);
                    if (!isPlaying) togglePlay();
                };
                
                tapeList.appendChild(card);
            });
        }

        function updateActiveTapeUI() {
            document.querySelectorAll('.tape-card').forEach((card, i) => {
                if(i === currentTapeIndex) card.classList.add('active');
                else card.classList.remove('active');
            });
        }

        function loadTape(index) {
            if (index === -1 || tapes.length === 0) {
                scrollText1.innerText = "— INSERT TAPE —";
                scrollText2.innerText = "";
            } else {
                const text = tapes[index].text;
                const single = text + " ◆ ";
                scrollText1.innerText = single;
                scrollText2.innerText = single.repeat(10);
            }
            scrollPos = 0;
            scrollWrapper.style.transform = `translateX(0px)`;
        }

        function deleteTape(index) {
            tapes.splice(index, 1);
            if(tapes.length === 0) {
                currentTapeIndex = -1;
                if(isPlaying) togglePlay();
                loadTape(-1);
            } else {
                if(currentTapeIndex === index) {
                    if (index >= tapes.length) currentTapeIndex = tapes.length - 1;
                    else currentTapeIndex = index;
                    loadTape(currentTapeIndex);
                } else if (currentTapeIndex > index) {
                    currentTapeIndex--;
                }
            }
            renderTapes();
        }

        function togglePlay() {
            if (tapes.length === 0) return;
            isPlaying = !isPlaying;
            
            if (isPlaying) {
                btnPlay.innerHTML = '&#x23F8;'; // PAUSE icon
                btnPlay.classList.add('active-play');
                cassette.classList.add('playing');
                playClunk();
                startHiss();
            } else {
                btnPlay.innerHTML = '&#x25B6;'; // PLAY icon
                btnPlay.classList.remove('active-play');
                cassette.classList.remove('playing');
                playClunk();
                stopHiss();
            }
        }

        // Button Listeners
        document.getElementById('btn-play').addEventListener('click', () => {
            if (isRecording) return;
            playClick();
            togglePlay();
        });

        document.getElementById('btn-prev').addEventListener('click', () => {
            if(isRecording || tapes.length === 0) return;
            playClick();
            currentTapeIndex = (currentTapeIndex - 1 + tapes.length) % tapes.length;
            updateActiveTapeUI();
            loadTape(currentTapeIndex);
            if(!isPlaying) togglePlay();
        });

        document.getElementById('btn-next').addEventListener('click', () => {
            if(isRecording || tapes.length === 0) return;
            playClick();
            currentTapeIndex = (currentTapeIndex + 1) % tapes.length;
            updateActiveTapeUI();
            loadTape(currentTapeIndex);
            if(!isPlaying) togglePlay();
        });

        document.getElementById('btn-rewind').addEventListener('click', () => {
            if(isRecording || tapes.length === 0) return;
            playClick();
            playRewind();
            
            const wasPlaying = isPlaying;
            if (wasPlaying) togglePlay();
            
            cassette.classList.add('rewinding');
            scrollPos = 0;
            scrollWrapper.style.transform = `translateX(0px)`;
            
            // Lock controls briefly during rewind
            document.querySelectorAll('.control-btn').forEach(b => b.style.pointerEvents = 'none');
            
            setTimeout(() => {
                cassette.classList.remove('rewinding');
                document.querySelectorAll('.control-btn').forEach(b => b.style.pointerEvents = 'auto');
                if (wasPlaying) togglePlay();
            }, 600);
        });

        // Record Flow
        const recordOverlay = document.getElementById('record-overlay');
        const recordInput = document.getElementById('record-input');
        const charCounter = document.getElementById('char-counter');

        btnRecord.addEventListener('click', () => {
            if(isRecording) return;
            playClick();
            playBeep(800, 200);
            
            isRecording = true;
            if (isPlaying) togglePlay();
            
            recordOverlay.classList.add('visible');
            cassetteLabel.classList.add('recording');
            btnRecord.classList.add('active-record');
            
            recordInput.value = '';
            charCounter.innerText = '0/120';
            setTimeout(() => recordInput.focus(), 400); // Wait for slide animation
        });

        document.getElementById('btn-cancel').addEventListener('click', () => {
            playClick();
            isRecording = false;
            recordOverlay.classList.remove('visible');
            cassetteLabel.classList.remove('recording');
            btnRecord.classList.remove('active-record');
        });

        recordInput.addEventListener('input', () => {
            charCounter.innerText = `${recordInput.value.length}/120`;
        });

        document.getElementById('btn-save').addEventListener('click', () => {
            const text = recordInput.value.trim();
            if (!text) return;
            
            playClick();
            playBeep(400, 100);
            
            if (tapes.length >= 10) tapes.shift(); // Max 10 rule
            
            const newIndex = tapes.length;
            tapes.push({ id: nextId++, text });
            currentTapeIndex = newIndex;
            
            renderTapes(currentTapeIndex);
            loadTape(currentTapeIndex);
            
            isRecording = false;
            recordOverlay.classList.remove('visible');
            cassetteLabel.classList.remove('recording');
            btnRecord.classList.remove('active-record');
            
            // Save Flash effect
            cassetteWrapper.style.filter = 'drop-shadow(0 20px 20px rgba(255,50,50,0.8)) brightness(1.3)';
            setTimeout(() => {
                cassetteWrapper.style.filter = '';
                if (!isPlaying) togglePlay();
            }, 250);
        });

        // Init
        renderTapes();
        loadTape(currentTapeIndex);

    </script>
</body>
</html>
