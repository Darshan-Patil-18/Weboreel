    /* Start Overlay to fix Audio Policy */
    #start-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #000; color: #ff0000; z-index: 9999;
      display: flex; justify-content: center; align-items: center;
      font-size: 3rem; cursor: pointer; text-transform: uppercase;

    /* Sections */
    .section {
      position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
      opacity: 0; z-index: 1; pointer-events: none;
      display: flex; justify-content: center; align-items: center;

    .bg {

      z-index: 2; transform: scale(1.2);

    .overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at center, rgba(255,0,0,0.2) 0%, rgba(0,0,0,0.9) 100%);

    .quote {

    .hud { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); letter-spacing: 5px; z-index: 50; color: #aa0000; font-size: 1.5rem; text-transform: uppercase; }

  <script>
    const numSections = 11;
    let currentY = 0; let targetY = 0; let maxScroll = 10000; const ease = 0.05;
    
    // --- AUDIO ENGINE ---
    let audioCtx, masterGain;
    let clockTimer;
    let nextNoteTime = 0;
    let stepCount = 0;
    let currentBPM = 120; // Increases with scroll

    // Synthesize a heavy kick drum
    function playKick(time) {
       const o = audioCtx.createOscillator(); o.type = 'sine';
       o.frequency.setValueAtTime(150, time);
       o.frequency.exponentialRampToValueAtTime(0.01, time + 0.5);
       
       const g = audioCtx.createGain();
       g.gain.setValueAtTime(3.0, time); // INCREASED VOLUME
       g.gain.exponentialRampToValueAtTime(0.01, time + 0.5);
       
       o.connect(g).connect(masterGain);
       o.start(time); o.stop(time + 0.5);
    }

    // Synthesize a gritty bass
    function playBass(time, pitch) {
       const o = audioCtx.createOscillator(); o.type = 'sawtooth';
       o.frequency.setValueAtTime(pitch, time);
       
       const g = audioCtx.createGain();
       g.gain.setValueAtTime(1.5, time); // INCREASED VOLUME
       g.gain.exponentialRampToValueAtTime(0.01, time + 0.2);
       
       o.connect(g).connect(masterGain);
       o.start(time); o.stop(time + 0.2);
    }

    function scheduleAudio() {
      if(!audioCtx) return;
      const scheduleAheadTime = 0.1;
      
      while (nextNoteTime < audioCtx.currentTime + scheduleAheadTime) {
        const secPerBeat = 60.0 / currentBPM;
        const noteDuration = secPerBeat / 4; // 16th notes
        
        const p = currentY / maxScroll;

        // Kick drum on beats 1, 5, 9, 13
        if(stepCount % 4 === 0) playKick(nextNoteTime);
        
        // Bass on offbeats, pitch rises with scroll
        if(stepCount % 2 === 1) playBass(nextNoteTime, 40 + (p * 80));

        nextNoteTime += noteDuration;
        stepCount++;
      }
      clockTimer = setTimeout(scheduleAudio, 25);
    }

    document.getElementById('start-overlay').addEventListener('click', () => {
      document.getElementById('start-overlay').style.opacity = 0;
      setTimeout(() => { document.getElementById('start-overlay').style.display = 'none'; }, 500);
      document.getElementById('hud').style.opacity = 1;
      
      // Initialize Audio on Click
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      audioCtx = new AudioContext();
      
      // Much more aggressive distortion curve
      const dist = audioCtx.createWaveShaper();
      const curve = new Float32Array(400);
      for(let i=0; i<400; ++i) { const x = i * 2 / 400 - 1; curve[i] = (3 + 50) * x * 20 * (Math.PI / 180) / (Math.PI + 50 * Math.abs(x)); }
      dist.curve = curve; dist.oversample = '4x';

      masterGain = audioCtx.createGain(); 
      masterGain.gain.value = 2.0; // INCREASED MASTER VOLUME
      masterGain.connect(dist).connect(audioCtx.destination);
      
      nextNoteTime = audioCtx.currentTime + 0.1;
      scheduleAudio();
    });

    // --- SCROLL LOGIC ---
    window.addEventListener('wheel', e => { e.preventDefault(); targetY += e.deltaY * 1.5; targetY = Math.max(0, Math.min(targetY, maxScroll)); }, {passive: false});
    let touchY = 0;
    window.addEventListener('touchstart', e => { touchY = e.touches[0].clientY; }, {passive: true});
    window.addEventListener('touchmove', e => { e.preventDefault(); targetY += (touchY - e.touches[0].clientY) * 2; targetY = Math.max(0, Math.min(targetY, maxScroll)); touchY = e.touches[0].clientY; }, {passive: false});

    function loop() {
      currentY += (targetY - currentY) * ease;
      const progress = currentY / maxScroll; // 0 to 1

      // Speed up music as you scroll down
      currentBPM = 100 + (progress * 100); // 100 to 200 BPM

      // Section visibility logic
      const sectionHeight = 1 / (numSections - 1); // e.g. 0.1 for 11 sections
      
      for(let i=0; i<numSections; i++) {
        const sec = document.getElementById('sec-'+i);
        const bg = document.getElementById('bg-'+i);
        const q = document.getElementById('q-'+i);
        
        // Calculate distance from the center of this section's progress point
        const secProgress = i * sectionHeight;
        const dist = Math.abs(progress - secProgress);
        
        // Fade in/out window
        if(dist < sectionHeight) {
           // It's active
           const localP = 1 - (dist / sectionHeight); // 1 at center, 0 at edges
           sec.style.opacity = localP;
           
           // Smooth zoom on image
           // Scale goes from 1.2 to 1.0 as you scroll through it
           const zoom = 1.2 - (localP * 0.2);
           bg.style.transform = `scale(${zoom})`;

           // Parallax scale on quote
           const qScale = 0.8 + (localP * 0.4); // 0.8 to 1.2
           q.style.transform = `scale(${qScale})`;
           
           // Add red glow based on scroll depth
           const redGlow = Math.floor(progress * 255);
           q.style.textShadow = `0 10px 30px #000, 0 0 20px rgb(${redGlow}, 0, 0)`;
        } else {
           sec.style.opacity = 0;
        }
      }

      requestAnimationFrame(loop);
    }

    loop();
  </script>
