<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>The Algorithm</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html {
      width: 100%; height: 100%; overflow: hidden;
      background: #eee; color: #111; font-family: 'DM Sans', sans-serif;
      overscroll-behavior: none; cursor: crosshair;
    }

    #scroll-container {
      position: absolute; top: 0; left: 0; width: 100%; will-change: transform;
      display: flex; flex-direction: column; align-items: center; padding-top: 100px; padding-bottom: 500px;
    }

    .post {
      width: 500px; max-width: 95vw; background: #fff; border-radius: 15px;
      margin-bottom: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 20px;
      border: 1px solid #ddd; position: relative; overflow: hidden;
    }
    
    /* "Flashy" AD posts that the algorithm wants you to see */
    .post.ad {
      background: linear-gradient(45deg, #ff00cc, #333399); color: #fff;
      animation: pulse 1s infinite alternate; border: 4px solid #ff0;
    }
    .post.ad .btn { background: #ff0; color: #000; padding: 10px; font-weight: bold; border-radius: 5px; text-align: center; margin-top: 20px; cursor: pointer; }
    @keyframes pulse { 0% { transform: scale(1); } 100% { transform: scale(1.02); } }

    /* End button */
    .exit-btn {
      width: 200px; height: 60px; background: #f00; color: #fff; font-size: 1.5rem;
      font-weight: bold; display: flex; justify-content: center; align-items: center;
      border-radius: 30px; margin-top: 200px; position: relative; transition: transform 0.1s;
    }

    /* Popups */
    .annoying-popup {
      position: fixed; background: #fff; border: 3px solid #f00; border-radius: 10px; padding: 20px;
      box-shadow: 0 0 50px rgba(255,0,0,0.5); font-weight: bold; text-align: center; z-index: 100;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }

    .hud { position: fixed; top: 0; left: 0; width: 100%; padding: 20px; background: rgba(255,255,255,0.9); border-bottom: 1px solid #ddd; z-index: 50; display: flex; justify-content: space-between; font-weight: bold; color: #f00; }

    .mute-btn { position: fixed; bottom: 20px; right: 20px; font-size: 1.5rem; z-index: 200; cursor: pointer; opacity: 0.5; }
    .start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; cursor: pointer; font-size: 2rem; font-weight: bold; }
  </style>
</head>
<body>
  <div class="start-screen" id="start-btn">AGREE TO TERMS</div>
  <div class="mute-btn" id="mute-btn">🔕</div>

  <div class="hud">
    <div>SYSTEM: ENGAGEMENT ALGORITHM</div>
    <div>RETENTION: <span id="ret">100%</span></div>
  </div>

  <div class="annoying-popup" id="pop1" style="top: 20%; left: 10%;">Wait! Look at this!</div>
  <div class="annoying-popup" id="pop2" style="top: 60%; right: 10%;">You'll love this product!</div>
  <div class="annoying-popup" id="pop3" style="top: 40%; left: 40%; font-size: 2rem;">DO NOT SCROLL DOWN.</div>

  <div id="scroll-container">
    <!-- Populated by JS -->
  </div>

  <script>
    const cont = document.getElementById('scroll-container');
    const adPositions = [3, 8, 14, 20]; // Indices of flashy posts
    const adYCoords = []; // Store actual Y positions to snap back to

    for(let i=0; i<25; i++) {
      const p = document.createElement('div');
      p.className = 'post';
      if(adPositions.includes(i)) {
        p.classList.add('ad');
        p.innerHTML = `<h2 style="font-size:2rem; margin-bottom:10px;">🔥 YOU NEED THIS 🔥</h2><div style="height:200px; background:rgba(255,255,255,0.2);"></div><div class="btn">BUY NOW</div>`;
      } else {
        p.innerHTML = `<div style="width:50px; height:50px; background:#ddd; border-radius:50%; margin-bottom:10px;"></div><div style="width:80%; height:20px; background:#ddd; margin-bottom:10px;"></div><div style="width:100%; height:300px; background:#f5f5f5;"></div>`;
      }
      cont.appendChild(p);
    }

    const exitBtn = document.createElement('div');
    exitBtn.className = 'exit-btn'; exitBtn.id = 'exit-btn'; exitBtn.innerText = 'EXIT';
    cont.appendChild(exitBtn);

    let currentY = 0; let targetY = 0; let maxScroll = 0; let isStarted = false; 
    let ease = 0.08; // Normal ease
    let isForced = false;

    function resize() { 
      maxScroll = cont.offsetHeight - window.innerHeight; 
      // Calculate AD Y coords
      const posts = document.querySelectorAll('.post');
      adPositions.forEach((pos, i) => {
        adYCoords[i] = posts[pos].offsetTop - 100; // 100px offset from top
      });
    }
    window.onload = resize; window.addEventListener('resize', resize);

    window.addEventListener('wheel', e => { 
      if(!isStarted || isForced) return; e.preventDefault(); 
      targetY += e.deltaY; targetY = Math.max(0, Math.min(targetY, maxScroll)); 
    }, {passive: false});
    
    let touchY = 0;
    window.addEventListener('touchstart', e => touchY = e.touches[0].clientY);
    window.addEventListener('touchmove', e => { 
      if(!isStarted || isForced) return; e.preventDefault(); 
      targetY += (touchY - e.touches[0].clientY) * 1.5; targetY = Math.max(0, Math.min(targetY, maxScroll)); touchY = e.touches[0].clientY; 
    }, {passive: false});

    // Button runs away
    let mouseX = 0; let mouseY = 0;
    window.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });

    // Audio
    let audioCtx, masterGain;
    function initAudio() {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      audioCtx = new AudioContext(); masterGain = audioCtx.createGain(); masterGain.gain.value = 0.5; masterGain.connect(audioCtx.destination);
    }

    function playDing(bad = false) {
      if(!audioCtx) return;
      const osc = audioCtx.createOscillator(); osc.type = bad ? 'sawtooth' : 'sine';
      osc.frequency.setValueAtTime(bad ? 220 : 880, audioCtx.currentTime);
      const g = audioCtx.createGain(); g.gain.setValueAtTime(0.5, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
      osc.connect(g).connect(masterGain); osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    }

    let lastFightTime = 0;

    function loop() {
      if(isStarted) {
        
        // The mechanic: If user scrolls past an ad, sometimes snap them back
        if(!isForced) {
          for(let i=0; i<adYCoords.length; i++) {
            // If we just scrolled past it (downwards)
            if(currentY > adYCoords[i] + 500 && currentY < adYCoords[i] + 800) {
              if(Math.random() < 0.05 && Date.now() - lastFightTime > 3000) {
                // Snap back!
                isForced = true;
                targetY = adYCoords[i];
                ease = 0.2; // aggressive pull back
                lastFightTime = Date.now();
                playDing(true);
                
                // Show popup
                const pId = `pop${Math.floor(Math.random()*3)+1}`;
                document.getElementById(pId).style.opacity = 1;
                setTimeout(() => { document.getElementById(pId).style.opacity = 0; isForced = false; ease = 0.08; }, 1000);
              }
            }
          }
        }

        currentY += (targetY - currentY) * ease;
        cont.style.transform = `translateY(${-currentY}px)`;

        // Update Retention stat
        document.getElementById('ret').innerText = `${Math.max(0, 100 - Math.floor((currentY/maxScroll)*100))}%`;

        // Button running away logic
        // If we are at the bottom, calculate distance between mouse and button
        if(currentY > maxScroll - 500) {
          const rect = exitBtn.getBoundingClientRect();
          const bx = rect.left + rect.width/2; const by = rect.top + rect.height/2;
          const dist = Math.sqrt(Math.pow(mouseX - bx, 2) + Math.pow(mouseY - by, 2));
          
          if(dist < 200) {
            // Move away
            const dx = (bx - mouseX) * 2; const dy = (by - mouseY) * 2;
            exitBtn.style.transform = `translate(${Math.max(-300, Math.min(300, dx))}px, ${Math.max(-300, Math.min(300, dy))}px)`;
          } else {
            exitBtn.style.transform = `translate(0, 0)`;
          }
        }
      }
      requestAnimationFrame(loop);
    }

    document.getElementById('start-btn').addEventListener('click', function() {
      initAudio(); this.style.display = 'none'; isStarted = true; resize(); loop();
    });

    let isMuted = false;
    document.getElementById('mute-btn').addEventListener('click', function() {
      if(!audioCtx) return; isMuted = !isMuted;
      masterGain.gain.linearRampToValueAtTime(isMuted ? 0 : 0.5, audioCtx.currentTime + 0.3);
    });
  </script>
</body>
</html>
