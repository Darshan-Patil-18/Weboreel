<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time Dilation</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital@1&family=DM+Sans&family=Playfair+Display:ital@0;1&family=Space+Mono&display=swap');

    :root {
      --time-speed: 1.0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html {
      width: 100%; height: 100%;
      background: #050508; color: #fff;
      overflow-x: hidden;
      font-family: 'Cormorant Garamond', serif;
      overscroll-behavior: none;
    }

    #bg-stars {
      position: fixed; top: 0; left: 0;
      width: 100vw; height: 100vh;
      pointer-events: none; z-index: 1;
      transform-origin: center center;
    }
    .star {
      position: absolute; background: #fff; border-radius: 50%;
      transition: transform 0.1s, background-color 0.1s;
    }

    /* Black Hole CSS Art */
    .black-hole-container {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 400px; height: 400px;
      pointer-events: none; z-index: 2;
      opacity: 0; transition: opacity 1s;
    }
    
    .bh-event-horizon {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 200px; height: 200px;
      background: #000; border-radius: 50%;
      box-shadow: 0 0 100px rgba(0,0,0,1), inset 0 0 50px rgba(0,0,0,1);
      z-index: 4;
    }

    .bh-accretion-disk {
      position: absolute; top: 50%; left: 50%;
      width: 400px; height: 400px;
      margin-left: -200px; margin-top: -200px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, #ff6600, #ffcc00, #ffffff, #ff8800, #ff4400, #ff6600);
      /* Time dilation affects animation speed */
      animation: rotateDisk calc(4s / var(--time-speed)) linear infinite;
      z-index: 3;
      /* Masking to create disk shape around horizon */
      mask-image: radial-gradient(circle, transparent 48%, black 50%, black 70%, transparent 100%);
      -webkit-mask-image: radial-gradient(circle, transparent 48%, black 50%, black 70%, transparent 100%);
      transform: rotateX(60deg);
    }
    
    .bh-disk-back {
      position: absolute; top: 50%; left: 50%;
      width: 380px; height: 380px;
      margin-left: -190px; margin-top: -190px;
      border-radius: 50%;
      border: 20px solid rgba(255, 100, 0, 0.4);
      filter: blur(10px);
      z-index: 2; transform: translateY(-50px) rotateX(60deg);
    }

    @keyframes rotateDisk { 0% { transform: rotateX(60deg) rotateZ(0deg); } 100% { transform: rotateX(60deg) rotateZ(360deg); } }

    /* Clock */
    .clock-container {
      position: fixed; top: 30px; right: 30px;
      display: flex; flex-direction: column; align-items: center;
      z-index: 10;
    }
    .clock-face {
      width: 80px; height: 80px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.3);
      position: relative; margin-bottom: 10px;
    }
    .clock-center { position: absolute; top:50%; left:50%; width:6px; height:6px; background:#fff; border-radius:50%; transform:translate(-50%,-50%); }
    .clock-hand { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom center; background: #fff; }
    .hand-sec { width: 1px; height: 35px; background: #ff4400; }
    .digital-clock { font-family: 'Space Mono'; font-size: 1rem; color: #aaa; }

    /* Scroll setup */
    .scroll-container {
      position: fixed; top: 0; left: 0;
      width: 100%; will-change: transform; z-index: 5;
    }

    .section {
      position: relative; width: 100%; height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 0 10vw;
    }

    .narrative { font-size: 2.5rem; max-width: 800px; line-height: 1.4; opacity: 0; transition: opacity 1s; }
    .visible { opacity: 1; }
    .slow-reveal span { opacity: 0; transition: opacity calc(0.1s / var(--time-speed)); } /* character reveal speed tied to dilation */
    
    .scientific { font-family: 'Space Mono'; font-size: 1rem; color: #88ffcc; margin-top: 20px; }

    .s7-title { font-family: 'Playfair Display'; font-style: normal; font-size: 4rem; margin-bottom: 2rem; }
    .s7-sub { font-size: 2rem; }
    
    .mute-btn {
      position: fixed; bottom: 30px; left: 30px;
      font-size: 2rem; cursor: pointer; z-index: 100; user-select: none; opacity: 0.5;
    }
    .mute-btn:hover { opacity: 1; }

    @media (max-width: 768px) {
      .black-hole-container { transform: translate(-50%, -50%) scale(0.6); }
      .narrative { font-size: 1.5rem; }
      .s7-title { font-size: 2.5rem; }
      .clock-container { transform: scale(0.8); right: 10px; top: 10px; }
    }
  </style>
</head>
<body>

<div id="bg-stars"></div>

<div class="black-hole-container" id="blackhole">
  <div class="bh-disk-back"></div>
  <div class="bh-event-horizon"></div>
  <div class="bh-accretion-disk"></div>
</div>

<div class="clock-container">
  <div class="clock-face">
    <div class="clock-hand hand-sec" id="hand-sec"></div>
    <div class="clock-center"></div>
  </div>
  <div class="digital-clock" id="digi-clock">00:00:00</div>
</div>

<div class="scroll-container" id="scroll-container">
  <!-- 7 Sections mapped by JS -->
</div>

<div class="mute-btn" id="muteBtn" title="Toggle Audio">⚫</div>

<script>
// --- AUDIO ENGINE ---
const AudioContext = window.AudioContext || window.webkitAudioContext;
let actx, masterGain, lfoGain;
let isMuted = true;
let oscs = [];

function initAudio() {
  if(actx) return;
  actx = new AudioContext();
  masterGain = actx.createGain();
  masterGain.connect(actx.destination);
  masterGain.gain.value = 0.5;

  lfoGain = actx.createGain();
  let lfo = actx.createOscillator(); lfo.frequency.value = 0.5; // Tremolo LFO
  lfo.connect(lfoGain.gain); lfo.start();
  lfoGain.connect(masterGain);

  [261.63, 329.63, 392.00].forEach((f,i) => {
    let o = actx.createOscillator(); o.type = i===0?'triangle':'sine';
    o.frequency.value = f;
    let g = actx.createGain(); g.gain.value = 0.05;
    o.connect(g).connect(lfoGain); o.start();
    oscs.push({ o, baseFreq: f });
  });

  isMuted = false;
  document.getElementById('muteBtn').style.opacity = '1';
}

function updateAudioPitch(dilation) {
  if(!actx || isMuted) return;
  // Dilation factor: 1.0 (normal) to ~0.1 (slowest)
  let targetFactor = Math.max(0.1, dilation);
  
  oscs.forEach(n => {
    n.o.frequency.setTargetAtTime(n.baseFreq * targetFactor, actx.currentTime, 0.5);
  });
}

document.getElementById('muteBtn').addEventListener('click', () => {
  if(!actx) { initAudio(); return; }
  isMuted = !isMuted;
  masterGain.gain.setTargetAtTime(isMuted ? 0 : 0.5, actx.currentTime, 0.1);
  document.getElementById('muteBtn').style.opacity = isMuted ? '0.5' : '1';
});

// --- SCROLL & DILATION ENGINE ---
let currentY = 0, targetY = 0;
const normalEase = 0.09;
const maxScroll = 8000;
const bhCenterY = 4000;

function getDilationFactor() {
  const scrollFraction = currentY / maxScroll;
  const bhFraction = bhCenterY / maxScroll; // 0.5
  const distanceFromBH = Math.abs(scrollFraction - bhFraction); // 0 to 0.5
  
  // Dilation: 0.08 (slowest) at center, 1.0 at edges
  const factor = Math.max(0.08, Math.min(1.0, distanceFromBH * 2.5));
  return factor;
}

window.addEventListener('wheel', e => {
  e.preventDefault();
  targetY += e.deltaY * 0.8;
  targetY = Math.max(0, Math.min(targetY, maxScroll));
}, { passive: false });

let tStart = 0;
window.addEventListener('touchstart', e => tStart = e.touches[0].clientY, {passive:false});
window.addEventListener('touchmove', e => {
  e.preventDefault();
  targetY += (tStart - e.touches[0].clientY) * 1.5;
  targetY = Math.max(0, Math.min(targetY, maxScroll));
  tStart = e.touches[0].clientY;
}, {passive:false});

// --- CLOCK & TIME ---
let simulatedTime = 0; // in seconds
const handSec = document.getElementById('hand-sec');
const digiClock = document.getElementById('digi-clock');

function formatTime(s) {
  let hrs = Math.floor(s / 3600);
  let mins = Math.floor((s % 3600) / 60);
  let secs = Math.floor(s % 60);
  return `${hrs.toString().padStart(2,'0')}:${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
}

// --- STARS SETUP ---
const starContainer = document.getElementById('bg-stars');
let stars = [];
for(let i=0; i<150; i++) {
  let s = document.createElement('div');
  s.className = 'star';
  let size = Math.random()*2+1;
  s.style.width = size+'px'; s.style.height = size+'px';
  let cx = Math.random()*window.innerWidth; let cy = Math.random()*window.innerHeight;
  s.style.left = cx+'px'; s.style.top = cy+'px';
  s.dataset.ox = cx; s.dataset.oy = cy;
  starContainer.appendChild(s);
  stars.push(s);
}

// --- CONTENT SETUP ---
const content = [
  { y: 0, html: `<div class="narrative">In empty space, time flows at what we call 'normal'.</div><div class="narrative">But normal is relative to where you are.</div>` },
  { y: 1500, html: `<div class="narrative">Gravity bends space. Space bends time.</div>` },
  { y: 3000, html: `<div class="narrative slow-reveal">You are approaching the event horizon. Time is slowing for you.</div>` },
  { y: 4000, html: `<div class="narrative slow-reveal" style="font-size:4rem;font-family:'Space Mono';letter-spacing:1rem;color:#ffaa00;">TIME. ALMOST. STOPS.</div>` },
  { y: 5000, html: `<div class="narrative">Once you move away from the gravity well, time flows again.</div>` },
  { y: 6500, html: `<div class="narrative">For someone watching you from far away: you barely moved for an hour.</div><div class="narrative">For you: it felt like seconds.</div>` },
  { y: 8000, html: `<div class="s7-title">Time is not the same for everyone.</div><div class="s7-sub">Two people can share the same moment and live entirely different amounts of time in it.</div><div class="scientific">This is not a metaphor.<br>It is physics.</div><div style="font-size:0.8rem; margin-top:100px; color:#555;">It is also a metaphor.</div>` }
];

const sc = document.getElementById('scroll-container');
content.forEach((sec, i) => {
  let div = document.createElement('div');
  div.className = 'section';
  div.style.position = 'absolute';
  div.style.top = sec.y + 'px';
  div.innerHTML = sec.html;
  sc.appendChild(div);
  
  // Wrap slow reveal text
  div.querySelectorAll('.slow-reveal').forEach(el => {
    let text = el.innerText;
    el.innerHTML = '';
    text.split('').forEach((char, ci) => {
      let span = document.createElement('span');
      span.innerText = char;
      // Stagger delay based on CSS variable to link to dilation
      span.style.transitionDelay = `calc(${ci * 0.05}s / var(--time-speed))`;
      el.appendChild(span);
    });
  });
});


function tick() {
  let dilation = getDilationFactor();
  let currentEase = normalEase * dilation;
  
  // Tie CSS speed to dilation
  document.documentElement.style.setProperty('--time-speed', dilation);
  
  currentY += (targetY - currentY) * currentEase;
  
  sc.style.transform = `translateY(${-currentY}px)`;
  
  // Clock logic: real time * dilation
  simulatedTime += (1/60) * dilation;
  handSec.style.transform = `rotate(${simulatedTime * 6}deg)`; // 6 deg per sec
  digiClock.innerText = formatTime(simulatedTime);

  updateAudioPitch(dilation);

  // Black hole visual logic
  let bh = document.getElementById('blackhole');
  if(currentY > 1500 && currentY < 6500) {
    bh.style.opacity = '1';
    let scale = Math.min(1, Math.max(0.2, 1 - Math.abs(currentY - 4000)/2000));
    bh.style.transform = `translate(-50%, -50%) scale(${scale + (window.innerWidth<768?-0.4:0)})`;
  } else {
    bh.style.opacity = '0';
  }

  // Gravitational lensing (Star distortion)
  let wCenter = window.innerWidth/2, hCenter = window.innerHeight/2;
  stars.forEach(s => {
    let ox = parseFloat(s.dataset.ox), oy = parseFloat(s.dataset.oy);
    if(currentY > 2000 && currentY < 6000) {
      let pullFactor = 1 - Math.abs(currentY - 4000)/2000; // max 1 at center
      let dx = ox - wCenter, dy = oy - hCenter;
      let dist = Math.hypot(dx, dy);
      if(dist > 0 && dist < 400) {
        let stretch = 1 + pullFactor * (400/dist);
        s.style.transform = `scaleX(${stretch})`;
        
        // Doppler color
        if(currentY < 4000) s.style.backgroundColor = '#ccffff'; // approach blue
        else s.style.backgroundColor = '#ffcccc'; // recede red
      }
    } else {
      s.style.transform = 'none';
      s.style.backgroundColor = '#fff';
    }
  });

  // Reveal text
  document.querySelectorAll('.section').forEach(sec => {
    let sy = parseFloat(sec.style.top);
    if(Math.abs(currentY - sy) < window.innerHeight*0.8) {
      sec.querySelectorAll('.narrative, .s7-title, .s7-sub').forEach(el => el.classList.add('visible'));
      sec.querySelectorAll('.slow-reveal span').forEach(sp => sp.style.opacity='1');
    } else {
      sec.querySelectorAll('.narrative, .s7-title, .s7-sub').forEach(el => el.classList.remove('visible'));
      sec.querySelectorAll('.slow-reveal span').forEach(sp => sp.style.opacity='0');
    }
  });

  requestAnimationFrame(tick);
}

requestAnimationFrame(tick);

</script>
</body>
</html>
