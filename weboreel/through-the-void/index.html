<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>THROUGH THE VOID</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');
    
    html, body {
      margin: 0;
      padding: 0;
      height: 1200vh;
      background-color: #000;
      color: white;
      font-family: 'Playfair Display', serif;
      overflow-x: hidden;
      scroll-behavior: auto; /* Allow instantaneous smooth mappings via JS */
      overscroll-behavior: none;
    }

    #webgl-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
      filter: brightness(1.1) contrast(1.2) saturate(1.4);
    }

    /* Dramatic Cinema Vignette */
    #vignette {
      position: fixed;
      top: 0; 
      left: 0; 
      width: 100vw; 
      height: 100vh;
      background: radial-gradient(ellipse, transparent 40%, rgba(0,0,0,0.9) 100%);
      pointer-events: none;
      z-index: 5;
    }

    /* Progress UI */
    #progress-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 3px;
      z-index: 20;
      background: rgba(255,255,255,0.05);
      pointer-events: none;
    }
    #progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ff00cc, #00ccff, #ffaa00);
      transition: width 0.1s linear;
      box-shadow: 0 0 10px rgba(255,0,204,0.5);
    }

    #scroll-hint {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      font-family: monospace;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
      z-index: 20;
      transition: opacity 0.5s ease;
      animation: pulse 2s infinite ease-in-out;
      pointer-events: none;
      letter-spacing: 0.2em;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.8; }
    }

    #mute-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 25;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      padding: 8px 16px;
      cursor: pointer;
      font-family: monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      border-radius: 4px;
      transition: all 0.3s ease;
      backdrop-filter: blur(4px);
    }
    #mute-btn:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.8);
      box-shadow: 0 0 10px rgba(255,255,255,0.2);
    }

    /* Dramatic Text Overlays */
    .message {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 10;
      opacity: 0;
      transition: opacity 0.8s ease;
      pointer-events: none;
      width: 90vw;
    }
    .message h1 {
      margin: 0;
      font-size: clamp(3rem, 8vw, 6rem);
      font-weight: 700;
      text-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
      line-height: 1.1;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .message p {
      margin: 15px 0 0 0;
      font-size: clamp(0.9rem, 1.5vw, 1.2rem);
      font-family: monospace;
      color: #aaa;
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }

    /* End Screen States */
    #flash-overlay {
      position: fixed;
      top: 0; 
      left: 0; 
      width: 100vw; 
      height: 100vh;
      background: white;
      z-index: 30;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }

    #final-screen {
      position: fixed;
      top: 0; 
      left: 0; 
      width: 100vw; 
      height: 100vh;
      background: #000;
      z-index: 31;
      opacity: 0;
      pointer-events: none;
      transition: opacity 2s ease 0.5s; /* Delay appearance until flash completes */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .glow-circle {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: white;
      box-shadow: 0 0 80px 40px rgba(255, 255, 255, 0.9);
      margin-bottom: 60px;
      animation: breathe 4s infinite alternate;
    }
    
    @keyframes breathe {
      0% { transform: scale(1); box-shadow: 0 0 50px 20px rgba(255, 255, 255, 0.8); }
      100% { transform: scale(1.1); box-shadow: 0 0 100px 50px rgba(255, 255, 255, 1); }
    }

    #final-screen h1 {
      font-size: clamp(2rem, 5vw, 4rem);
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      text-shadow: 0 0 20px rgba(255,255,255,0.5);
    }
    #final-screen p {
      font-family: monospace;
      color: #666;
      margin-top: 30px;
      letter-spacing: 0.2em;
      font-size: 14px;
    }

    /* Confetti generated by JS */
    .confetti {
      position: fixed;
      width: 8px;
      height: 8px;
      pointer-events: none;
      z-index: 15;
      border-radius: 2px;
      box-shadow: 0 0 10px currentColor; /* glow matches background */
    }
  </style>
</head>
<body>

<!-- Background elements -->
<canvas id="webgl-canvas"></canvas>
<div id="vignette"></div>

<!-- UI elements -->
<div id="progress-container">
  <div id="progress-bar"></div>
</div>

<div id="scroll-hint">↓ SCROLL TO ENTER ↓</div>
<button id="mute-btn">SOUND: ON</button>

<!-- Message Stages -->
<div class="message" id="msg-1">
  <h1>ENTER</h1>
  <p>the journey begins</p>
</div>
<div class="message" id="msg-2">
  <h1>LET GO</h1>
  <p>of everything you know</p>
</div>
<div class="message" id="msg-3">
  <h1>DEEPER</h1>
  <p>there is no turning back</p>
</div>
<div class="message" id="msg-4">
  <h1>YOU ARE</h1>
  <p>the universe experiencing itself</p>
</div>
<div class="message" id="msg-5">
  <h1>ALMOST</h1>
  <p>just a little further</p>
</div>
<div class="message" id="msg-6">
  <h1>YOU MADE IT</h1>
  <p>welcome to the other side</p>
</div>

<!-- Final Reveal -->
<div id="flash-overlay"></div>
<div id="final-screen">
  <div class="glow-circle"></div>
  <h1>YOU HAVE ARRIVED</h1>
  <p>scroll back up to go again</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/**
 * CORE LOGIC INITIALIZATION
 */
const isMobile = window.innerWidth < 768;
const tubeSegments = isMobile ? 150 : 300;
const particleCount = isMobile ? 400 : 800;

// ==========================================
// 1. THREE.JS SCENE SETUP
// ==========================================
const canvas = document.getElementById('webgl-canvas');
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000000, 0.004); // FIX 5: Reduce fog

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

// Define the curve representing our tunnel
const points = [
  new THREE.Vector3(0, 0, 0),
  new THREE.Vector3(2, -1, 50),
  new THREE.Vector3(-2, 1, 100),
  new THREE.Vector3(1, 2, 150),
  new THREE.Vector3(-1, -1, 200),
  new THREE.Vector3(0, 0, 250)
];
const curve = new THREE.CatmullRomCurve3(points);

// Base Tube (Solid Walls) - FIX 3: TubeGeometry radius from 4 to 6
const tubeGeometry = new THREE.TubeGeometry(curve, tubeSegments, 6, 20, false);
// FIX 4: Add colorful tube texture
const tubeMaterial = new THREE.MeshStandardMaterial({
  color: 0x110022,
  emissive: 0x330044,
  emissiveIntensity: 0.5,
  side: THREE.BackSide,
  roughness: 0.6,
  metalness: 0.4
});
const tubeMesh = new THREE.Mesh(tubeGeometry, tubeMaterial);
scene.add(tubeMesh);

// Emissive Wireframe Tube Overlay
const wireframeMaterial = new THREE.MeshBasicMaterial({
  color: 0x9b00ff,
  opacity: 0.15,
  transparent: true,
  wireframe: true,
  side: THREE.BackSide
});
const wireframeMesh = new THREE.Mesh(tubeGeometry, wireframeMaterial);
wireframeMesh.scale.set(1.005, 1.005, 1.005); // Prevent z-fighting with the main tube
scene.add(wireframeMesh);

// Interior Star Particles
const particlesGeom = new THREE.BufferGeometry();
const pPositions = new Float32Array(particleCount * 3);

for(let i = 0; i < particleCount; i++) {
  // Distribute uniformly along the curve
  const t = Math.random();
  const pt = curve.getPointAt(t);
  
  // Confine roughly within the newly expanded tube radius (6)
  const angle = Math.random() * Math.PI * 2;
  const radius = Math.random() * 5.5; 
  
  pPositions[i*3]     = pt.x + Math.cos(angle) * radius;
  pPositions[i*3 + 1] = pt.y + Math.sin(angle) * radius;
  // Give it slightly chaotic z displacement
  pPositions[i*3 + 2] = pt.z + (Math.random() - 0.5) * 8; 
}

particlesGeom.setAttribute('position', new THREE.BufferAttribute(pPositions, 3));
const particlesMat = new THREE.PointsMaterial({
  color: 0xffffff,
  size: 0.05,
  transparent: true,
  opacity: 0.8,
  blending: THREE.AdditiveBlending
});
const particleSystem = new THREE.Points(particlesGeom, particlesMat);
scene.add(particleSystem);

// Glowing Waypoint Rings - FIX 7: Rings face camera along the tangent
const ringTValues = [0.3, 0.55, 0.78];
const rings = [];
const ringGeom = new THREE.TorusGeometry(5.5, 0.05, 16, 50); // Scale toruses nicely within the 6px tube
const ringMat = new THREE.MeshStandardMaterial({
  color: 0xff00cc,
  emissive: 0xff00cc,
  emissiveIntensity: 2,
  side: THREE.DoubleSide
});

ringTValues.forEach(t => {
  const mesh = new THREE.Mesh(ringGeom, ringMat);
  const pt = curve.getPointAt(t);
  const tangent = curve.getTangentAt(t);
  mesh.position.copy(pt);
  
  const axis = new THREE.Vector3(0, 0, 1);
  mesh.quaternion.setFromUnitVectors(axis, tangent);
  
  scene.add(mesh);
  rings.push({ mesh, initialRot: mesh.rotation.clone() });
});

// FIX 6: INCREASE LIGHT INTENSITY
const ambientLight = new THREE.AmbientLight(0x6600cc, 1.5);
scene.add(ambientLight);

// Point lights attached to camera
const pLight1 = new THREE.PointLight(0xff00cc, 8, 80);
pLight1.position.set(0, 0, -20);
camera.add(pLight1);

const pLight2 = new THREE.PointLight(0x00ccff, 8, 80);
pLight2.position.set(0, 0, -60);
camera.add(pLight2);

const pLight3 = new THREE.PointLight(0xffaa00, 6, 80);
pLight3.position.set(0, 0, -100);
camera.add(pLight3);

scene.add(camera);

window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});


// ==========================================
// 2. AUDIO ENGINE (Web Audio API)
// ==========================================
let audioCtx;
let audioStarted = false;
let isMuted = false;
let masterGain;
let melodyGainNode;
let droneL, droneM, droneH;

const muteBtn = document.getElementById('mute-btn');
muteBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  if(!audioStarted) {
    initAudio(); // User manually started via button
  } else {
    isMuted = !isMuted;
    if(masterGain && audioCtx) {
      masterGain.gain.setTargetAtTime(isMuted ? 0 : 0.5, audioCtx.currentTime, 0.1);
    }
    muteBtn.innerText = isMuted ? "SOUND: OFF" : "SOUND: ON";
  }
});

function initAudio() {
  if (audioStarted) return;
  audioStarted = true;
  
  const AudioContext = window.AudioContext || window.webkitAudioContext;
  audioCtx = new AudioContext(); // Start hardware context
  
  masterGain = audioCtx.createGain();
  masterGain.connect(audioCtx.destination);
  masterGain.gain.value = 0.5;

  function createOsc(freq, type, initialGain) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.value = initialGain;
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start();
    return { osc, gain };
  }

  // Deep Space Drone (Endless) 
  droneL = createOsc(55, 'sine', 0.06);
  droneM = createOsc(82, 'sine', 0.06);
  droneH = createOsc(110, 'sine', 0.06);

  // Mysterious Melody (Loop)
  melodyGainNode = audioCtx.createGain();
  melodyGainNode.gain.value = 0.05;
  melodyGainNode.connect(masterGain);
  
  const melodyNotes = [196, 220, 246, 261, 220, 196, 175, 196];
  let noteIndex = 0;
  
  setInterval(() => {
    if (!audioCtx || isMuted) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'triangle';
    osc.frequency.value = melodyNotes[noteIndex];
    
    // Smooth envelope attack/release
    gain.gain.setValueAtTime(0, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(1, audioCtx.currentTime + 0.1);
    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
    
    osc.connect(gain);
    gain.connect(melodyGainNode);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.6);
    
    noteIndex = (noteIndex + 1) % melodyNotes.length;
  }, 600);

  // Ethereal Shimmer (Randomly triggered)
  const shimmerFreqs = [1046, 1174, 1318];
  setInterval(() => {
    if (!audioCtx || isMuted) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = shimmerFreqs[Math.floor(Math.random() * shimmerFreqs.length)];
    
    gain.gain.setValueAtTime(0, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0.02, audioCtx.currentTime + 0.5);
    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1.2);
    
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 1.2);
  }, 1200);
}


// ==========================================
// 3. EVENT LISTENERS AND PROGRESS STATE
// ==========================================
let scrollProgress = 0;
let confettiFired = false;

// Sections mapped to 0-1 percentage
const messages = [
  { id: 'msg-1', start: 0.00, end: 0.15 },
  { id: 'msg-2', start: 0.15, end: 0.30 },
  { id: 'msg-3', start: 0.30, end: 0.50 },
  { id: 'msg-4', start: 0.50, end: 0.70 },
  { id: 'msg-5', start: 0.70, end: 0.90 },
  { id: 'msg-6', start: 0.90, end: 1.00 }
];

function fireConfetti() {
  const colors = ['#ff00cc', '#00ccff', '#ffaa00', '#ffffff'];
  for (let i = 0; i < 70; i++) {
    const confetti = document.createElement('div');
    confetti.className = 'confetti';
    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
    confetti.style.color = confetti.style.background; // Used for box-shadow glow
    confetti.style.left = '50%';
    confetti.style.top = '50%';
    document.body.appendChild(confetti);

    const angle = Math.random() * Math.PI * 2;
    const velocity = 8 + Math.random() * 25;
    const tx = Math.cos(angle) * velocity * 25;
    const ty = Math.sin(angle) * velocity * 25;

    confetti.animate([
      { transform: 'translate(-50%, -50%) scale(1) rotate(0deg)', opacity: 1 },
      { transform: `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(0) rotate(${Math.random()*1080}deg)`, opacity: 0 }
    ], {
      duration: 1500 + Math.random() * 2000,
      easing: 'cubic-bezier(0.25, 1, 0.5, 1)',
      fill: 'forwards'
    });

    // Cleanup after animation completes
    setTimeout(() => { if (confetti.parentNode) confetti.remove(); }, 4000);
  }
}

function handleScrollState() {
  // Start audio on very first movement
  if (!audioStarted && window.scrollY > 0) initAudio();
  
  const scrollY = window.scrollY || window.pageYOffset;
  const maxScroll = document.body.scrollHeight - window.innerHeight;
  scrollProgress = Math.max(0, Math.min(1, scrollY / maxScroll));
  
  // UI Element Updates
  document.getElementById('progress-bar').style.width = (scrollProgress * 100) + '%';
  document.getElementById('scroll-hint').style.opacity = scrollProgress > 0.03 ? '0' : '1';

  // Crossfade text overlays depending on current mapped scroll depth
  messages.forEach(msg => {
    const el = document.getElementById(msg.id);
    if(scrollProgress >= msg.start && scrollProgress <= msg.end) {
      el.style.opacity = 1;
      
      // Special action for final message block
      if(msg.id === 'msg-6' && !confettiFired) {
        fireConfetti();
        confettiFired = true;
      }
    } else {
      el.style.opacity = 0;
    }
  });

  // Re-arm confetti if user scrolls back up
  if(scrollProgress < 0.85) confettiFired = false;

  // Real-time Audio Modulations based on depth
  if (audioCtx && !isMuted) {
    // Intensity of melody rises the deeper user goes
    const newMelodyGain = 0.05 + (scrollProgress * 0.07);
    melodyGainNode.gain.setTargetAtTime(newMelodyGain, audioCtx.currentTime, 0.1);
    
    // Pitch (frequency) of drone subtly rises
    const baseFreq = 55 + (scrollProgress * 30);
    const ratio = baseFreq / 55;
    droneL.osc.frequency.setTargetAtTime(55 * ratio, audioCtx.currentTime, 0.1);
    droneM.osc.frequency.setTargetAtTime(82 * ratio, audioCtx.currentTime, 0.1);
    droneH.osc.frequency.setTargetAtTime(110 * ratio, audioCtx.currentTime, 0.1);
  }

  // Grand Finale Overlays
  if(scrollProgress >= 0.995) {
    document.getElementById('flash-overlay').style.opacity = 1;
    document.getElementById('final-screen').style.opacity = 1;
    document.getElementById('final-screen').style.pointerEvents = 'auto'; 
  } else {
    document.getElementById('flash-overlay').style.opacity = 0;
    document.getElementById('final-screen').style.opacity = 0;
    document.getElementById('final-screen').style.pointerEvents = 'none';
  }
}

window.addEventListener('scroll', handleScrollState);
// Touch events alias into scroll logic generally, but safe to attach explicitly if needed
window.addEventListener('touchmove', handleScrollState);


// ==========================================
// 4. MAIN RENDER LOOP
// ==========================================
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const elapsedTime = clock.getElapsedTime();

  // FIX 1 & 2: Camera follows the true CatmullRom curve traversing accurately
  const t = scrollProgress;
  const camPos = curve.getPointAt(Math.min(t * 0.96, 0.96));
  const lookPos = curve.getPointAt(Math.min(t * 0.96 + 0.04, 1.0));
  camera.position.copy(camPos);
  
  camera.position.x += Math.sin(Date.now() * 0.001) * 0.05; // camera shake
  camera.position.y += Math.cos(Date.now() * 0.0013) * 0.05;
  
  camera.lookAt(lookPos);

  // 4. Subtle Environment Animation
  particleSystem.rotation.y = Math.sin(elapsedTime * 0.1) * 0.1; // Gentle drifting

  rings.forEach(({mesh, initialRot}, idx) => {
    // Continuously spin them relative to their tangent alignment
    mesh.rotateX(0.002);
    mesh.rotateZ(0.005 * (idx + 1));
  });

  renderer.render(scene, camera);
}

// Start simulation
handleScrollState(); // Force UI align
animate();

</script>
</body>
</html>
