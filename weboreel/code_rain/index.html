<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>code_rain</title>
<style>
  body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; background: #000; overflow: hidden; font-family: monospace; }
  canvas { display: block; }
  
  #overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none;
    background: radial-gradient(circle, transparent 50%, rgba(0,0,0,0.8) 100%);
  }

  #ui {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 20;
    display: flex; gap: 10px; background: rgba(0,25,0,0.8); padding: 10px; border: 1px solid #0f0;
    box-shadow: 0 0 10px #0f0; border-radius: 4px;
  }
  
  input { background: #000; border: 1px solid #0f0; color: #0f0; font-family: monospace; padding: 5px 10px; outline: none; }
  button { background: #0f0; border: none; color: #000; font-family: monospace; padding: 5px 15px; cursor: pointer; font-weight: bold; }
  button:hover { background: #fff; box-shadow: 0 0 10px #fff; }

</style>
</head>
<body>

<canvas id="c"></canvas>
<div id="overlay"></div>

<div id="ui">
  <input type="text" id="msgInput" placeholder="INJECT MESSAGE..." maxlength="30">
  <button onclick="injectMessage()">INJECT</button>
</div>

<script>
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  let w = canvas.width = window.innerWidth;
  let h = canvas.height = window.innerHeight;

  window.addEventListener('resize', () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; initColumns(); });

  const katakana = 'ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ';
  const latin = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  const nums = '0123456789';
  const alphabet = katakana + latin + nums;

  const fontSize = 16;
  let columns = [];

  function initColumns() {
    let cols = Math.floor(w / fontSize);
    columns = [];
    for(let i=0; i<cols; i++) columns[i] = { y: Math.random() * -h, speed: Math.random() * 2 + 1, text: '' };
  }
  initColumns();

  // Mouse interaction
  let mouseX = -100, mouseY = -100;
  window.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
  window.addEventListener('mouseout', () => { mouseX = -100; mouseY = -100; });

  let injections = [];
  function injectMessage() {
    const input = document.getElementById('msgInput');
    const msg = input.value.toUpperCase();
    if(msg) {
      injections.push({ text: msg, y: -50, x: Math.floor(Math.random()*(w-200))+100, speed: 2 });
      input.value = '';
      playBeep();
    }
  }

  // Audio Setup
  let actx;
  function initAudio() { if(!actx) actx = new (window.AudioContext || window.webkitAudioContext)(); }
  document.body.addEventListener('click', initAudio, {once:true});

  function playBeep() {
    if(!actx) return;
    const osc = actx.createOscillator(); osc.type = 'square';
    const g = actx.createGain();
    osc.frequency.setValueAtTime(800, actx.currentTime);
    g.gain.setValueAtTime(0.1, actx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime+0.1);
    osc.connect(g); g.connect(actx.destination); osc.start(); osc.stop(actx.currentTime+0.1);
  }

  function draw() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
    ctx.fillRect(0, 0, w, h);

    ctx.font = fontSize + 'px monospace';

    // Draw normal rain
    for(let i = 0; i < columns.length; i++) {
      let c = columns[i];
      let text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
      
      let curX = i * fontSize;
      let curY = c.y;

      // Distance to mouse for glow effect
      let dx = curX - mouseX; let dy = curY - mouseY;
      let dist = Math.sqrt(dx*dx + dy*dy);
      
      if(dist < 50) {
        ctx.fillStyle = '#fff';
        ctx.shadowBlur = 10; ctx.shadowColor = '#fff';
        if(Math.random()<0.1 && actx && actx.state==='running') playGlitch();
      } else {
        ctx.fillStyle = '#0F0';
        ctx.shadowBlur = 0;
      }
      
      // Front character is brighter
      ctx.fillText(text, curX, curY);

      c.y += c.speed * fontSize;
      if(c.y > h && Math.random() > 0.975) c.y = 0;
    }

    // Draw injected messages
    ctx.fillStyle = '#fff';
    ctx.shadowBlur = 15; ctx.shadowColor = '#0f0';
    ctx.font = 'bold ' + (fontSize+4) + 'px monospace';
    for(let i=injections.length-1; i>=0; i--) {
      let inj = injections[i];
      for(let j=0; j<inj.text.length; j++) {
        ctx.fillText(inj.text[j], inj.x, inj.y - (inj.text.length-j)*fontSize);
      }
      inj.y += inj.speed * fontSize;
      if(inj.y - inj.text.length*fontSize > h) injections.splice(i, 1);
    }
    ctx.shadowBlur = 0;

    requestAnimationFrame(draw);
  }

  function playGlitch() {
    if(!actx) return;
    const osc = actx.createOscillator(); osc.type = 'sawtooth';
    const g = actx.createGain();
    osc.frequency.setValueAtTime(100+Math.random()*200, actx.currentTime);
    g.gain.setValueAtTime(0.01, actx.currentTime); g.gain.linearRampToValueAtTime(0, actx.currentTime+0.02);
    osc.connect(g); g.connect(actx.destination); osc.start(); osc.stop(actx.currentTime+0.02);
  }

  draw();

</script>
</body>
</html>
