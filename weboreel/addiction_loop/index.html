<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Addiction Loop</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html {
      width: 100%; height: 100%; overflow: hidden;
      background: #fafafa; color: #111; font-family: 'DM Sans', sans-serif;
      overscroll-behavior: none; transition: filter 2s, background 2s;
    }

    #scroll-container {
      position: absolute; top: 0; left: 0; width: 100%; will-change: transform;
      display: flex; flex-direction: column; align-items: center; padding-top: 20vh;
    }

    .post {
      width: 400px; max-width: 90vw; height: 500px; background: #fff; border: 1px solid #ddd;
      border-radius: 10px; margin-bottom: 50px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      padding: 20px; display: flex; flex-direction: column; gap: 15px;
    }
    .post-header { display: flex; align-items: center; gap: 10px; }
    .post-avatar { width: 40px; height: 40px; background: #eee; border-radius: 50%; }
    .post-name { width: 120px; height: 15px; background: #ddd; border-radius: 5px; }
    .post-image { width: 100%; height: 300px; background: #f5f5f5; border-radius: 5px; }
    .post-footer { width: 80px; height: 15px; background: #ddd; border-radius: 5px; }

    /* UI Overlay */
    .hud { position: fixed; top: 0; left: 0; width: 100%; height: 60px; background: #fff; border-bottom: 1px solid #ddd; display: flex; justify-content: center; align-items: center; z-index: 100; font-weight: bold; font-size: 1.5rem; letter-spacing: 2px; }
    
    .dopamine-meter { position: fixed; top: 70px; right: 20px; width: 20px; height: 200px; background: #eee; border-radius: 10px; z-index: 100; overflow: hidden; border: 1px solid #ccc; }
    .dopamine-fill { position: absolute; bottom: 0; left: 0; width: 100%; height: 0%; background: #f00; transition: height 0.2s, background 1s; }

    /* Cage / Trap */
    .cage { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; opacity: 0; transition: opacity 2s; background: repeating-linear-gradient(90deg, transparent, transparent 100px, #000 100px, #000 110px), repeating-linear-gradient(0deg, transparent, transparent 100px, #000 100px, #000 110px); }

    .narrative { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 3rem; font-weight: bold; color: #f00; text-shadow: 0 0 20px #f00; opacity: 0; z-index: 200; pointer-events: none; text-align: center; }

    .notification { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: #f00; color: #fff; padding: 10px 20px; border-radius: 20px; font-weight: bold; opacity: 0; z-index: 150; box-shadow: 0 5px 15px rgba(255,0,0,0.5); }

    .mute-btn { position: fixed; bottom: 20px; right: 20px; font-size: 1.5rem; z-index: 100; cursor: pointer; opacity: 0.5; }
    .start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; color: #111; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; cursor: pointer; font-size: 2rem; }
  </style>
</head>
<body>
  <div class="start-screen" id="start-btn">OPEN APP</div>
  <div class="mute-btn" id="mute-btn">📱</div>

  <div class="hud">FEED</div>
  <div class="dopamine-meter"><div class="dopamine-fill" id="d-fill"></div></div>
  
  <div class="cage" id="cage"></div>
  <div class="narrative" id="narrative"></div>
  <div class="notification" id="notif">❤️ +1</div>

  <div id="scroll-container">
    <!-- JS will populate posts -->
  </div>

  <script>
    // Generate infinite-looking posts
    const cont = document.getElementById('scroll-container');
    for(let i=0; i<30; i++) {
      const p = document.createElement('div'); p.className = 'post';
      p.innerHTML = `<div class="post-header"><div class="post-avatar"></div><div class="post-name"></div></div><div class="post-image"></div><div class="post-footer"></div>`;
      cont.appendChild(p);
    }

    let currentY = 0; let targetY = 0; let maxScroll = 0; let isStarted = false; const ease = 0.08;
    
    function resize() { maxScroll = cont.offsetHeight - window.innerHeight; }
    window.addEventListener('resize', resize);
    window.addEventListener('wheel', e => { if(!isStarted) return; e.preventDefault(); targetY += e.deltaY; targetY = Math.max(0, Math.min(targetY, maxScroll)); }, {passive: false});
    let touchY = 0;
    window.addEventListener('touchstart', e => touchY = e.touches[0].clientY);
    window.addEventListener('touchmove', e => { if(!isStarted) return; e.preventDefault(); targetY += (touchY - e.touches[0].clientY) * 1.5; targetY = Math.max(0, Math.min(targetY, maxScroll)); touchY = e.touches[0].clientY; }, {passive: false});

    // Audio
    let audioCtx, masterGain, droneGain, droneOsc;
    function initAudio() {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      audioCtx = new AudioContext(); masterGain = audioCtx.createGain(); masterGain.gain.value = 0.5; masterGain.connect(audioCtx.destination);
      
      // Oppressive drone
      droneOsc = audioCtx.createOscillator(); droneOsc.type = 'sawtooth'; droneOsc.frequency.value = 40;
      droneGain = audioCtx.createGain(); droneGain.gain.value = 0;
      const df = audioCtx.createBiquadFilter(); df.type = 'lowpass'; df.frequency.value = 100;
      droneOsc.connect(df).connect(droneGain).connect(masterGain); droneOsc.start();
    }

    function playDing(distorted = false) {
      if(!audioCtx) return;
      const osc = audioCtx.createOscillator(); osc.type = distorted ? 'square' : 'sine';
      osc.frequency.setValueAtTime(880, audioCtx.currentTime);
      if(!distorted) osc.frequency.exponentialRampToValueAtTime(1760, audioCtx.currentTime + 0.1);
      else osc.frequency.exponentialRampToValueAtTime(220, audioCtx.currentTime + 0.5);

      const g = audioCtx.createGain(); g.gain.setValueAtTime(0.5, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
      osc.connect(g).connect(masterGain); osc.start(); osc.stop(audioCtx.currentTime + 0.5);
    }

    let lastDingY = 0;

    function loop() {
      if(isStarted) {
        currentY += (targetY - currentY) * ease;
        cont.style.transform = `translateY(${-currentY}px)`;

        const progress = currentY / maxScroll; // 0 to 1

        // Dopamine Fill
        document.getElementById('d-fill').style.height = `${progress * 100}%`;

        // Triggers every ~1000px
        if(currentY - lastDingY > 1000) {
          lastDingY = currentY;
          playDing(progress > 0.6);
          const notif = document.getElementById('notif');
          notif.innerText = progress > 0.6 ? '⚠️ ERROR' : '❤️ +1';
          notif.style.background = progress > 0.6 ? '#000' : '#f00';
          notif.style.opacity = 1;
          setTimeout(() => notif.style.opacity = 0, 1000);
        }

        // Narrative & Effects
        const nar = document.getElementById('narrative');
        const cage = document.getElementById('cage');
        
        if(progress > 0.3 && progress < 0.5) {
          nar.style.opacity = 1; nar.innerText = "Just one more.";
        } else if(progress > 0.6 && progress < 0.8) {
          document.body.style.filter = 'grayscale(0.8)';
          nar.style.opacity = 1; nar.innerText = "Never enough.";
          if(audioCtx) droneGain.gain.setTargetAtTime(0.2, audioCtx.currentTime, 0.5);
        } else if(progress > 0.8) {
          document.body.style.filter = 'grayscale(1) invert(1)';
          document.body.style.background = '#000';
          cage.style.opacity = 1;
          nar.style.opacity = 1; nar.innerText = "TRAP.";
          if(audioCtx) droneGain.gain.setTargetAtTime(0.5, audioCtx.currentTime, 0.5);
        } else {
          nar.style.opacity = 0;
          document.body.style.filter = 'none'; document.body.style.background = '#fafafa';
          cage.style.opacity = 0;
          if(audioCtx) droneGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5);
        }

      }
      requestAnimationFrame(loop);
    }

    document.getElementById('start-btn').addEventListener('click', function() {
      initAudio(); this.style.display = 'none'; isStarted = true; resize(); loop();
    });

    let isMuted = false;
    document.getElementById('mute-btn').addEventListener('click', function() {
      if(!audioCtx) return; isMuted = !isMuted;
      masterGain.gain.linearRampToValueAtTime(isMuted ? 0 : 0.5, audioCtx.currentTime + 0.3);
      this.style.opacity = isMuted ? 0.3 : 1;
    });
    window.onload = resize;
  </script>
</body>
</html>
