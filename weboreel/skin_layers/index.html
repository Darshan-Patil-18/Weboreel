<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Skin Layers Explorer</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html {
      width: 100%; height: 100%; overflow: hidden;
      background: #000; color: #fff; font-family: 'Space Mono', monospace;
      overscroll-behavior: none; perspective: 1000px;
    }

    #scroll-container {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; justify-content: center; align-items: center;
    }

    #zoom-container {
      position: relative; width: 100vw; height: 100vh;
      transform-style: preserve-3d; will-change: transform;
    }

    .layer {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center;
      opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }

    /* HUD */
    .hud { position: fixed; top: 20px; left: 20px; z-index: 100; font-family: monospace; font-size: 1.2rem; color: #fff; text-shadow: 0 0 5px #fff; }
    
    /* L1: Skin Surface */
    #l-skin { background: #fce2c6; }
    .texture { width: 100%; height: 100%; background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.05) 20%, rgba(0,0,0,0.05) 80%, transparent 80%, transparent), radial-gradient(circle, transparent 20%, rgba(0,0,0,0.05) 20%, rgba(0,0,0,0.05) 80%, transparent 80%, transparent) 25px 25px; background-size: 50px 50px; }

    /* L2: Pores */
    #l-pores { background: #eecbad; }
    .pore-grid { width: 100%; height: 100%; background: radial-gradient(circle at center, #8b4513 10%, transparent 20%); background-size: 100px 100px; }

    /* L3: Hydration/Glow */
    #l-glow { background: #111; }
    .water-molecules { position: absolute; width: 100%; height: 100%; background: radial-gradient(circle, rgba(0,255,255,0.8) 10%, transparent 40%); background-size: 80px 80px; animation: breathe 3s infinite alternate; }
    @keyframes breathe { 0% { filter: brightness(0.5); } 100% { filter: brightness(1.5); } }

    /* L4: UV Damage */
    #l-damage { background: #220000; }
    .sun-spots { position: absolute; width: 100%; height: 100%; background: radial-gradient(circle at 30% 30%, #500 20%, transparent 50%), radial-gradient(circle at 70% 60%, #400 30%, transparent 60%); filter: contrast(2); }

    /* L5: Cellular Repair */
    #l-repair { background: #000; }
    .fibers { position: absolute; width: 100%; height: 100%; background: repeating-linear-gradient(45deg, transparent, transparent 20px, rgba(212,175,55,0.5) 20px, rgba(212,175,55,0.5) 22px), repeating-linear-gradient(-45deg, transparent, transparent 20px, rgba(212,175,55,0.5) 20px, rgba(212,175,55,0.5) 22px); box-shadow: inset 0 0 100px #d4af37; animation: pulseGlow 2s infinite alternate; }
    @keyframes pulseGlow { 0% { opacity: 0.5; } 100% { opacity: 1; } }

    .mute-btn { position: fixed; bottom: 20px; right: 20px; font-size: 1.5rem; z-index: 100; cursor: pointer; opacity: 0.5; color: white; mix-blend-mode: difference; }
    .start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #fce2c6; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; cursor: pointer; font-size: 2rem; letter-spacing: 5px; }
  </style>
</head>
<body>
  <div class="start-screen" id="start-btn">MICROSCOPE ENGAGED</div>
  <div class="mute-btn" id="mute-btn">🔬</div>

  <div class="hud" id="hud">DEPTH: EPIDERMIS</div>

  <div id="scroll-container">
    <div id="zoom-container">
      
      <div class="layer" id="l-skin" style="z-index: 5;">
        <div class="texture"></div>
      </div>
      
      <div class="layer" id="l-pores" style="z-index: 4;">
        <div class="pore-grid"></div>
      </div>

      <div class="layer" id="l-glow" style="z-index: 3;">
        <div class="water-molecules"></div>
      </div>

      <div class="layer" id="l-damage" style="z-index: 2;">
        <div class="sun-spots"></div>
      </div>

      <div class="layer" id="l-repair" style="z-index: 1;">
        <div class="fibers"></div>
      </div>

    </div>
  </div>

  <script>
    let currentZoom = 1; let targetZoom = 1; let isStarted = false; const ease = 0.05;
    
    const layers = [
      { id: 'l-skin', min: 1, max: 10, target: 'SURFACE' },
      { id: 'l-pores', min: 8, max: 50, target: 'PORES (10X)' },
      { id: 'l-glow', min: 40, max: 200, target: 'HYDRATION (100X)' },
      { id: 'l-damage', min: 180, max: 800, target: 'UV DAMAGE (500X)' },
      { id: 'l-repair', min: 700, max: 3000, target: 'CELLULAR REPAIR (1000X)' }
    ];

    window.addEventListener('wheel', e => {
      if(!isStarted) return; e.preventDefault();
      if(e.deltaY > 0) targetZoom *= 1.1; else targetZoom /= 1.1;
      targetZoom = Math.max(1, Math.min(targetZoom, 3500));
    }, {passive: false});

    let touchY = 0;
    window.addEventListener('touchstart', e => touchY = e.touches[0].clientY);
    window.addEventListener('touchmove', e => {
      if(!isStarted) return; e.preventDefault();
      if(touchY - e.touches[0].clientY > 0) targetZoom *= 1.05; else targetZoom /= 1.05;
      targetZoom = Math.max(1, Math.min(targetZoom, 3500));
      touchY = e.touches[0].clientY;
    }, {passive: false});

    // Audio
    let audioCtx, masterGain;
    let sSkin, sHydration, sDamage, sRepair;
    
    function initAudio() {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      audioCtx = new AudioContext(); masterGain = audioCtx.createGain(); masterGain.gain.value = 0.5; masterGain.connect(audioCtx.destination);
      
      // Skin (Soft Pad)
      sSkin = audioCtx.createGain(); sSkin.gain.value = 1;
      const oS = audioCtx.createOscillator(); oS.type = 'sine'; oS.frequency.value = 220;
      oS.connect(sSkin).connect(masterGain); oS.start();

      // Hydration (Bubbling / Squelch)
      sHydration = audioCtx.createGain(); sHydration.gain.value = 0;
      const oH = audioCtx.createOscillator(); oH.type = 'triangle';
      const lfoH = audioCtx.createOscillator(); lfoH.frequency.value = 5; const lfoHG = audioCtx.createGain(); lfoHG.gain.value = 400;
      lfoH.connect(lfoHG).connect(oH.frequency);
      oH.connect(sHydration).connect(masterGain); oH.start(); lfoH.start();

      // Damage (High pitch dissonant)
      sDamage = audioCtx.createGain(); sDamage.gain.value = 0;
      const oD1 = audioCtx.createOscillator(); oD1.type = 'sawtooth'; oD1.frequency.value = 1000;
      const oD2 = audioCtx.createOscillator(); oD2.type = 'sawtooth'; oD2.frequency.value = 1050;
      oD1.connect(sDamage); oD2.connect(sDamage);
      sDamage.connect(masterGain); oD1.start(); oD2.start();

      // Repair (Warm Gold Chord)
      sRepair = audioCtx.createGain(); sRepair.gain.value = 0;
      [261.63, 329.63, 392.00, 523.25].forEach(f => {
        const oR = audioCtx.createOscillator(); oR.type = 'sine'; oR.frequency.value = f;
        oR.connect(sRepair); oR.start();
      });
      sRepair.connect(masterGain);
    }

    function loop() {
      if(isStarted) {
        currentZoom += (targetZoom - currentZoom) * ease;
        
        let activeTarget = "SURFACE";

        layers.forEach((l) => {
          const el = document.getElementById(l.id);
          if(currentZoom >= l.min && currentZoom <= l.max * 1.5) {
            const relativeScale = currentZoom / l.min;
            el.style.transform = `translate(-50%, -50%) scale(${relativeScale})`;
            
            let op = 1;
            if(currentZoom < l.min * 1.5) op = (currentZoom - l.min) / (l.min * 0.5);
            if(currentZoom > l.max) op = 1 - (currentZoom - l.max) / (l.max * 0.5);
            el.style.opacity = Math.max(0, Math.min(1, op));
            
            if(op > 0.5) activeTarget = l.target;
          } else {
            el.style.opacity = 0;
          }
        });

        document.getElementById('hud').innerText = `DEPTH: ${activeTarget}`;

        // Audio mixing based on zoom
        if(audioCtx) {
          const t = audioCtx.currentTime;
          let vSkin=0, vHyd=0, vDam=0, vRep=0;
          
          if(currentZoom < 30) vSkin = 1;
          if(currentZoom >= 30 && currentZoom < 150) vHyd = 0.5;
          if(currentZoom >= 150 && currentZoom < 600) vDam = 0.2;
          if(currentZoom >= 600) vRep = 0.5;

          sSkin.gain.setTargetAtTime(vSkin, t, 0.2);
          sHydration.gain.setTargetAtTime(vHyd, t, 0.2);
          sDamage.gain.setTargetAtTime(vDam, t, 0.2);
          sRepair.gain.setTargetAtTime(vRep, t, 0.2);
        }
      }
      requestAnimationFrame(loop);
    }

    document.getElementById('start-btn').addEventListener('click', function() {
      initAudio(); this.style.display = 'none'; isStarted = true; loop();
    });

    let isMuted = false;
    document.getElementById('mute-btn').addEventListener('click', function() {
      if(!audioCtx) return; isMuted = !isMuted;
      masterGain.gain.linearRampToValueAtTime(isMuted ? 0 : 0.5, audioCtx.currentTime + 0.3);
    });
  </script>
</body>
</html>
