<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mirror of Emotions</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');

    :root {
      --bg-color: #050505;
      --text-color: #f0f0f0;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'Space Mono', monospace;
      overflow: hidden;
      transition: background 1s ease;
      user-select: none;
      -webkit-user-select: none;
      height: 100vh;
      width: 100vw;
    }

    /* Header */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 20px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 100;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 1.5rem;
      letter-spacing: 2px;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 20px;
      font-size: 0.85rem;
      opacity: 0.7;
    }

    .mute-btn {
      background: none;
      border: none;
      color: white;
      cursor: pointer;
      font-size: 1.2rem;
      outline: none;
    }

    /* Canvas */
    #particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
      pointer-events: none;
    }

    /* Main Container */
    main {
      position: relative;
      z-index: 10;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    /* Grid */
    .grid-container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      max-width: 900px;
      width: 90%;
      transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.8s ease;
    }

    @media (max-width: 768px) {
      .grid-container {
        grid-template-columns: repeat(2, 1fr);
      }

      header {
        padding: 15px;
      }

      .logo {
        font-size: 1.2rem;
      }

      .status {
        font-size: 0.7rem;
        gap: 10px;
      }
    }

    .grid-container.hidden {
      transform: translateY(-50px) scale(0.95);
      opacity: 0;
      pointer-events: none;
    }

    .card {
      background: rgba(20, 20, 20, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .card:hover {
      transform: translateY(-10px);
    }

    .card .emoji {
      font-size: 3.5rem;
      margin-bottom: 15px;
    }

    .card .label {
      font-weight: 700;
      letter-spacing: 2px;
      font-size: 0.9rem;
    }

    /* Specific Card Glows */
    .card[data-emotion="sadness"]:hover {
      box-shadow: 0 10px 30px rgba(0, 100, 255, 0.3);
      border-color: rgba(0, 100, 255, 0.5);
    }

    .card[data-emotion="rage"]:hover {
      box-shadow: 0 10px 30px rgba(255, 50, 0, 0.3);
      border-color: rgba(255, 50, 0, 0.5);
    }

    .card[data-emotion="calm"]:hover {
      box-shadow: 0 10px 30px rgba(0, 200, 150, 0.3);
      border-color: rgba(0, 200, 150, 0.5);
    }

    .card[data-emotion="euphoria"]:hover {
      box-shadow: 0 10px 30px rgba(255, 200, 0, 0.3);
      border-color: rgba(255, 200, 0, 0.5);
    }

    .card[data-emotion="fear"]:hover {
      box-shadow: 0 10px 30px rgba(100, 100, 100, 0.3);
      border-color: rgba(100, 100, 100, 0.5);
    }

    .card[data-emotion="love"]:hover {
      box-shadow: 0 10px 30px rgba(255, 50, 150, 0.3);
      border-color: rgba(255, 50, 150, 0.5);
    }

    /* Active Emotion UI */
    .active-emotion {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1s ease;
    }

    .active-emotion.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .emotion-text {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 8vw, 6rem);
      text-align: center;
      margin-bottom: 20px;
      line-height: 1.1;
      text-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
      padding: 0 20px;
    }

    .emotion-sub {
      font-size: clamp(0.9rem, 2vw, 1.5rem);
      opacity: 0.8;
      text-align: center;
      letter-spacing: 1px;
      height: 30px;
    }

    .back-btn {
      position: absolute;
      bottom: 40px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      padding: 12px 24px;
      border-radius: 30px;
      font-family: 'Space Mono', monospace;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.3s, transform 0.3s;
      backdrop-filter: blur(5px);
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: translateY(-2px);
    }

    /* --- Emotion Specific Animations & Styles --- */

    /* RAGE */
    @keyframes shake {

      0%,
      100% {
        transform: translateX(0);
      }

      10%,
      30%,
      50%,
      70%,
      90% {
        transform: translateX(-5px);
      }

      20%,
      40%,
      60%,
      80% {
        transform: translateX(5px);
      }
    }

    body.theme-rage {
      background: radial-gradient(circle at center, #4a0000 0%, #000000 100%);
      animation: shake 0.1s infinite alternate;
    }

    /* SADNESS */
    body.theme-sadness {
      background: linear-gradient(to bottom, #001233 0%, #000000 100%);
    }

    /* CALM */
    @keyframes breathe {

      0%,
      100% {
        transform: scale(1);
        opacity: 0.7;
      }

      50% {
        transform: scale(1.05);
        opacity: 1;
      }
    }

    body.theme-calm {
      background: radial-gradient(circle at center, #004d40 0%, #00251a 100%);
    }

    body.theme-calm .emotion-text {
      animation: breathe 4s ease-in-out infinite;
    }

    /* EUPHORIA */
    @keyframes hueCycle {
      0% {
        filter: hue-rotate(0deg);
      }

      100% {
        filter: hue-rotate(360deg);
      }
    }

    @keyframes glitch {
      0% {
        transform: translate(0);
        text-shadow: none;
      }

      20% {
        transform: translate(-2px, 2px);
        text-shadow: 2px 0 red, -2px 0 blue;
      }

      40% {
        transform: translate(-2px, -2px);
        text-shadow: -2px 0 red, 2px 0 blue;
      }

      60% {
        transform: translate(2px, 2px);
        text-shadow: 2px 0 red, -2px 0 blue;
      }

      80% {
        transform: translate(2px, -2px);
        text-shadow: -2px 0 red, 2px 0 blue;
      }

      100% {
        transform: translate(0);
        text-shadow: none;
      }
    }

    body.theme-euphoria {
      background: radial-gradient(circle at center, #ff007f, #7f00ff);
      animation: hueCycle 5s linear infinite;
    }

    body.theme-euphoria .emotion-text {
      animation: glitch 0.2s infinite;
      font-weight: 900;
    }

    /* FEAR */
    body.theme-fear {
      background: #000;
    }

    body.theme-fear.flicker {
      background: #222;
    }

    body.theme-fear .emotion-text {
      letter-spacing: 4px;
    }

    /* LOVE */
    body.theme-love {
      background: radial-gradient(circle at top, #7a003c 0%, #2a0033 100%);
    }

    body.theme-love .emotion-text {
      animation: breathe 3s ease-in-out infinite;
      color: #ffb3d9;
    }
  </style>
</head>

<body>

  <header>
    <div class="logo">MIRROR</div>
    <div class="status">
      <span id="header-text">WHAT DO YOU FEEL?</span>
      <button class="mute-btn" id="mute-btn" title="Toggle Audio">🔊</button>
    </div>
  </header>

  <canvas id="particles"></canvas>

  <main>
    <div class="grid-container" id="grid">
      <div class="card" data-emotion="sadness">
        <div class="emoji">😢</div>
        <div class="label">SADNESS</div>
      </div>
      <div class="card" data-emotion="rage">
        <div class="emoji">🔥</div>
        <div class="label">RAGE</div>
      </div>
      <div class="card" data-emotion="calm">
        <div class="emoji">🌊</div>
        <div class="label">CALM</div>
      </div>
      <div class="card" data-emotion="euphoria">
        <div class="emoji">⚡</div>
        <div class="label">EUPHORIA</div>
      </div>
      <div class="card" data-emotion="fear">
        <div class="emoji">😨</div>
        <div class="label">FEAR</div>
      </div>
      <div class="card" data-emotion="love">
        <div class="emoji">💛</div>
        <div class="label">LOVE</div>
      </div>
    </div>

    <div class="active-emotion" id="active-screen">
      <div class="emotion-text" id="emotion-title"></div>
      <div class="emotion-sub" id="emotion-sub"></div>
      <button class="back-btn" id="back-btn">← FEEL SOMETHING ELSE</button>
    </div>
  </main>

  <script>
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let cw = canvas.width = window.innerWidth;
    let ch = canvas.height = window.innerHeight;

    window.addEventListener('resize', () => {
      cw = canvas.width = window.innerWidth;
      ch = canvas.height = window.innerHeight;
    });

    let currentEmotion = null;
    let particles = [];
    let mouse = { x: -1000, y: -1000 };
    let frameId = null;

    // Mouse interaction
    window.addEventListener('mousemove', e => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });
    window.addEventListener('mouseleave', () => {
      mouse.x = -1000; mouse.y = -1000;
    });
    window.addEventListener('touchmove', e => {
      if (e.touches.length > 0) {
        mouse.x = e.touches[0].clientX;
        mouse.y = e.touches[0].clientY;
      }
    });
    window.addEventListener('touchend', () => {
      mouse.x = -1000; mouse.y = -1000;
    });

    document.addEventListener('click', e => {
      // if active emotion, spawn 20 particles
      if (currentEmotion && !e.target.closest('.back-btn') && !e.target.closest('.mute-btn') && !e.target.closest('.card')) {
        spawnClickParticles(e.clientX, e.clientY);
      }
    });

    // Audio setup
    let audioCtx;
    let masterGain;
    let isMuted = false;
    let activeNodes = [];
    let audioIntervals = [];

    document.getElementById('mute-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      isMuted = !isMuted;
      document.getElementById('mute-btn').innerText = isMuted ? '🔇' : '🔊';
      if (masterGain && audioCtx) {
        masterGain.gain.setTargetAtTime(isMuted ? 0 : 1, audioCtx.currentTime, 0.1);
      }
    });

    // Particles
    class Particle {
      constructor(x, y, vx, vy, color, size, type) {
        this.x = x; this.y = y; this.vx = vx; this.vy = vy;
        this.color = color; this.size = size; this.type = type;
        this.life = 1;
        this.decay = Math.random() * 0.02 + 0.005;
        this.angle = Math.random() * Math.PI * 2;
        this.spin = (Math.random() - 0.5) * 0.2;
        this.z = Math.random();
      }
      update() {
        // Mouse repel
        let dx = this.x - mouse.x;
        let dy = this.y - mouse.y;
        let dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 80 && this.type !== 'calm') {
          this.x += dx * 0.05;
          this.y += dy * 0.05;
        }

        if (this.type === 'sadness') {
          this.y += this.vy;
          if (this.y > ch) { this.y = -10; this.x = Math.random() * cw; }
        } else if (this.type === 'rage') {
          this.x += this.vx; this.y += this.vy;
          this.life -= this.decay * 0.5;
          if (this.life <= 0 && currentEmotion === 'rage') resetRage(this);
        } else if (this.type === 'euphoria') {
          this.x += this.vx; this.y += this.vy + Math.sin(this.angle) * 2;
          this.angle += this.spin;
          if (this.x < 0 || this.x > cw || this.y < 0 || this.y > ch) {
            if (currentEmotion === 'euphoria') resetEuphoria(this);
          }
        } else if (this.type === 'fear') {
          // Zoom from edges to center
          this.z -= 0.005;
          if (this.z <= 0) {
            this.z = 1;
            // spawn at edges
            if (Math.random() > 0.5) {
              this.x = Math.random() > 0.5 ? -10 : cw + 10;
              this.y = Math.random() * ch;
            } else {
              this.x = Math.random() * cw;
              this.y = Math.random() > 0.5 ? -10 : ch + 10;
            }
          }
          let cx = cw / 2, cy = ch / 2;
          let dx2 = cx - this.x, dy2 = cy - this.y;
          this.x += dx2 * 0.02;
          this.y += dy2 * 0.02;
          this.size = (1.1 - this.z) * 4;
        } else if (this.type === 'love') {
          this.y -= this.vy;
          this.x += Math.sin(this.angle) * 1;
          this.angle += 0.02;
          if (this.y < -50 && currentEmotion === 'love') {
            this.y = ch + 50; this.x = Math.random() * cw;
          }
        }
      }
      draw(ctx) {
        if (this.life <= 0) return;
        ctx.save();
        ctx.globalAlpha = this.type === 'rage' ? Math.max(0, this.life) : 1;
        ctx.fillStyle = this.color;
        ctx.translate(this.x, this.y);

        if (this.type === 'sadness') {
          ctx.fillRect(0, 0, this.size / 3, this.size * 4);
        } else if (this.type === 'euphoria') {
          ctx.rotate(this.angle);
          ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
        } else if (this.type === 'love') {
          ctx.scale(this.size / 10, this.size / 10);
          drawHeart(ctx, this.color);
        } else if (this.type === 'fear') {
          ctx.globalAlpha = Math.max(0, 1 - this.z);
          ctx.beginPath(); ctx.arc(0, 0, Math.max(0.1, this.size), 0, Math.PI * 2); ctx.fill();
        } else {
          ctx.beginPath(); ctx.arc(0, 0, Math.max(0.1, this.size), 0, Math.PI * 2); ctx.fill();
        }
        ctx.restore();
      }
    }

    function drawHeart(ctx, color) {
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.bezierCurveTo(0, -3, -5, -15, -25, -15);
      ctx.bezierCurveTo(-55, -15, -55, 22.5, -55, 22.5);
      ctx.bezierCurveTo(-55, 40, -35, 62, 0, 80);
      ctx.bezierCurveTo(35, 62, 55, 40, 55, 22.5);
      ctx.bezierCurveTo(55, 22.5, 55, -15, 25, -15);
      ctx.bezierCurveTo(10, -15, 0, -3, 0, 0);
      ctx.fillStyle = color;
      ctx.fill();
    }

    // Resets
    function resetRage(p) {
      p.x = cw / 2 + (Math.random() - 0.5) * 50;
      p.y = ch / 2 + (Math.random() - 0.5) * 50;
      let a = Math.random() * Math.PI * 2;
      let v = Math.random() * 15 + 5;
      p.vx = Math.cos(a) * v; p.vy = Math.sin(a) * v;
      p.life = 1;
    }
    function resetEuphoria(p) {
      p.x = cw / 2; p.y = ch / 2;
      let a = Math.random() * Math.PI * 2;
      let v = Math.random() * 12 + 4;
      p.vx = Math.cos(a) * v; p.vy = Math.sin(a) * v;
    }

    // Calm drawing
    let calmTime = 0;

    function loop() {
      if (!currentEmotion) return;

      if (currentEmotion === 'calm') {
        ctx.fillStyle = 'rgba(0, 37, 26, 0.05)';
        ctx.fillRect(0, 0, cw, ch);
        ctx.beginPath();
        ctx.strokeStyle = 'rgba(0, 200, 150, 0.4)';
        ctx.lineWidth = 3;
        calmTime += 0.015;
        for (let i = 0; i < cw; i += 10) {
          let y = ch / 2 + Math.sin(i * 0.01 + calmTime) * 120 + Math.sin(i * 0.005 + calmTime * 0.5) * 60;
          if (i === 0) ctx.moveTo(i, y);
          else ctx.lineTo(i, y);
        }
        ctx.stroke();
      } else if (currentEmotion === 'fear') {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
        ctx.fillRect(0, 0, cw, ch);
      } else {
        ctx.clearRect(0, 0, cw, ch);
      }

      particles.forEach(p => { p.update(); p.draw(ctx); });
      frameId = requestAnimationFrame(loop);
    }

    function initParticles(emotion) {
      particles = [];
      ctx.clearRect(0, 0, cw, ch);
      if (emotion === 'sadness') {
        for (let i = 0; i < 200; i++) particles.push(new Particle(Math.random() * cw, Math.random() * ch, 0, Math.random() * 15 + 10, 'rgba(100,150,255,0.6)', Math.random() * 2 + 1, emotion));
      } else if (emotion === 'rage') {
        for (let i = 0; i < 300; i++) {
          let p = new Particle(0, 0, 0, 0, Math.random() > 0.5 ? '#ff3300' : '#ff8800', Math.random() * 5 + 2, emotion);
          resetRage(p);
          particles.push(p);
        }
      } else if (emotion === 'euphoria') {
        let colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff'];
        for (let i = 0; i < 500; i++) {
          let p = new Particle(0, 0, 0, 0, colors[Math.floor(Math.random() * colors.length)], Math.random() * 10 + 5, emotion);
          resetEuphoria(p);
          p.x = Math.random() * cw; p.y = Math.random() * ch; // spread initially
          particles.push(p);
        }
      } else if (emotion === 'fear') {
        for (let i = 0; i < 50; i++) {
          let p = new Particle(Math.random() * cw, Math.random() * ch, 0, 0, '#ffffff', 2, emotion);
          p.z = Math.random();
          particles.push(p);
        }
      } else if (emotion === 'love') {
        for (let i = 0; i < 150; i++) {
          particles.push(new Particle(Math.random() * cw, Math.random() * ch, 0, Math.random() * 3 + 1, 'rgba(255,100,150,0.6)', Math.random() * 4 + 2, emotion));
        }
      }
    }

    function spawnClickParticles(x, y) {
      if (currentEmotion === 'calm' || currentEmotion === 'fear') return;
      let count = 20;
      for (let i = 0; i < count; i++) {
        let a = Math.random() * Math.PI * 2;
        let v = Math.random() * 10 + 2;
        let color = '#fff';
        if (currentEmotion === 'sadness') color = 'rgba(100,150,255,0.8)';
        if (currentEmotion === 'rage') color = '#ff0000';
        if (currentEmotion === 'euphoria') color = ['#ff0000', '#00ff00', '#0000ff'][Math.floor(Math.random() * 3)];
        if (currentEmotion === 'love') color = 'rgba(255,100,150,0.8)';

        let p = new Particle(x, y, Math.cos(a) * v, Math.sin(a) * v, color, Math.random() * 5 + 3, currentEmotion);
        if (currentEmotion === 'sadness') p.vy = Math.abs(p.vy) + 5;
        if (currentEmotion === 'rage') p.life = 0.5;
        particles.push(p);
      }
    }

    // Audio Engine
    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain();
        masterGain.gain.value = isMuted ? 0 : 1;
        masterGain.connect(audioCtx.destination);
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function stopAudio() {
      if (!audioCtx) return;
      activeNodes.forEach(node => {
        try {
          node.gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
          setTimeout(() => { try { node.source.stop(); } catch (e) { } }, 500);
        } catch (e) { }
      });
      activeNodes = [];
      audioIntervals.forEach(clearInterval);
      audioIntervals = [];
    }

    function playOscillators(freqs, type, gainValue, tremoloSpeed = 0) {
      let groupGain = audioCtx.createGain();
      groupGain.gain.value = 0;
      groupGain.connect(masterGain);
      groupGain.gain.setTargetAtTime(gainValue, audioCtx.currentTime, 0.5);

      if (tremoloSpeed > 0) {
        let lfo = audioCtx.createOscillator();
        lfo.type = 'sine';
        lfo.frequency.value = tremoloSpeed;
        let lfoGain = audioCtx.createGain();
        lfoGain.gain.value = gainValue * 0.8;
        lfo.connect(lfoGain);
        lfoGain.connect(groupGain.gain);
        lfo.start();
        activeNodes.push({ source: lfo, gainNode: lfoGain });
      }

      freqs.forEach(f => {
        let osc = audioCtx.createOscillator();
        osc.type = type;
        osc.frequency.value = f;
        osc.connect(groupGain);
        osc.start();
        activeNodes.push({ source: osc, gainNode: groupGain });
      });
    }

    function playNoiseBurst(gainValue) {
      if (!audioCtx) return;
      let bufferSize = audioCtx.sampleRate * 0.1;
      let buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      let data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

      let noise = audioCtx.createBufferSource();
      noise.buffer = buffer;

      let noiseFilter = audioCtx.createBiquadFilter();
      noiseFilter.type = 'highpass';
      noiseFilter.frequency.value = 1000;

      let noiseGain = audioCtx.createGain();
      noiseGain.gain.setValueAtTime(gainValue, audioCtx.currentTime);
      noiseGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);

      noise.connect(noiseFilter);
      noiseFilter.connect(noiseGain);
      noiseGain.connect(masterGain);

      noise.start();
    }

    function triggerAudio(emotion) {
      initAudio();
      stopAudio();

      if (emotion === 'sadness') {
        playOscillators([130, 155, 195], 'sine', 0.1);
        audioIntervals.push(setInterval(() => playNoiseBurst(0.02), 100));
      } else if (emotion === 'rage') {
        playOscillators([80], 'sawtooth', 0.1, 15);
      } else if (emotion === 'calm') {
        playOscillators([174, 261], 'sine', 0.04, 0.2);
      } else if (emotion === 'euphoria') {
        playOscillators([523, 659, 784], 'triangle', 0.06);
      } else if (emotion === 'fear') {
        playOscillators([40], 'sine', 0.2);
        audioIntervals.push(setInterval(() => {
          if (Math.random() > 0.3 && audioCtx) {
            let osc = audioCtx.createOscillator();
            osc.type = 'sine';
            osc.frequency.value = 800 + Math.random() * 400;
            let gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            osc.connect(gain); gain.connect(masterGain);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
          }
        }, 200));
      } else if (emotion === 'love') {
        playOscillators([261, 329, 392], 'sine', 0.05);
      }
    }

    // UI Flow
    const grid = document.getElementById('grid');
    const activeScreen = document.getElementById('active-screen');
    const titleEl = document.getElementById('emotion-title');
    const subEl = document.getElementById('emotion-sub');

    const data = {
      sadness: { title: "It's okay to feel this", sub: "rain washes everything clean" },
      rage: { title: "LET IT OUT", sub: "controlled chaos is still power" },
      calm: { title: "breathe in... breathe out...", sub: "" },
      euphoria: { title: "YOU ARE ALIVE", sub: "" },
      fear: { title: "something is behind you", sub: "" },
      love: { title: "you are enough", sub: "" }
    };

    let typeWriterInterval = null;

    function setEmotion(em) {
      if (currentEmotion === em) return;
      currentEmotion = em;
      document.body.className = 'theme-' + em;
      grid.classList.add('hidden');

      setTimeout(() => {
        if (currentEmotion !== em) return;
        activeScreen.classList.add('visible');
        if (em === 'fear') {
          titleEl.innerHTML = '';
          subEl.innerHTML = '';
          let str = data[em].title;
          let i = 0;
          clearInterval(typeWriterInterval);
          typeWriterInterval = setInterval(() => {
            titleEl.innerHTML += str.charAt(i);
            i++;
            if (i >= str.length) clearInterval(typeWriterInterval);
          }, 100);
        } else {
          clearInterval(typeWriterInterval);
          titleEl.innerHTML = data[em].title;
          subEl.innerHTML = data[em].sub;
        }
      }, 800);

      if (frameId) cancelAnimationFrame(frameId);
      initParticles(em);
      loop();
      triggerAudio(em);

      if (em === 'fear') {
        audioIntervals.push(setInterval(() => {
          document.body.classList.add('flicker');
          setTimeout(() => document.body.classList.remove('flicker'), 50);
        }, 2000 + Math.random() * 2000));
      }
    }

    document.querySelectorAll('.card').forEach(c => {
      c.addEventListener('click', () => setEmotion(c.dataset.emotion));
    });

    document.getElementById('back-btn').addEventListener('click', () => {
      currentEmotion = null;
      document.body.className = '';
      activeScreen.classList.remove('visible');
      if (frameId) cancelAnimationFrame(frameId);
      ctx.clearRect(0, 0, cw, ch);
      stopAudio();
      clearInterval(typeWriterInterval);
      setTimeout(() => grid.classList.remove('hidden'), 500);
    });

    // Keyboard
    window.addEventListener('keydown', e => {
      const map = { '1': 'sadness', '2': 'rage', '3': 'calm', '4': 'euphoria', '5': 'fear', '6': 'love' };
      if (map[e.key]) setEmotion(map[e.key]);
      if (e.key === 'Escape' && currentEmotion) document.getElementById('back-btn').click();
    });

  </script>
</body>

</html>
