<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>GRAVITY MIRROR</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Space Mono', monospace;
            user-select: none;
            touch-action: none;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        canvas.disco {
            animation: disco 2s linear infinite;
        }

        @keyframes disco {
            0% {
                filter: hue-rotate(0deg);
            }

            100% {
                filter: hue-rotate(360deg);
            }
        }

        #intro {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            z-index: 10;
            transition: opacity 0.5s ease-out;
            pointer-events: none;
            animation: fadeIn 1.5s ease-in-out;
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
            }

            100% {
                opacity: 1;
            }
        }

        #intro h1 {
            font-size: 4vw;
            margin: 0 0 10px 0;
            letter-spacing: 4px;
            text-align: center;
        }

        #intro p {
            font-size: 1.2rem;
            opacity: 0.7;
            text-align: center;
        }

        @media (max-width: 800px) {
            #intro h1 {
                font-size: 3rem;
            }

            #intro p {
                font-size: 1rem;
            }
        }

        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
            pointer-events: none;
            z-index: 5;
            text-transform: uppercase;
        }

        #toolbar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(10px);
            padding: 10px;
            border-radius: 30px;
            display: flex;
            gap: 10px;
            z-index: 5;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            overflow-x: auto;
            max-width: 90vw;
        }

        #toolbar::-webkit-scrollbar {
            display: none;
        }

        .btn {
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            font-family: 'Space Mono', monospace;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s ease;
            font-size: 14px;
            outline: none;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .btn.active {
            background: rgba(255, 255, 255, 0.2);
            border-color: #fff;
        }

        #flash {
            position: absolute;
            inset: 0;
            background: #ff003c;
            opacity: 0;
            pointer-events: none;
            z-index: 20;
            transition: opacity 0.1s;
            mix-blend-mode: screen;
        }

        #vignette {
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(circle at center, transparent 40%, rgba(155, 0, 255, 0.2) 100%);
            opacity: 0;
            transition: opacity 0.5s ease;
            z-index: 2;
        }
    </style>
</head>

<body>

    <div id="vignette"></div>
    <div id="flash"></div>

    <div id="intro">
        <h1>BREAK GRAVITY</h1>
        <p>click anywhere to begin</p>
    </div>

    <div id="hud">
        <div id="hud-balls">BALLS: 0</div>
        <div>RIGHT CLICK = BLACK HOLE</div>
    </div>

    <div id="toolbar">
        <button class="btn" id="btn-explode">💥 EXPLODE</button>
        <button class="btn" id="btn-freeze">❄️ FREEZE</button>
        <button class="btn" id="btn-disco">🌈 DISCO</button>
        <button class="btn" id="btn-clear">🗑️ CLEAR</button>
        <button class="btn active" id="btn-sound">♪ SOUND</button>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- State ---
        const colors = ['#ff003c', '#00ffff', '#ff6b35', '#fff', '#9b00ff', '#00ff88'];
        let balls = [];
        let sparks = [];
        let blackHole = null;

        let frozen = false;
        let discoMode = false;
        let gameStarted = false;

        let draggedBall = null;
        let mouse = { x: 0, y: 0 };
        let lastMouse = { x: 0, y: 0 };
        let pointerDownTime = 0;
        let pointerDownPos = { x: 0, y: 0 };
        let recentPositions = [];
        let longPressTimeout = null;

        // Background stars
        const stars = [];
        for (let i = 0; i < 150; i++) {
            stars.push({ x: Math.random() * width, y: Math.random() * height });
        }

        // --- Audio System ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let soundEnabled = true;

        function playSpatialSound(x, y, playFn) {
            if (!soundEnabled) return;
            let pan = Math.max(-1, Math.min(1, (x / width) * 2 - 1));
            let distFromCenter = Math.abs(x - width / 2) / (width / 2);
            let gainMult = 1 - (distFromCenter * 0.5);
            playFn(pan, gainMult);
        }

        function playBlip(radius, pan, gainMult) {
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();

            if (audioCtx.createStereoPanner) {
                let panner = audioCtx.createStereoPanner();
                panner.pan.value = pan;
                osc.connect(gain).connect(panner).connect(audioCtx.destination);
            } else {
                osc.connect(gain).connect(audioCtx.destination);
            }

            osc.type = 'sine';
            osc.frequency.setValueAtTime(200 + radius * 10, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05 * gainMult, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);

            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function playNoise(dur, gainVal, pan, gainMult) {
            let bufferSize = audioCtx.sampleRate * dur;
            let buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            let data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }

            let noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            let gain = audioCtx.createGain();

            if (audioCtx.createStereoPanner) {
                let panner = audioCtx.createStereoPanner();
                panner.pan.value = pan || 0;
                noise.connect(gain).connect(panner).connect(audioCtx.destination);
            } else {
                noise.connect(gain).connect(audioCtx.destination);
            }

            gain.gain.setValueAtTime(gainVal * (gainMult || 1), audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);

            noise.start();
        }

        let droneOsc = null;
        let droneGain = null;

        function startDrone() {
            if (!soundEnabled || droneOsc) return;
            droneOsc = audioCtx.createOscillator();
            droneGain = audioCtx.createGain();
            droneOsc.connect(droneGain).connect(audioCtx.destination);
            droneOsc.type = 'sine';
            droneOsc.frequency.value = 40;
            droneGain.gain.setValueAtTime(0, audioCtx.currentTime);
            droneGain.gain.linearRampToValueAtTime(0.06, audioCtx.currentTime + 0.5);
            droneOsc.start();
        }

        function stopDrone() {
            if (droneGain && droneOsc) {
                let g = droneGain;
                let o = droneOsc;
                droneGain = null;
                droneOsc = null;
                g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
                setTimeout(() => { o.stop(); }, 500);
            }
        }

        // --- Classes ---
        class Ball {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 8 + Math.random() * 16;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.vx = (Math.random() - 0.5) * 8;
                this.vy = (Math.random() - 0.5) * 8;
                this.mass = Math.PI * this.radius * this.radius;
                this.history = [];
                this.shrinking = false;
                this.dragged = false;
            }

            update() {
                this.history.unshift({ x: this.x, y: this.y });
                if (this.history.length > 12) this.history.pop();

                if (this.shrinking) {
                    this.radius *= 0.8;
                    return;
                }

                if (this.dragged) return;

                if (frozen) {
                    this.vx = 0;
                    this.vy = 0;
                }

                this.vx = Math.max(-30, Math.min(30, this.vx * 0.999));
                this.vy = Math.max(-30, Math.min(30, this.vy * 0.999));
                this.x += this.vx;
                this.y += this.vy;

                if (this.x - this.radius < 0) { this.x = this.radius; this.vx *= -1; }
                if (this.x + this.radius > width) { this.x = width - this.radius; this.vx *= -1; }
                if (this.y - this.radius < 0) { this.y = this.radius; this.vy *= -1; }
                if (this.y + this.radius > height) { this.y = height - this.radius; this.vy *= -1; }
            }

            draw(ctx) {
                // Trail
                for (let i = 0; i < this.history.length; i++) {
                    ctx.globalAlpha = (1 - i / this.history.length) * 0.5;
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(this.history[i].x, this.history[i].y, this.radius * (1 - i / this.history.length), 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.globalAlpha = 1;
                ctx.shadowBlur = this.radius * 0.8;
                ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        // --- Logic ---
        function spawnBall(x, y) {
            let b = new Ball(x, y);
            balls.push(b);
            if (balls.length > 80) balls.shift();
            playSpatialSound(x, y, (pan, gain) => playBlip(b.radius, pan, gain));
        }

        function spawnBlackHole(x, y) {
            blackHole = { x, y, timer: 5000 };
            document.getElementById('vignette').style.opacity = '1';
            if (!droneOsc) startDrone();
        }

        function spawnSparks(x, y, color) {
            for (let i = 0; i < 8; i++) {
                let angle = Math.random() * Math.PI * 2;
                let speed = 1 + Math.random() * 3;
                sparks.push({
                    x, y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 30,
                    radius: 2 + Math.random() * 2,
                    color: Math.random() > 0.5 ? '#fff' : color
                });
            }
        }

        function checkCollisions() {
            for (let i = 0; i < balls.length; i++) {
                for (let j = i + 1; j < balls.length; j++) {
                    let b1 = balls[i];
                    let b2 = balls[j];
                    if (b1.shrinking || b2.shrinking) continue;

                    let dx = b2.x - b1.x;
                    let dy = b2.y - b1.y;
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    let minDist = b1.radius + b2.radius;

                    if (dist < minDist) {
                        let overlap = minDist - dist;
                        if (dist === 0) { dx = 1; dy = 0; dist = 1; }
                        let nx = dx / dist;
                        let ny = dy / dist;

                        let mRatio1 = b2.mass / (b1.mass + b2.mass);
                        let mRatio2 = b1.mass / (b1.mass + b2.mass);

                        let r1 = b1.dragged ? 0 : (b2.dragged ? 1 : mRatio1);
                        let r2 = b2.dragged ? 0 : (b1.dragged ? 1 : mRatio2);

                        b1.x -= nx * overlap * r1;
                        b1.y -= ny * overlap * r1;
                        b2.x += nx * overlap * r2;
                        b2.y += ny * overlap * r2;

                        let dvx = b2.vx - b1.vx;
                        let dvy = b2.vy - b1.vy;
                        let velAlongNormal = dvx * nx + dvy * ny;

                        if (velAlongNormal < 0) {
                            let restitution = 1;
                            let impulse = -(1 + restitution) * velAlongNormal;
                            let invM1 = b1.dragged ? 0 : 1 / b1.mass;
                            let invM2 = b2.dragged ? 0 : 1 / b2.mass;

                            if (invM1 + invM2 > 0) {
                                impulse /= (invM1 + invM2);
                                let ix = impulse * nx;
                                let iy = impulse * ny;

                                if (!b1.dragged) { b1.vx -= ix * invM1; b1.vy -= iy * invM1; }
                                if (!b2.dragged) { b2.vx += ix * invM2; b2.vy += iy * invM2; }
                            }

                            if (Math.abs(velAlongNormal) > 1) {
                                let cx = (b1.x + b2.x) / 2;
                                let cy = (b1.y + b2.y) / 2;
                                spawnSparks(cx, cy, b1.color);
                                playSpatialSound(cx, cy, (pan, gain) => playNoise(0.03, 0.04, pan, gain));
                            }
                        }
                    }
                }
            }
        }

        // --- Input ---
        window.addEventListener('contextmenu', e => e.preventDefault());

        window.addEventListener('pointerdown', e => {
            if (e.target.closest('.btn')) return;

            if (!gameStarted) {
                gameStarted = true;
                document.getElementById('intro').style.opacity = '0';
                if (audioCtx.state === 'suspended') audioCtx.resume();
            }

            if (e.button === 2) {
                spawnBlackHole(e.clientX, e.clientY);
                return;
            }

            mouse.x = e.clientX; mouse.y = e.clientY;
            lastMouse.x = e.clientX; lastMouse.y = e.clientY;
            pointerDownTime = Date.now();
            pointerDownPos = { x: e.clientX, y: e.clientY };

            // Check grab
            draggedBall = null;
            recentPositions = [];
            for (let i = balls.length - 1; i >= 0; i--) {
                let b = balls[i];
                if (Math.hypot(b.x - mouse.x, b.y - mouse.y) <= b.radius * 2) {
                    draggedBall = b;
                    b.dragged = true;
                    break;
                }
            }

            if (e.pointerType === 'touch' && !draggedBall) {
                longPressTimeout = setTimeout(() => spawnBlackHole(e.clientX, e.clientY), 500);
            }
        });

        window.addEventListener('pointermove', e => {
            if (!gameStarted) return;
            lastMouse.x = mouse.x;
            lastMouse.y = mouse.y;
            mouse.x = e.clientX;
            mouse.y = e.clientY;

            if (longPressTimeout && Math.hypot(mouse.x - pointerDownPos.x, mouse.y - pointerDownPos.y) > 10) {
                clearTimeout(longPressTimeout);
                longPressTimeout = null;
            }
        });

        window.addEventListener('pointerup', e => {
            if (!gameStarted) return;

            if (longPressTimeout) {
                clearTimeout(longPressTimeout);
                longPressTimeout = null;
            }

            if (draggedBall) {
                let now = Date.now();
                let validPos = recentPositions.filter(p => now - p.time < 100);
                if (validPos.length >= 2) {
                    let first = validPos[0];
                    let last = validPos[validPos.length - 1];
                    let dt = (last.time - first.time) || 16;
                    draggedBall.vx = ((last.x - first.x) / dt) * 16;
                    draggedBall.vy = ((last.y - first.y) / dt) * 16;
                } else {
                    draggedBall.vx = 0;
                    draggedBall.vy = 0;
                }
                draggedBall.dragged = false;
                draggedBall = null;
                recentPositions = [];
            } else {
                if (e.button !== 2) {
                    let dist = Math.hypot(e.clientX - pointerDownPos.x, e.clientY - pointerDownPos.y);
                    if (Date.now() - pointerDownTime < 300 && dist < 10 && !e.target.closest('.btn')) {
                        spawnBall(e.clientX, e.clientY);
                    }
                }
            }
        });

        // --- Toolbar Actions ---
        document.getElementById('btn-explode').onclick = function () {
            balls.forEach(b => {
                if (b.vx === 0 && b.vy === 0) {
                    b.vx = (Math.random() - 0.5) * 20;
                    b.vy = (Math.random() - 0.5) * 20;
                } else {
                    b.vx *= 5;
                    b.vy *= 5;
                }
            });
            let flash = document.getElementById('flash');
            flash.style.opacity = '1';
            setTimeout(() => flash.style.opacity = '0', 100);
            if (soundEnabled) playNoise(0.2, 0.15, 0, 1);
        };

        document.getElementById('btn-freeze').onclick = function () {
            frozen = !frozen;
            this.classList.toggle('active', frozen);
        };

        document.getElementById('btn-disco').onclick = function () {
            discoMode = !discoMode;
            this.classList.toggle('active', discoMode);
            document.getElementById('canvas').classList.toggle('disco', discoMode);
        };

        document.getElementById('btn-clear').onclick = function () {
            balls = [];
        };

        document.getElementById('btn-sound').onclick = function () {
            soundEnabled = !soundEnabled;
            this.classList.toggle('active', soundEnabled);
            this.innerHTML = soundEnabled ? '♪ SOUND' : '<s>♪ SOUND</s>';
            if (!soundEnabled && blackHole) stopDrone();
            if (soundEnabled && blackHole) startDrone();
        };

        // --- Main Loop ---
        function loop() {
            requestAnimationFrame(loop);

            ctx.clearRect(0, 0, width, height);

            // Draw stars
            ctx.fillStyle = '#fff';
            for (let s of stars) {
                ctx.fillRect(s.x, s.y, 1, 1);
            }

            // Process Drag Velocity
            if (draggedBall) {
                draggedBall.vx = mouse.x - draggedBall.x;
                draggedBall.vy = mouse.y - draggedBall.y;
                draggedBall.x = mouse.x;
                draggedBall.y = mouse.y;
                recentPositions.push({ x: mouse.x, y: mouse.y, time: Date.now() });
                if (recentPositions.length > 5) recentPositions.shift();
            }

            // Process Black Hole
            if (blackHole) {
                blackHole.timer -= 16.66;
                if (blackHole.timer <= 0) {
                    blackHole = null;
                    document.getElementById('vignette').style.opacity = '0';
                    stopDrone();
                } else {
                    for (let b of balls) {
                        if (b.shrinking || b.dragged || frozen) continue;
                        let dx = blackHole.x - b.x;
                        let dy = blackHole.y - b.y;
                        let dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 200) {
                            let pull = 0.3 * (1 - dist / 200);
                            b.vx += (dx / dist) * pull;
                            b.vy += (dy / dist) * pull;
                            if (dist < 30) b.shrinking = true;
                        }
                    }

                    ctx.save();
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = '#9b00ff';
                    ctx.fillStyle = '#000';
                    let scale = 1 + Math.sin(Date.now() / 150) * 0.15;
                    ctx.beginPath();
                    ctx.arc(blackHole.x, blackHole.y, 30 * scale, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;

                    ctx.strokeStyle = 'rgba(155, 0, 255, 0.3)';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(blackHole.x, blackHole.y, 200, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.restore();
                }
            }

            checkCollisions();

            for (let i = balls.length - 1; i >= 0; i--) {
                let b = balls[i];
                b.update();
                if (b.shrinking && b.radius < 0.5) {
                    spawnSparks(b.x, b.y, b.color);
                    if (soundEnabled) playNoise(0.1, 0.05, 0, 1);
                    balls.splice(i, 1);
                    continue;
                }
                b.draw(ctx);
            }

            // Draw Sparks
            for (let i = sparks.length - 1; i >= 0; i--) {
                let s = sparks[i];
                s.x += s.vx;
                s.y += s.vy;
                s.life--;
                ctx.globalAlpha = Math.max(0, s.life / 30);
                ctx.fillStyle = s.color;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
                ctx.fill();
                if (s.life <= 0) sparks.splice(i, 1);
            }
            ctx.globalAlpha = 1;

            // Draw Drag Trail
            if (draggedBall) {
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 10]);
                ctx.beginPath();
                ctx.moveTo(draggedBall.x, draggedBall.y);
                ctx.lineTo(mouse.x, mouse.y);
                ctx.stroke();
                ctx.setLineDash([]);
            }

            document.getElementById('hud-balls').textContent = `BALLS: ${balls.length}`;
        }

        loop();
    </script>
</body>

</html>
