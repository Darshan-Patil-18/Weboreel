<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDEA FORGE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@1,400;1,600&family=DM+Sans:wght@400;500;700&display=swap');

        :root {
            --bg-color: #030303;
            --accent: #ffffff;
            --glass-bg: rgba(255,255,255,0.04);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: #ffffff;
            font-family: 'DM Sans', sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            perspective: 1000px;
        }

        /* Animated Grid */
        .grid-bg {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 0;
            animation: gridZoom 20s linear infinite;
            transform-origin: center;
            pointer-events: none;
            transition: background-image 0.5s ease;
        }

        @keyframes gridZoom {
            0% { transform: scale(1) translateZ(0); }
            50% { transform: scale(1.1) translateZ(0); }
            100% { transform: scale(1) translateZ(0); }
        }

        /* Particles */
        .particles {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: var(--accent);
            border-radius: 50%;
            opacity: 0.5;
            animation: float linear infinite;
            transition: background-color 0.5s ease;
        }

        @keyframes float {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-100vh) translateX(20px); opacity: 0; }
        }

        /* Ambient Glow */
        .ambient-glow {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw; height: 100vh;
            background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
            opacity: 0;
            z-index: 1;
            pointer-events: none;
            transition: opacity 0.5s ease, background 0.5s ease;
        }

        /* Screens */
        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        .screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* Top Logo Mark */
        .logo-mark {
            width: 30px;
            height: 30px;
            border: 2px solid white;
            transform: rotate(45deg);
            box-shadow: 0 0 10px white;
            margin-bottom: 2rem;
            animation: pulseLogo 2s infinite alternate;
        }

        @keyframes pulseLogo {
            0% { box-shadow: 0 0 5px white; }
            100% { box-shadow: 0 0 20px white; }
        }

        /* Title */
        .title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(4rem, 14vw, 10rem);
            line-height: 1;
            background: linear-gradient(90deg, #fff 0%, #888 50%, #fff 100%);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: shimmer 3s linear infinite;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        @keyframes shimmer {
            to { background-position: 200% center; }
        }

        .subtitle {
            font-size: 1.1rem;
            color: #aaa;
            margin-bottom: 3rem;
            text-align: center;
            padding: 0 1rem;
        }

        /* Category Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            max-width: 900px;
            padding: 0 2rem;
            width: 100%;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1rem;
            }
        }

        /* Category Card */
        .card {
            height: 110px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--card-color);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: -1;
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: var(--card-color);
            box-shadow: 0 0 30px var(--card-color-alpha);
        }

        .card:hover::before {
            opacity: 0.1;
        }

        .card:active {
            transform: scale(0.95);
        }

        .card.flashing {
            border-color: var(--card-color);
            box-shadow: 0 0 30px var(--card-color-alpha);
            transform: scale(1.05);
        }

        .card.flashing::before {
            opacity: 0.2;
        }

        .card-icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            pointer-events: none;
        }

        .card-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.4rem;
            color: var(--card-color);
            letter-spacing: 1px;
            pointer-events: none;
        }

        /* Random Spin Button */
        .random-btn {
            margin-top: 3rem;
            padding: 1rem 2.5rem;
            border-radius: 50px;
            background: transparent;
            color: white;
            font-family: 'DM Sans', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 2px;
            border: 2px solid transparent;
            background-image: linear-gradient(#030303, #030303), linear-gradient(90deg, #ff0088, #00aaff);
            background-origin: border-box;
            background-clip: padding-box, border-box;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .random-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 20px rgba(0, 170, 255, 0.2);
        }

        .random-btn:active {
            transform: translateY(0) scale(0.98);
        }

        /* Animating Card (Transition) */
        .transition-card {
            position: fixed;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--accent);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            box-shadow: 0 0 30px var(--accent-alpha);
            pointer-events: none;
        }

        /* Screen 2 - Idea Reveal */
        .idea-container {
            width: 90%;
            max-width: 700px;
            padding: 3rem;
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            border: 1px solid var(--accent);
            border-radius: 16px;
            box-shadow: 0 0 50px var(--accent-alpha);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            position: relative;
            z-index: 10;
            overflow-y: auto;
            max-height: 90vh;
        }

        .idea-label {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            font-variant: small-caps;
            color: var(--accent);
            letter-spacing: 0.4em;
            text-transform: uppercase;
        }

        .idea-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(3rem, 8vw, 5.5rem);
            color: white;
            line-height: 1;
        }

        .idea-tagline {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 1.5rem;
            color: #f0f0f0;
        }

        .divider {
            height: 1px;
            background: var(--accent);
            width: 0;
            transition: width 0.8s ease;
        }

        .info-row {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .info-block {
            flex: 1;
            min-width: 150px;
        }

        .info-block-label {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .info-block-content {
            font-size: 1rem;
            color: #ddd;
        }

        .tech-tags {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .tech-tag {
            padding: 0.4rem 1rem;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--accent);
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--accent);
        }

        .wow-factor {
            font-family: 'Bebas Neue', sans-serif;
            color: var(--accent);
            font-size: 2rem;
            margin-top: 1rem;
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 1rem 2rem;
            border: 1px solid var(--accent);
            background: transparent;
            color: white;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
            text-align: center;
        }

        .action-btn:hover {
            background: var(--accent-alpha);
            transform: translateY(-2px);
        }

        /* Animation Classes */
        .anim-hidden {
            opacity: 0;
            transform: translateY(20px);
        }

        .anim-reveal {
            animation: fadeInUp 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards;
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .anim-slam {
            animation: slamIn 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards;
        }

        @keyframes slamIn {
            from { opacity: 0; transform: translateY(-200px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mute Button */
        .mute-btn {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--accent);
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 0 15px var(--accent-alpha);
            transition: all 0.3s;
            font-size: 1.2rem;
        }

        .mute-btn:hover {
            transform: scale(1.1);
            background: var(--accent-alpha);
        }
        
        .overlay-black {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: black;
            z-index: 50;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        @media (max-width: 600px) {
            .idea-container {
                padding: 2rem 1.5rem;
                border-radius: 0;
                border-left: none;
                border-right: none;
                height: 100vh;
                max-height: 100vh;
                justify-content: center;
            }
        }
    </style>
</head>

                { name: "StrangerGood", tagline: "Pairs strangers to do one good deed together anonymously", problem: "Decreasing real-world community connection", who: "kindness-seekers", how: "matching algorithm + anonymous chat", stack: ["Socket.io", "Firebase", "React Native"], market: "$1.9B Market" },
                { name: "MemoryVault", tagline: "Create a shared digital time capsule with friends that unlocks on a future date", problem: "Losing touch with close friends over time", who: "close friend groups", how: "scheduled unlock + multimedia storage", stack: ["AWS S3", "Firebase", "React"], market: "$3.3B Market" },
                { name: "TribeFind", tagline: "Matches you with your 'tribe' based on niche interests, not demographics", problem: "Superficial matchmaking based on demographics", who: "interest-driven socializers", how: "interest vector matching + recommendation engine", stack: ["Python ML", "Node.js", "React Native"], market: "$6.7B Market" }

                { name: "SoundPainting", tagline: "Draw anything and AI generates music that matches the mood of your artwork", problem: "Disjointed tools for multi-sensory art", who: "digital artists", how: "image mood analysis + generative music", stack: ["Canvas API", "Web Audio API", "Claude API"], market: "$2.7B Market" },
                { name: "ColabVerse", tagline: "Real-time collaborative world-building where each person adds one element per day", problem: "Isolation in the creative process", who: "creative communities", how: "WebSocket canvas + version history", stack: ["Socket.io", "Canvas API", "Firebase"], market: "$3.9B Market" },
                { name: "LogoCraft AI", tagline: "Describe your brand in 3 words and get 10 unique SVG logos generated", problem: "High initial costs for professional branding", who: "startups + freelancers", how: "text-to-vector AI generation", stack: ["OpenAI API", "SVG generation", "React"], market: "$5.1B Market" },
                { name: "PoemForge", tagline: "Turn any photo into a unique poem in your chosen poetic style", problem: "Difficulty composing personalized poetry", who: "poetry lovers + gift-givers", how: "image captioning + poetry style transfer", stack: ["Claude API", "Vision API", "React"], market: "$1.4B Market" }
            ]
        };

        // --- DOM ELEMENTS ---
        const gridContainer = document.getElementById('categoryGrid');
        const particlesContainer = document.getElementById('particles');
        const root = document.documentElement;
        
        // --- AUDIO SYSTEM ---
        let audioCtx;
        let ambientOscillators = [];
        let isMuted = false;
        let audioInitialized = false;

        function initAudio() {
            if (audioInitialized) return;
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            
            // Base 40Hz
            const baseOsc = audioCtx.createOscillator();
            const baseGain = audioCtx.createGain();
            baseOsc.type = 'sine';
            baseOsc.frequency.value = 40;
            baseGain.gain.value = 0.08;
            baseOsc.connect(baseGain);
            
            // Pad 220Hz + 330Hz
            const padOsc1 = audioCtx.createOscillator();
            const padOsc2 = audioCtx.createOscillator();
            const padGain = audioCtx.createGain();
            padOsc1.type = 'sine';
            padOsc1.frequency.value = 220;
            padOsc2.type = 'sine';
            padOsc2.frequency.value = 330;
            padGain.gain.value = 0.04;
            
            // Tremolo
            const lfo = audioCtx.createOscillator();
            lfo.type = 'sine';
            lfo.frequency.value = 0.1;
            const lfoGain = audioCtx.createGain();
            lfoGain.gain.value = 0.02;
            lfo.connect(lfoGain);
            lfoGain.connect(padGain.gain);
            
            padOsc1.connect(padGain);
            padOsc2.connect(padGain);

            // Shimmer 880Hz
            const shimmerOsc = audioCtx.createOscillator();
            const shimmerGain = audioCtx.createGain();
            shimmerOsc.type = 'triangle';
            shimmerOsc.frequency.value = 880;
            shimmerGain.gain.value = 0.02;

            const lfoHigh = audioCtx.createOscillator();
            lfoHigh.type = 'sine';
            lfoHigh.frequency.value = 0.3;
            const lfoHighGain = audioCtx.createGain();
            lfoHighGain.gain.value = 0.01;
            lfoHigh.connect(lfoHighGain);
            lfoHighGain.connect(shimmerGain.gain);

            shimmerOsc.connect(shimmerGain);

            // Filter
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 1200;

            baseGain.connect(filter);
            padGain.connect(filter);
            shimmerGain.connect(filter);
            filter.connect(audioCtx.destination);

            baseOsc.start();
            padOsc1.start();
            padOsc2.start();
            lfo.start();
            shimmerOsc.start();
            lfoHigh.start();

            ambientOscillators = [baseGain, padGain, shimmerGain];
            
            audioInitialized = true;
            updateMuteState();
        }

        function playHoverSound() {
            if (isMuted || !audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = 800;
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.05);
        }

        function playRevealSound() {
            if (isMuted || !audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            
            osc.frequency.setValueAtTime(200, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(2000, audioCtx.currentTime + 0.5);
            
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.1);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }

        function updateMuteState() {
            document.getElementById('muteBtn').innerText = isMuted ? '🔇' : '🔊';
            if (!audioCtx) return;
            
            const targetGain = isMuted ? 0 : 1;
            ambientOscillators.forEach((g, index) => {
                const baseVol = index === 0 ? 0.08 : (index === 1 ? 0.04 : 0.02);
                g.gain.setTargetAtTime(targetGain * baseVol, audioCtx.currentTime, 0.1);
            });
        }

        document.getElementById('muteBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            if (!audioInitialized) {
                initAudio();
            } else {
                isMuted = !isMuted;
                updateMuteState();
            }
        });

        // Initialize audio on first click anywhere
        document.body.addEventListener('click', () => {
            initAudio();
        }, { once: true });


        // --- PARTICLES ---
        function createParticles() {
            for (let i = 0; i < 30; i++) {
                let p = document.createElement('div');
                p.classList.add('particle');
                p.style.width = Math.random() * 4 + 2 + 'px';
                p.style.height = p.style.width;
                p.style.left = Math.random() * 100 + 'vw';
                p.style.top = Math.random() * 100 + 'vh';
                p.style.animationDuration = Math.random() * 10 + 10 + 's';
                p.style.animationDelay = Math.random() * 10 + 's';
                particlesContainer.appendChild(p);
            }
        }
        createParticles();

        // --- RENDER CARDS ---
        categories.forEach((cat, index) => {
            const card = document.createElement('div');
            card.classList.add('card');
            card.style.setProperty('--card-color', cat.color);
            const r = parseInt(cat.color.slice(1,3), 16);
            const g = parseInt(cat.color.slice(3,5), 16);
            const b = parseInt(cat.color.slice(5,7), 16);
            card.style.setProperty('--card-color-alpha', `rgba(${r},${g},${b},0.4)`);
            card.dataset.id = cat.id;

            card.innerHTML = `
                <div class="card-icon">${cat.icon}</div>
                <div class="card-name">${cat.name}</div>
            `;

            card.addEventListener('mouseenter', playHoverSound);
            card.addEventListener('click', () => selectCategory(cat, card));

            gridContainer.appendChild(card);
        });

        // --- INTERACTION LOGIC ---
        let currentCategory = null;

        function setAccentColor(color) {
            root.style.setProperty('--accent', color);
            const r = parseInt(color.slice(1,3), 16);
            const g = parseInt(color.slice(3,5), 16);
            const b = parseInt(color.slice(5,7), 16);
            root.style.setProperty('--accent-alpha', `rgba(${r},${g},${b},0.4)`);
            
            // Update grid lines
            document.getElementById('gridBg').style.backgroundImage = `
                linear-gradient(rgba(${r},${g},${b},0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(${r},${g},${b},0.1) 1px, transparent 1px)
            `;

            // Update ambient glow
            const glow = document.getElementById('ambientGlow');
            glow.style.background = `radial-gradient(circle, rgba(${r},${g},${b},0.15) 0%, transparent 70%)`;
            glow.style.opacity = '1';
        }

        function resetAccentColor() {
            root.style.setProperty('--accent', '#ffffff');
            root.style.setProperty('--accent-alpha', 'rgba(255,255,255,0.4)');
            document.getElementById('gridBg').style.backgroundImage = `
                linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px)
            `;
            document.getElementById('ambientGlow').style.opacity = '0';
        }

        function getRandomIdea(catId) {
            const list = ideasDb[catId];
            return list[Math.floor(Math.random() * list.length)];
        }

        async function selectCategory(cat, cardElement) {
            currentCategory = cat;
            
            // Clone card for animation
            const rect = cardElement.getBoundingClientRect();
            const clone = cardElement.cloneNode(true);
            clone.classList.add('transition-card');
            clone.style.left = rect.left + 'px';
            clone.style.top = rect.top + 'px';
            clone.style.width = rect.width + 'px';
            clone.style.height = rect.height + 'px';
            clone.style.margin = '0';
            document.body.appendChild(clone);

            // Hide landing screen
            document.getElementById('screenLanding').classList.add('hidden');

            // Animation Phase 1: Center and scale
            setTimeout(() => {
                clone.style.transition = 'all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1)';
                clone.style.left = '50%';
                clone.style.top = '50%';
                clone.style.transform = 'translate(-50%, -50%) scale(3)';
                clone.style.filter = 'blur(20px)';
                clone.style.opacity = '0';
            }, 10);

            // Set color
            setAccentColor(cat.color);

            // Black flash
            setTimeout(() => {
                document.getElementById('blackOverlay').style.opacity = '1';
                clone.remove();
            }, 400);

            setTimeout(() => {
                document.getElementById('blackOverlay').style.opacity = '0';
                showIdeaScreen(cat);
            }, 600);
        }

        function showIdeaScreen(cat) {
            const idea = getRandomIdea(cat.id);
            playRevealSound();

            document.getElementById('screenIdea').classList.remove('hidden');

            // Populate data
            document.getElementById('ideaLabel').innerText = `⚡ ${cat.name} IDEA`;
            document.getElementById('ideaName').innerText = idea.name;
            document.getElementById('ideaTagline').innerText = idea.tagline;
            document.getElementById('ideaProblem').querySelector('.info-block-content').innerText = idea.problem;
            document.getElementById('ideaWho').querySelector('.info-block-content').innerText = idea.who;
            document.getElementById('ideaHow').querySelector('.info-block-content').innerText = idea.how;
            document.getElementById('ideaMarket').innerText = `POTENTIAL MARKET: ${idea.market}`;

            const stackContainer = document.getElementById('ideaStack');
            stackContainer.innerHTML = '';
            idea.stack.forEach(tech => {
                const tag = document.createElement('div');
                tag.classList.add('tech-tag');
                tag.innerText = tech;
                stackContainer.appendChild(tag);
            });

            // Reset animations
            const animElements = document.querySelectorAll('.anim-hidden');
            animElements.forEach(el => {
                el.style.animation = 'none';
                el.offsetHeight; /* trigger reflow */
                el.style.animation = null;
                el.classList.remove('anim-reveal', 'anim-slam');
            });

            document.getElementById('ideaDivider').style.width = '0';

            // Trigger animations
            document.getElementById('ideaContainer').classList.add('anim-slam');

            setTimeout(() => document.getElementById('ideaLabel').classList.add('anim-reveal'), 0);
            setTimeout(() => document.getElementById('ideaName').classList.add('anim-reveal'), 200);
            setTimeout(() => document.getElementById('ideaTagline').classList.add('anim-reveal'), 400);
            setTimeout(() => {
                document.getElementById('ideaDivider').style.width = '100%';
            }, 500);
            setTimeout(() => document.getElementById('ideaProblem').classList.add('anim-reveal'), 600);
            setTimeout(() => document.getElementById('ideaWho').classList.add('anim-reveal'), 700);
            setTimeout(() => document.getElementById('ideaHow').classList.add('anim-reveal'), 800);
            setTimeout(() => document.getElementById('ideaStack').classList.add('anim-reveal'), 900);
            setTimeout(() => document.getElementById('ideaMarket').classList.add('anim-reveal'), 1000);
            setTimeout(() => document.getElementById('ideaActions').classList.add('anim-reveal'), 1100);
        }

        // Action Buttons
        document.getElementById('forgeAnotherBtn').addEventListener('click', () => {
            // Hide container quickly
            document.getElementById('ideaContainer').classList.remove('anim-slam');
            document.getElementById('ideaContainer').style.opacity = '0';
            
            setTimeout(() => {
                document.getElementById('ideaContainer').style.opacity = '1';
                showIdeaScreen(currentCategory);
            }, 300);
        });

        document.getElementById('backBtn').addEventListener('click', () => {
            document.getElementById('screenIdea').classList.add('hidden');
            resetAccentColor();
            
            setTimeout(() => {
                document.getElementById('screenLanding').classList.remove('hidden');
            }, 300);
        });

        // Random Spin
        document.getElementById('randomBtn').addEventListener('click', () => {
            if(!audioInitialized) initAudio();
            
            const cards = document.querySelectorAll('.card');
            let counter = 0;
            const maxSpins = 30; // 3 rounds * 10 
            const speed = 100;
            
            // disable button
            const btn = document.getElementById('randomBtn');
            btn.style.pointerEvents = 'none';
            btn.style.opacity = '0.5';

            let interval = setInterval(() => {
                cards.forEach(c => c.classList.remove('flashing'));
                
                const randIndex = Math.floor(Math.random() * cards.length);
                const activeCard = cards[randIndex];
                activeCard.classList.add('flashing');
                playHoverSound();

                counter++;
                if (counter >= maxSpins) {
                    clearInterval(interval);
                    setTimeout(() => {
                        const finalCat = categories.find(c => c.id === activeCard.dataset.id);
                        activeCard.classList.remove('flashing');
                        btn.style.pointerEvents = 'auto';
                        btn.style.opacity = '1';
                        selectCategory(finalCat, activeCard);
                    }, 500);
                }
            }, speed);
        });

    </script>
